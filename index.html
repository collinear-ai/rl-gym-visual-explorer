-10pm ET\n\n**Services:**\n- Enroll or change contributions\n- Update investment elections\n- Check account balance\n- Model retirement scenarios\n- Request distributions or loans\n- Update beneficiaries\n- Access educational resources\n\n### 14.2 Amazon HR/Benefits\n\n**Benefits Team:**\n- Phone: (555) 123-4570\n- Email: benefits@weaverenterprises.com\n\n**For Questions About:**\n- Eligibility\n- Company match\n- Pay and contribution calculations\n- Leave of absence impact on Plan\n- QDRO reviews\n\n### 14.3 Additional Resources\n\n**Annual Statements:**\n- Mailed each February for prior year\n- Also available online anytime\n\n**Quarterly Statements:**\n- Available online\n- Opt in for paper delivery (fee applies)\n\n**Mobile App:**\n- Download Fidelity NetBenefits app\n- Check balance and make changes on the go\n\n---\n\n**This document is a summary only. The official Plan Document governs in case of any conflict. Amazon reserves the right to amend or terminate the Plan at any time.**\n\n**Plan Name:** Amazon Inc. 401(k) Retirement Savings Plan  \n**Plan Number:** 001  \n**Plan Year:** Calendar Year (January 1 - December 31)  \n**Trustee:** Fidelity Management Trust Company  \n**Plan Administrator:** Amazon Inc., Human Resources Department","README.md":"# Amazon Recruiting Seed Data\n\nThis directory contains seed data for the Amazon Recruiting scenario.\n\n## Directory Structure\n\n- `org_chart.md` - Organizational chart for all departments (Talent Acquisition, Engineering, Finance, Operations)\n- `recruitment_hiring_policy.md` - Recruiting and hiring policies and procedures\n- `interview_process.md` - Interview guidelines and legal do/don'ts\n- `interview_process_per_job.md` - Detailed interview stages for each open job requisition\n- `onboarding_policy.md` - New-hire onboarding policy and timeline\n- `offer_template.md` - Offer letter template\n- `candidate_faq.md` - Candidate-facing FAQ (high-level)\n- `401K_policy.md` - 401(k) policy details\n- `health_insurance_plan.md` - Health plan summary of benefits and coverage\n- `compensation_bands.json` - Compensation bands for the scenario\n- `skills.md` - HR best practices and behaviors the agent should follow\n- `../candidate_seed/` - Candidate and job requisition seed data\n  - `candidates.json` - Candidate pipeline data (30 candidates)\n  - `resumes/` - Candidate resume files\n  - `frappe_seed/` - Frappe HRMS seed data\n    - `employee_records/` - Employee records (25 employees)\n    - `job_requisitions/` - Job requisition documents (10 open positions)\n\n## Calendar Seeding\n\nCalendar events (interview schedules) can be seeded in two ways:\n\n### 1. Per-Task Seeding (Recommended)\n\nAdd `seed_calendar_events` to task JSON files:\n\n```json\n{\n  \"seed_calendar_events\": [\n    {\n      \"account\": \"patricia_lee\",\n      \"calendar_id\": \"default\",\n      \"summary\": \"Phone Screen - Maya Kumar\",\n      \"description\": \"Phone screen interview for Software Development Engineer position\",\n      \"start\": \"2026-01-25T10:00:00Z\",\n      \"end\": \"2026-01-25T10:30:00Z\",\n      \"uid\": \"interview-001\"\n    }\n  ]\n}\n```\n\n### 2. Environment Variable Seeding\n\nSet `CALDAV_SEED_EVENTS` environment variable in the `baikal-seed` container (JSON array format).\n\n## Email Seeding\n\nEmails can be seeded in two ways:\n\n### 1. Per-Task Seeding (Recommended)\n\nAdd `seed_emails` to task JSON files:\n\n```json\n{\n  \"seed_emails\": [\n    {\n      \"from_profile_id\": \"michael_chen\",\n      \"to_addr\": \"candidate@email.com\",\n      \"subject\": \"Interview Confirmation - Software Development Engineer\",\n      \"body_text\": \"Dear Candidate,\\n\\nYour interview has been scheduled...\",\n      \"body_html\": \"<p>Dear Candidate,</p><p>Your interview has been scheduled...</p>\"\n    }\n  ]\n}\n```\n\n### 2. Environment Variable Seeding\n\nSet `MAILHOG_SEED_EMAILS` environment variable in the `mailhog-seed` container (JSON array format).\n\n## Employee Directory\n\n### Executive Leadership\n\n| Name | Title | Email |\n|------|-------|-------|\n| Sarah Johnson | VP of Talent Acquisition | sarah.johnson@amazon.com |\n| Victoria Wells | VP of Engineering | victoria.wells@amazon.com |\n| Catherine Moore | Chief Financial Officer | catherine.moore@amazon.com |\n| Nancy Cooper | Operations Director | nancy.cooper@amazon.com |\n\n### Talent Acquisition Department\n\n| Name | Title | Email |\n|------|-------|-------|\n| Sarah Johnson | VP of Talent Acquisition | sarah.johnson@amazon.com |\n| Michael Chen | Talent Acquisition Manager | michael.chen@amazon.com |\n| Emily Davis | Senior Recruiter | emily.davis@amazon.com |\n| Patricia Lee | Scheduling Specialist | patricia.lee@amazon.com |\n| David Thompson | Onboarding Manager | david.thompson@amazon.com |\n| Lisa Anderson | Onboarding Specialist | lisa.anderson@amazon.com |\n| Jennifer Martinez | Recruiting Operations Manager | jennifer.martinez@amazon.com |\n| Maria Garcia | Recruiting Coordinator | maria.garcia@amazon.com |\n| Jessica Patel | Recruiting Coordinator | jessica.patel@amazon.com |\n| Samantha Lewis | University Recruiter | samantha.lewis@amazon.com |\n\n### Engineering Department\n\n| Name | Title | Email |\n|------|-------|-------|\n| Victoria Wells | VP of Engineering | victoria.wells@amazon.com |\n| Daniel Harris | Principal Engineer | daniel.harris@amazon.com |\n| Robert Kim | Engineering Manager | robert.kim@amazon.com |\n| James Brown | Senior Software Engineer | james.brown@amazon.com |\n| Kevin Nguyen | Software Engineer | kevin.nguyen@amazon.com |\n| Priya Sharma | Data Engineer | priya.sharma@amazon.com |\n| Marcus Robinson | DevOps Engineer | marcus.robinson@amazon.com |\n| Alex Wong | Frontend Engineer | alex.wong@amazon.com |\n\n### Finance Department\n\n| Name | Title | Email |\n|------|-------|-------|\n| Catherine Moore | Chief Financial Officer | catherine.moore@amazon.com |\n| Thomas Reed | Finance Manager | thomas.reed@amazon.com |\n| Amanda Wright | Financial Analyst | amanda.wright@amazon.com |\n| Jason Mitchell | Senior Accountant | jason.mitchell@amazon.com |\n\n### Operations Department\n\n| Name | Title | Email |\n|------|-------|-------|\n| Nancy Cooper | Operations Director | nancy.cooper@amazon.com |\n| Christopher Taylor | Operations Lead | christopher.taylor@amazon.com |\n| Ryan O'Connor | Operations Analyst | ryan.oconnor@amazon.com |\n\n## Open Job Requisitions\n\n| Requisition ID | Title | Positions | Hiring Manager |\n|----------------|-------|-----------|----------------|\n| REQ-2026-001 | Software Development Engineer | 3 | Robert Kim |\n| REQ-2026-002 | Product Manager | 2 | Sarah Johnson |\n| REQ-2026-003 | Data Scientist | 2 | Robert Kim |\n| REQ-2026-004 | UX Designer | 2 | Michael Chen |\n| REQ-2026-005 | Technical Program Manager | 2 | Nancy Cooper |\n| REQ-2026-006 | Senior Data Engineer | 2 | Robert Kim |\n| REQ-2026-007 | Machine Learning Engineer | 2 | Robert Kim |\n| REQ-2026-008 | Engineering Manager | 1 | Victoria Wells |\n| REQ-2026-009 | UX Researcher | 1 | Michael Chen |\n| REQ-2026-010 | Senior Software Development Engineer | 3 | Robert Kim |\n\nSee `interview_process_per_job.md` for detailed interview stages for each requisition.\n\n## Interview Rooms\n\n- **Conference Room A** - Main interview room, capacity 6\n- **Conference Room B** - Secondary interview room, capacity 4\n- **Video Conference Room** - Equipped for remote interviews\n- **Panel Interview Room** - Large room for panel interviews, capacity 10\n\n## Interview Schedule Templates\n\n| Interview Type | Duration |\n|----------------|----------|\n| Recruiter Screen | 30 minutes |\n| Phone Screen | 60 minutes |\n| Technical Interview | 60-75 minutes |\n| Behavioral Interview | 45 minutes |\n| Panel Interview | 60-90 minutes |\n| Design Exercise | 90 minutes |\n\nSee `interview_process.md` for recommended interview structure and legal guidelines.\n\n---\n\n## What Can and Cannot Be Seeded\n\n### CAN Be Seeded (Pre-populated Before Task Starts)\n| Type | How | Notes |\n|------|-----|-------|\n| **Emails** | `seed_emails` in task JSON | Appears in agent's inbox |\n| **Calendar Events** | `seed_calendar_events` in task JSON | Events on NPC calendars |\n| **NPC Secrets** | `npcs[].secret` in task JSON | Info NPCs reveal when asked via Chat |\n| **HRIS Data** | Frappe seed files | Employee records, candidates, requisitions |\n\n### CANNOT Be Seeded\n| Type | Why | Alternative |\n|------|-----|-------------|\n| **DMs / Chat Messages** | Chat history doesn't persist; agent starts fresh | Use `seed_emails` or NPC secrets |\n| **Chat History** | No prior conversations exist | Agent sends new messages, NPCs reply |\n\n### Task Design Implications\n\n**Tasks must NOT assume:**\n- Existing DMs or chat messages the agent can read\n- Prior chat conversations with NPCs\n- Messages \"received\" via Chat\n\n**If task needs info from someone:**\n1. Use `seed_emails` (email from the NPC forwarding relevant info)\n2. Add an NPC `secret` (agent asks via Chat, NPC replies)\n3. Include directly in task description\n\n### Multi-Person Decisions\n\nFor panel interviews, debriefs, or group decisions:\n- **Each decision-maker should have their own NPC secret**\n- Secrets should reflect individual perspectives/feedback\n- This ensures agent must consult each relevant stakeholder\n\nExample for 3-person interview panel:\n```json\n{\n  \"npcs\": [\n    {\"id\": \"michael_chen\", \"secret\": \"I thought the candidate was strong on system design but needs more depth on algorithms.\"},\n    {\"id\": \"emily_davis\", \"secret\": \"Good culture fit, but I have concerns about their experience with our scale.\"},\n    {\"id\": \"sarah_johnson\", \"secret\": \"I'd recommend a hire - their leadership experience outweighs the technical gaps.\"}\n  ]\n}\n```\n","candidate_faq.md":"# Candidate FAQ\n\n## Compensation & Equity\n\n### How is base salary determined?\nBase salary is set based on role, level, location, and experience. Each level has a defined range (min/mid/max). Most offers start at or near the midpoint.\n\n### How do RSUs work?\nRSUs vest over 4 years with a 1-year cliff:\n- Year 1: 5% (at 12-month anniversary)\n- Year 2: 15% (quarterly vesting)\n- Years 3-4: 40% each year (quarterly vesting)\n\nRSUs are taxed as ordinary income when they vest.\n\n### Is the sign-on bonus negotiable?\nSign-on bonuses are used to bridge the gap when candidates have unvested equity at their current company. We can discuss your specific situation.\n\n### What about annual raises and bonuses?\n- Annual merit increases: typically 3-8% based on performance\n- Annual bonus target varies by level, paid in Q1\n- Equity refresh grants: awarded annually based on performance\n\n## Benefits\n\n### When do benefits start?\nBenefits effective dates vary by program. Some benefits may begin on your first day, while others may have eligibility requirements or waiting periods (see the relevant plan documents).\n\n### What health insurance options are available?\nWe offer medical coverage options. For the authoritative plan details (deductibles, copays, out-of-pocket max, network rules), see `health_insurance_plan.md`.\n\n### Is the PTO really unlimited?\nYes, we have an unlimited discretionary PTO policy. We encourage at least 2 weeks per year. Manager approval is required but rarely denied for reasonable requests.\n\n### What's the 401(k) match?\nSee `401K_policy.md` for eligibility, match formula, and vesting details.\n\n## Work Arrangements\n\n### What does hybrid mean?\nOur hybrid model requires 3 days per week in the office (typically Tue-Thu). 2 days can be worked remotely. Core collaboration hours are 10am-3pm local time.\n\n### Can I work fully remote?\nFully remote arrangements are considered case-by-case and depend on role requirements. Discuss with your hiring manager if this is important to you.\n\n### What about relocation?\n- **Domestic moves**: $10,000 lump sum\n- **International moves**: $25,000 lump sum + visa sponsorship\n- **Temporary housing**: 30 days covered for domestic moves\n\n## Timeline & Process\n\n### When will I hear back after my interview?\nWe aim to make decisions within 5 business days of your final interview. Your recruiter will reach out with next steps.\n\n### How long is the offer valid?\nOffers typically expire within 3-5 business days. If you need more time, please discuss with your recruiter.\n\n### What happens after I accept?\n1. Background check initiated (typically 3-5 business days)\n2. I-9 verification and new hire paperwork\n3. Laptop and equipment shipped before start date\n4. Welcome email with Day 1 logistics\n\n### Can I negotiate my start date?\nYes, start dates are flexible within reason. Most candidates start on a Monday. We typically can accommodate 2-4 weeks from offer acceptance.\n\n## Team & Role\n\n### What's the onboarding like?\n- Week 1: Orientation, compliance training, team introductions\n- Weeks 2-4: Role-specific training, 1:1s with stakeholders\n- First 90 days: Defined onboarding projects with clear success metrics\n\n## Visa & Work Authorization\n\n### Do you sponsor visas?\nYes, we sponsor H-1B, L-1, and green cards for eligible roles. Discuss your specific situation with your recruiter.\n\n### I'm on OPT/STEM OPT\u2014is that okay?\nYes, we can hire candidates on OPT or STEM OPT and sponsor H-1B before the authorization expires.\n","compensation_bands.json":"{\n  \"roles\": {\n    \"software_engineer\": {\n      \"L4\": {\n        \"base\": {\"min\": 120000, \"mid\": 150000, \"max\": 180000},\n        \"equity\": {\"min\": 10000, \"max\": 30000, \"vesting\": \"4 years with 1-year cliff\"},\n        \"sign_on\": {\"standard\": 15000, \"max\": 30000}\n      },\n      \"L5\": {\n        \"base\": {\"min\": 160000, \"mid\": 200000, \"max\": 240000},\n        \"equity\": {\"min\": 30000, \"max\": 60000, \"vesting\": \"4 years with 1-year cliff\"},\n        \"sign_on\": {\"standard\": 20000, \"max\": 50000}\n      },\n      \"L6\": {\n        \"base\": {\"min\": 220000, \"mid\": 280000, \"max\": 340000},\n        \"equity\": {\"min\": 60000, \"max\": 100000, \"vesting\": \"4 years with 1-year cliff\"},\n        \"sign_on\": {\"standard\": 30000, \"max\": 75000}\n      }\n    },\n    \"product_manager\": {\n      \"L5\": {\n        \"base\": {\"min\": 140000, \"mid\": 175000, \"max\": 210000},\n        \"equity\": {\"min\": 20000, \"max\": 45000, \"vesting\": \"4 years with 1-year cliff\"},\n        \"sign_on\": {\"standard\": 15000, \"max\": 40000}\n      },\n      \"L6\": {\n        \"base\": {\"min\": 190000, \"mid\": 240000, \"max\": 290000},\n        \"equity\": {\"min\": 45000, \"max\": 80000, \"vesting\": \"4 years with 1-year cliff\"},\n        \"sign_on\": {\"standard\": 25000, \"max\": 60000}\n      }\n    }\n  },\n  \"relocation\": {\n    \"domestic\": 10000,\n    \"international\": 25000,\n    \"temporary_housing\": \"30 days covered\"\n  },\n  \"approval_thresholds\": {\n    \"above_midpoint\": \"Hiring Manager approval\",\n    \"above_max\": \"VP + Comp Team approval\",\n    \"sign_on_above_standard\": \"Hiring Manager approval\"\n  }\n}\n","health_insurance_plan.md":"# UNITEDHEALTHCARE\n## HEALTH INSURANCE PLAN - SUMMARY OF BENEFITS AND COVERAGE\n\n**Insurance Company:** UnitedHealthcare  \n**Plan Name:** Select Plus PPO Silver DZHU /L41S  \n**Coverage Period:** Based on group plan year  \n**Coverage For:** Employee/Family  \n**Plan Type:** PPO\n\n---\n\n## 1. PLAN OVERVIEW\n\nThis Summary of Benefits and Coverage (SBC) document helps you choose a health plan. The SBC shows how you and the plan share the cost for covered health care services.\n\n**Note:** Information about the cost of this plan (called the premium) will be provided separately. This is only a summary. For more information about your coverage, or to get a copy of the complete terms of coverage, visit www.welcometouhc.com or call 1-800-782-3740.\n\nFor general definitions of common terms, such as allowed amount, balance billing, coinsurance, copayment, deductible, provider, or other underlined terms, see the Glossary at www.healthcare.gov/sbc-glossary/ or call 1-866-487-2365 to request a copy.\n\n---\n\n## 2. IMPORTANT PLAN DETAILS\n\n### 2.1 Overall Deductible\n\n**Network Providers:**\n- Individual: $2,550 per calendar year\n- Family: $5,100 per calendar year\n\n**Out-of-Network Providers:**\n- Individual: $5,100 per calendar year\n- Family: $10,200 per calendar year\n\n**How It Works:** Generally, you must pay all of the costs from providers up to the deductible amount before this plan begins to pay. If you have other family members on the plan, each family member must meet their own individual deductible until the total amount of deductible expenses paid by all family members meets the overall family deductible.\n\n### 2.2 Services Covered Before You Meet Your Deductible\n\nYes. The following services are covered before you meet your deductible:\n\n- Preventive care\n- Primary care visits\n- Urgent care\n- Specialist visits\n- Outpatient services for behavioral health\n- Office visits\n- Rehabilitation services\n- Habilitation services\n- Children's eye exams\n- Children's dental check-up\n\n**Note:** This plan covers some items and services even if you haven't yet met the deductible amount. But a copayment or coinsurance may apply. For example, this plan covers certain preventive services without cost sharing and before you meet your deductible. See a list of covered preventive services at www.healthcare.gov/coverage/preventive-care-benefits/.\n\n### 2.3 Other Deductibles for Specific Services\n\n**Prescription Drugs:**\n- Individual: $350 per calendar year\n- Family: $700 per calendar year\n- **Exception:** Does not apply to Tier 1 drugs\n\n**Other Deductibles:** There are no other specific deductibles.\n\n**How It Works:** You must pay all of the costs for these services up to the specific deductible amount before this plan begins to pay for these services.\n\n### 2.4 Out-of-Pocket Limit\n\n**Network Providers:**\n- Individual: $9,200 per calendar year\n- Family: $18,400 per calendar year\n\n**Out-of-Network Providers:**\n- Individual: $18,400 per calendar year\n- Family: $36,800 per calendar year\n\n**How It Works:** The out-of-pocket limit is the most you could pay in a year for covered services. If you have other family members in this plan, they have to meet their own out-of-pocket limits until the overall family out-of-pocket limit has been met.\n\n### 2.5 What Is Not Included in the Out-of-Pocket Limit\n\nThe following expenses do NOT count toward the out-of-pocket limit:\n\n- Premiums\n- Balance-billing charges (unless balance billing is prohibited)\n- Health care this plan doesn't cover\n- Penalties for failure to obtain preauthorization for services\n\nEven though you pay these expenses, they don't count toward the out-of-pocket limit.\n\n### 2.6 Network Provider Benefits\n\n**Will you pay less if you use a network provider?** Yes.\n\n**Network Information:** See www.welcometouhc.com or call 1-800-782-3740 for a list of network providers.\n\n**Important Notes:**\n- This plan uses a provider network. You will pay less if you use a provider in the plan's network.\n- You will pay the most if you use an out-of-network provider, and you might receive a bill from a provider for the difference between the provider's charge and what your plan pays (balance billing).\n- Be aware, your network provider might use an out-of-network provider for some services (such as lab work). Check with your provider before you get services.\n\n### 2.7 Specialist Referral Requirements\n\n**Do you need a referral to see a specialist?** No.\n\nYou can see the specialist you choose without a referral.\n\n---\n\n## 3. COVERAGE AND COST SHARING\n\n**Important:** All copayment and coinsurance costs shown below are after your deductible has been met, if a deductible applies.\n\n### 3.1 Office Visits and Clinic Services\n\n#### Primary Care Visit (to treat an injury or illness)\n\n**Network Provider:**\n- **Copay:** $95 per visit\n- **Deductible:** Does not apply\n\n**Out-of-Network Provider:**\n- **Coinsurance:** 50% coinsurance\n\n**Note:** If you receive services in addition to office visit, additional copays, deductibles, or coinsurance may apply (e.g., surgery).\n\n#### Specialist Visit\n\n**Network Provider:**\n- **Copay:** $95 per visit\n- **Deductible:** Does not apply\n\n**Out-of-Network Provider:**\n- **Coinsurance:** 50% coinsurance\n\n**Note:** If you receive services in addition to office visit, additional copays, deductibles, or coinsurance may apply (e.g., surgery).\n\n#### Preventive Care/Screening/Immunization\n\n**Network Provider:**\n- **Cost:** No charge\n\n**Out-of-Network Provider:**\n- **Coverage:** Not covered\n\n**Note:** No coverage out-of-Network. Includes preventive health services specified in the health care reform law. You may have to pay for services that aren't preventive. Ask your provider...\n\n### 3.2 Emergency Services\n\n**Network Provider:**\n- **Copay:** $95 per visit\n- **Deductible:** Does not apply\n\n**Out-of-Network Provider:**\n- **Copay:** $95 per visit\n- **Deductible:** Does not apply\n\n**Note:** Emergency room copay waived if admitted.\n\n### 3.3 Inpatient Services\n\n**Network Provider:**\n- **Coinsurance:** 50% coinsurance\n- **Deductible:** Applies\n\n**Out-of-Network Provider:**\n- **Coinsurance:** 50% coinsurance\n- **Deductible:** Applies\n\n**Note:** Includes hospital stay, surgery, anesthesia, and other services.\n\n### 3.4 Outpatient Services\n\n**Network Provider:**\n- **Coinsurance:** 50% coinsurance\n- **Deductible:** Applies\n\n**Out-of-Network Provider:**\n- **Coinsurance:** 50% coinsurance\n- **Deductible:** Applies\n\n**Note:** Includes outpatient surgery, facility fees, and other outpatient services.\n\n### 3.5 Prescription Drugs\n\n**Network Provider:**\n- **Tier 1:** Copay applies (deductible does not apply to Tier 1)\n- **Tier 2:** Copay applies after prescription drug deductible\n- **Tier 3:** Copay applies after prescription drug deductible\n- **Tier 4:** Copay applies after prescription drug deductible\n\n**Out-of-Network Provider:**\n- **Coverage:** Not covered\n\n**Prescription Drug Deductible:**\n- Individual: $350 per calendar year\n- Family: $700 per calendar year\n- Does not apply to Tier 1 drugs\n\n### 3.6 Other Covered Services\n\n#### Urgent Care\n\n**Network Provider:**\n- **Copay:** $95 per visit\n- **Deductible:** Does not apply\n\n**Out-of-Network Provider:**\n- **Coinsurance:** 50% coinsurance\n\n#### Mental/Behavioral Health Services\n\n**Outpatient Services - Network Provider:**\n- **Copay:** $95 per visit\n- **Deductible:** Does not apply\n\n**Outpatient Services - Out-of-Network Provider:**\n- **Coinsurance:** 50% coinsurance\n\n**Inpatient Services - Network Provider:**\n- **Coinsurance:** 50% coinsurance\n- **Deductible:** Applies\n\n**Inpatient Services - Out-of-Network Provider:**\n- **Coinsurance:** 50% coinsurance\n- **Deductible:** Applies\n\n#### Rehabilitation Services\n\n**Network Provider:**\n- **Coinsurance:** 50% coinsurance\n- **Deductible:** Does not apply\n\n**Out-of-Network Provider:**\n- **Coinsurance:** 50% coinsurance\n\n#### Habilitation Services\n\n**Network Provider:**\n- **Coinsurance:** 50% coinsurance\n- **Deductible:** Does not apply\n\n**Out-of-Network Provider:**\n- **Coinsurance:** 50% coinsurance\n\n#### Children's Eye Exams\n\n**Network Provider:**\n- **Coverage:** Covered before deductible\n\n**Out-of-Network Provider:**\n- **Coverage:** May have limited coverage\n\n#### Children's Dental Check-up\n\n**Network Provider:**\n- **Coverage:** Covered before deductible\n\n**Out-of-Network Provider:**\n- **Coverage:** May have limited coverage\n\n---\n\n## 4. NETWORK PROVIDER INFORMATION\n\n### 4.1 Finding Network Providers\n\nTo find network providers:\n- Visit: www.welcometouhc.com\n- Call: 1-800-782-3740\n\n### 4.2 Network vs Out-of-Network Costs\n\n**Network Providers:**\n- Lower out-of-pocket costs\n- Predictable copays and coinsurance\n- No balance billing (in most cases)\n\n**Out-of-Network Providers:**\n- Higher out-of-pocket costs\n- Higher coinsurance percentages\n- May be subject to balance billing\n- Some services may not be covered\n\n### 4.3 Important Reminders\n\n- Always check if your provider is in-network before receiving services\n- Even if your primary provider is in-network, they may use out-of-network providers for certain services (such as lab work or specialists)\n- Check with your provider before receiving services to confirm network status\n- Emergency services are covered at the same rate whether in-network or out-of-network\n\n---\n\n## 5. NONDISCRIMINATION NOTICE AND ACCESS TO COMMUNICATION SERVICES\n\nUnitedHealthcare does not exclude, deny Covered Health Care Benefits to, or otherwise discriminate against any Member on the ground of race, color, national origin, ancestry, religion, sex, marital status, gender, gender identity, sexual orientation, age, or disability for participation in, or receipt of the Covered Health Care Services under, any of its Health Plans, whether carried out by UnitedHealthcare directly or through a Network Medical Group or any other entity with which UnitedHealthcare arranges to carry out Covered Health Care Services under any of its Health Plans.\n\n### 5.1 Free Communication Services\n\nFree services are available to help you communicate with us such as:\n- Letters in other languages\n- Large print formats\n- Interpreter services at no charge\n\nTo ask for help, please call the toll-free number listed on your health plan ID card.\n\n### 5.2 Filing a Complaint\n\nIf you think you weren't treated fairly because of your sex, age, race, color, national origin, or disability, you can send a complaint to:\n\n**Online:** UHC Civil Rights@uhc.com\n\n**Mail:**  \nCivil Rights Coordinator  \nUnitedHealthcare Civil Rights Grievance  \nP.O. Box 30608  \nSalt Lake City, UTAH 84130\n\n**Timeline:**\n- You must send the complaint within 60 days of when you found out about it\n- A decision will be sent to you within 30 days\n- If you disagree with the decision, you have 15 days to ask us to look at it again\n\n**Help:** If you need help with your complaint, please call the toll-free phone number listed on your health plan ID card, Monday through Friday, 8 a.m. to 8 p.m.\n\n### 5.3 Filing with U.S. Department of Health and Human Services\n\nYou can also file a complaint with the U.S. Dept. of Health and Human Services:\n\n**Online:** https://ocrportal.hhs.gov/ocr/portal/lobby.jsf\n\n**Complaint Forms:** Available at http://www.hhs.gov/ocr/office/file/index.html\n\n**Phone:**  \n- Toll-free: 1-800-368-1019\n- TDD: 800-537-7697\n\n**Mail:**  \nU.S. Dept. of Health and Human Services  \n200 Independence Avenue, SW  \nRoom 509F, HHH Building  \nWashington, D.C. 20201\n\n---\n\n## 6. ADDITIONAL INFORMATION\n\n### 6.1 Contact Information\n\n**UnitedHealthcare Customer Service:**\n- Phone: 1-800-782-3740\n- Website: www.welcometouhc.com\n\n**For General Health Insurance Information:**\n- Healthcare.gov Glossary: www.healthcare.gov/sbc-glossary/\n- Phone: 1-866-487-2365\n\n### 6.2 Preventive Care Benefits\n\nFor a complete list of covered preventive services, visit: www.healthcare.gov/coverage/preventive-care-benefits/\n\n### 6.3 Important Notes\n\n- This is a summary document. For complete terms of coverage, refer to your plan documents or contact UnitedHealthcare\n- Premium information is provided separately\n- Coverage details may vary based on your specific plan and group\n- Always verify coverage and network status before receiving services\n- Keep your health plan ID card with you at all times\n\n---\n\n**Document Reference:** SBCCA14DZHU\n\n","interview_process.md":"# AMAZON INC.\n## INTERVIEW PROCESS GUIDELINES\n\n**Document Number:** Task 102  \n**Effective Date:** January 1, 2024  \n**Last Revised:** January 1, 2024  \n**Policy Owner:** Human Resources Department  \n**Approved By:** Chief Human Resources Officer\n\n---\n\n## 1. PURPOSE AND OVERVIEW\n\nThis document provides practical guidance for conducting effective, legal, and consistent interviews at Amazon Inc. These guidelines help hiring managers and interview team members:\n\n- Conduct structured, competency-based interviews\n- Evaluate candidates fairly and objectively\n- Comply with employment laws\n- Create positive candidate experiences\n- Make informed hiring decisions\n\nAll employees participating in interviews must review and follow these guidelines.\n\n## 2. INTERVIEW PREPARATION\n\n### 2.1 Before the Interview\n\n**Review Materials:**\n- Read candidate's resume and application thoroughly\n- Review job description and key requirements\n- Understand the role's essential functions\n- Review any assessments or work samples submitted\n\n**Prepare Questions:**\n- Develop 5-8 core questions focused on key competencies\n- Use behavioral questions (\"Tell me about a time when...\")\n- Prepare follow-up probes\n- Coordinate with other interviewers to avoid duplication\n\n**Logistics:**\n- Confirm interview time and location\n- Reserve conference room or set up video call\n- Allocate sufficient time (typically 45-60 minutes)\n- Plan to arrive 5 minutes early\n- Have water available for in-person interviews\n\n**Know What You're Evaluating:**\n- Identify 3-4 key competencies for the role\n- Understand must-have vs. nice-to-have qualifications\n- Clarify decision criteria with hiring manager\n- Review compensation range\n\n### 2.2 Creating a Welcoming Environment\n\n**In-Person Interviews:**\n- Greet candidate warmly\n- Offer water or coffee\n- Provide overview of interview format\n- Put candidate at ease with brief small talk\n\n**Virtual Interviews:**\n- Test technology in advance\n- Send calendar invite with video link\n- Join video call 2-3 minutes early\n- Ensure professional background and lighting\n- Minimize distractions\n\n## 3. INTERVIEW STRUCTURE\n\n### 3.1 Recommended Interview Flow\n\n**Opening (5 minutes):**\n- Welcome and introductions\n- Brief overview of interview format and timing\n- Ask if candidate has any questions before starting\n\n**Experience and Background (10-15 minutes):**\n- Walk through resume and career progression\n- Clarify dates, roles, and responsibilities\n- Understand career motivations and transitions\n\n**Competency-Based Questions (25-30 minutes):**\n- Ask prepared behavioral questions\n- Use STAR method to evaluate responses\n- Probe for depth and specifics\n- Take notes on responses\n\n**Role and Company Discussion (5-10 minutes):**\n- Describe the position and expectations\n- Explain team structure and reporting relationships\n- Share information about company culture and values\n- Discuss growth opportunities\n\n**Candidate Questions (5-10 minutes):**\n- Give candidate time to ask questions\n- Answer honestly and thoroughly\n- Note quality and depth of questions asked\n\n**Closing (2-3 minutes):**\n- Explain next steps and timeline\n- Provide contact information\n- Thank candidate for their time\n\n### 3.2 Interview Timing\n\n**Typical Interview Lengths:**\n- Phone screen: 20-30 minutes\n- First-round interview: 45-60 minutes\n- Second-round interview: 60-90 minutes (may include multiple interviewers)\n- Final interview: 30-60 minutes\n- Panel interview: 60-90 minutes\n\nStart and end on time. If running over, ask candidate if they can stay longer.\n\n## 4. BEHAVIORAL INTERVIEWING TECHNIQUES\n\n### 4.1 What is Behavioral Interviewing\n\nBehavioral interviewing is based on the principle that past behavior is the best predictor of future performance. Instead of hypothetical questions, ask candidates to describe specific situations from their experience.\n\n**Traditional Question:**\n\"How would you handle a difficult customer?\"\n\n**Behavioral Question:**\n\"Tell me about a time when you dealt with a difficult customer. What was the situation and how did you handle it?\"\n\n### 4.2 The STAR Method\n\nEvaluate responses using the STAR framework:\n\n**S - Situation:**\n- What was the context?\n- When and where did this occur?\n- Who was involved?\n\n**T - Task:**\n- What was the challenge or goal?\n- What was the candidate's role?\n- What needed to be accomplished?\n\n**A - Action:**\n- What specific actions did the candidate take?\n- What was their thought process?\n- How did they approach the problem?\n\n**R - Result:**\n- What was the outcome?\n- What did they learn?\n- What would they do differently?\n- Were there measurable results?\n\n### 4.3 Sample Behavioral Questions by Competency\n\n**Problem Solving:**\n- \"Describe a complex problem you faced at work. How did you approach solving it?\"\n- \"Tell me about a time when you had to make a decision without having all the information you needed.\"\n\n**Teamwork and Collaboration:**\n- \"Give me an example of a successful team project you contributed to. What was your role?\"\n- \"Describe a time when you had to work with a difficult team member. How did you handle it?\"\n\n**Leadership:**\n- \"Tell me about a time when you had to motivate a team during a challenging period.\"\n- \"Describe a situation where you had to give difficult feedback to someone.\"\n\n**Adaptability:**\n- \"Describe a time when you had to quickly adapt to a significant change at work.\"\n- \"Tell me about a project where the requirements or direction changed midstream.\"\n\n**Communication:**\n- \"Give me an example of a time when you had to explain something complex to someone unfamiliar with the topic.\"\n- \"Describe a situation where you had to influence someone without direct authority.\"\n\n**Initiative:**\n- \"Tell me about a time when you identified a problem and took action without being asked.\"\n- \"Describe a project or idea you initiated on your own.\"\n\n**Time Management:**\n- \"Describe a situation where you had multiple deadlines competing for your attention. How did you prioritize?\"\n- \"Tell me about a time when you had to complete a project with a tight deadline.\"\n\n**Conflict Resolution:**\n- \"Describe a disagreement you had with a coworker. How did you resolve it?\"\n- \"Tell me about a time when you had to mediate between two people who disagreed.\"\n\n### 4.4 Probing Questions\n\nIf a candidate's initial response lacks detail, use probing questions:\n\n- \"Can you tell me more about that?\"\n- \"What specifically did you do?\"\n- \"What was your exact role in that situation?\"\n- \"What were you thinking at that moment?\"\n- \"How did others react?\"\n- \"What was the outcome?\"\n- \"What would you do differently next time?\"\n\nDon't accept vague or generalized answers. Dig deeper to understand the candidate's actual contribution and decision-making.\n\n### 4.5 Red Flags in Responses\n\n**Watch for:**\n- Vague answers without specifics\n- Speaking in \"we\" instead of \"I\" (unable to articulate personal contribution)\n- Cannot provide concrete examples\n- Blames others without taking accountability\n- Inconsistencies in story\n- Exaggerates or embellishes\n- Negative attitude about former employers or colleagues\n\n## 5. LEGAL COMPLIANCE\n\n### 5.1 Prohibited Questions\n\n**Never Ask About:**\n- Age or date of birth\n- Race, ethnicity, or national origin\n- Religion or religious observances\n- Marital status, pregnancy, or family plans\n- Sexual orientation or gender identity\n- Disabilities or medical conditions\n- Genetic information\n- Arrest records (conviction records are permissible if job-related)\n- Military discharge status\n- Citizenship (may ask about work authorization)\n- Financial status (unless directly job-related for financial positions)\n\n### 5.2 Acceptable vs. Unacceptable Questions\n\n| Topic | UNACCEPTABLE | ACCEPTABLE |\n|-------|-------------|------------|\n| Age | \"How old are you?\" | \"Are you over 18?\" (if required for job) |\n| Family | \"Do you have children?\" \"Are you planning to have children?\" | \"Are you able to work required hours/travel?\" (ask all candidates) |\n| Disability | \"Do you have any disabilities?\" | \"Can you perform the essential functions of this job with or without accommodation?\" |\n| National Origin | \"Where were you born?\" \"What's your native language?\" | \"Are you authorized to work in the United States?\" |\n| Religion | \"What religion do you practice?\" \"What holidays do you observe?\" | \"Are you available to work [specific schedule/days]?\" (ask all candidates) |\n| Arrest Record | \"Have you ever been arrested?\" | \"Have you been convicted of [specific crime relevant to job]?\" |\n| Military | \"What type of discharge did you receive?\" | \"What type of training/experience did you gain in the military?\" |\n\n### 5.3 Discussing Accommodations\n\nYou **may** ask: \"Can you perform the essential functions of this job with or without reasonable accommodation?\"\n\nIf candidate discloses a need for accommodation:\n- Discuss what accommodations might be needed\n- Engage in interactive process\n- Do not ask about nature or severity of disability\n- Do not ask about medical history\n- Refer to HR if questions arise\n\n### 5.4 Work Authorization\n\nYou **may** ask: \"Are you authorized to work in the United States?\"\n\nYou **may not** ask:\n- \"Are you a U.S. citizen?\"\n- \"Where were you born?\"\n- \"What is your immigration status?\"\n\nAll candidates must complete Form I-9 after hire (not during interview).\n\n## 6. EVALUATION AND DECISION MAKING\n\n### 6.1 Note-Taking\n\n**Do:**\n- Take notes during interview\n- Record specific examples and responses\n- Note both strengths and concerns\n- Document relevant job-related observations\n\n**Don't:**\n- Write notes about protected characteristics\n- Record subjective judgments unrelated to job (\"too old,\" \"won't fit in\")\n- Make comments about appearance, accent, or personal characteristics\n- Write anything you wouldn't want a lawyer to read in court\n\n**Remember:** Your notes may be requested in legal proceedings. Keep them professional and job-focused.\n\n### 6.2 Evaluation Criteria\n\n**Rate candidates on:**\n- Technical skills and qualifications\n- Relevant experience\n- Cultural fit and values alignment\n- Communication skills\n- Problem-solving ability\n- Specific competencies required for role\n\n**Use standardized rating scale:**\n- 1 - Does not meet requirements\n- 2 - Partially meets requirements\n- 3 - Meets requirements\n- 4 - Exceeds requirements\n- 5 - Far exceeds requirements\n\n### 6.3 Completing Interview Feedback\n\n**Submit feedback within 24 hours:**\n- Complete evaluation form in applicant tracking system\n- Provide ratings for each competency area\n- Include specific examples supporting ratings\n- Note any concerns or red flags\n- Recommend: advance, reject, or need more information\n\n**Feedback should be:**\n- Specific and evidence-based\n- Job-related\n- Objective\n- Balanced (strengths and weaknesses)\n- Free from bias or stereotypes\n\n### 6.4 Avoiding Bias\n\n**Common Biases to Avoid:**\n\n**Halo/Horn Effect:**\n- Don't let one positive trait overshadow weaknesses (halo)\n- Don't let one negative trait overshadow strengths (horn)\n\n**Similar-to-Me Bias:**\n- Don't favor candidates who share your background, interests, or experiences\n- Focus on job requirements, not personal similarities\n\n**First Impression Bias:**\n- Don't make snap judgments in first 5 minutes\n- Give candidates fair opportunity to demonstrate qualifications\n\n**Contrast Effect:**\n- Don't compare candidates to each other\n- Evaluate each against job requirements independently\n\n**Confirmation Bias:**\n- Don't look only for information confirming initial opinion\n- Remain open to evidence contradicting first impression\n\n**Recency Bias:**\n- Don't give more weight to most recent interviews\n- Review notes from all candidates when making decision\n\n**Strategies to Reduce Bias:**\n- Use structured interviews with same questions for all candidates\n- Take detailed notes rather than relying on memory\n- Use diverse interview panels\n- Focus on job-related competencies\n- Make decisions based on evidence, not gut feeling\n\n## 7. SPECIAL INTERVIEW SITUATIONS\n\n### 7.1 Panel Interviews\n\n**Benefits:**\n- Multiple perspectives on candidate\n- More efficient than sequential interviews\n- Reduces individual bias\n\n**Best Practices:**\n- Designate lead interviewer to facilitate\n- Assign questions to specific panelists in advance\n- Avoid talking over each other\n- Give candidate time to respond fully\n- Debrief immediately after interview\n\n### 7.2 Virtual Interviews\n\n**Preparation:**\n- Test technology (camera, microphone, internet)\n- Use professional background or blur feature\n- Ensure good lighting\n- Minimize background noise and distractions\n- Have backup plan (phone number) if tech fails\n\n**During Interview:**\n- Make eye contact by looking at camera\n- Speak clearly and at moderate pace\n- Be mindful of lag time\n- Watch for visual cues that candidate wants to speak\n- Use screen sharing if reviewing documents or portfolio\n\n**Considerations:**\n- Some candidates less comfortable with video\n- May be technical difficulties beyond candidate's control\n- Harder to build rapport virtually\n- Give grace for minor technical issues\n\n### 7.3 Phone Screenings\n\n**Purpose:**\n- Initial screening before investing time in full interview\n- Assess basic qualifications and interest\n- Clarify resume questions\n- Gauge communication skills\n\n**Structure:**\n- 15-30 minutes maximum\n- Focus on key qualifications\n- Explain role and expectations\n- Discuss salary range and availability\n- Determine if candidate should advance\n\n**Tips:**\n- Eliminate distractions\n- Have resume and job description in front of you\n- Take notes\n- Listen actively\n- Be prepared to sell opportunity if strong candidate\n\n### 7.4 Interviewing Internal Candidates\n\n**Special Considerations:**\n- May have more knowledge of company/role\n- Evaluate objectively against external candidates\n- Consider current performance and potential\n- Discuss transition timeline if selected\n- Handle rejection sensitively to preserve relationship\n\n**Don't:**\n- Assume you know internal candidate's capabilities\n- Give internal candidate unfair advantage\n- Skip standard interview process\n- Make promises about outcome\n\n### 7.5 Interviewing Former Employees\n\n**What to Consider:**\n- Reason for previous departure\n- Performance in previous role\n- Time since departure\n- Changes in person or company\n- Manager's perspective on return\n\n**Questions to Ask:**\n- \"Why are you interested in returning to Amazon?\"\n- \"What did you learn from your time away?\"\n- \"What would you do differently this time?\"\n- \"What attracted you to this specific role?\"\n\n### 7.6 Campus and Entry-Level Recruiting\n\n**Adjust Approach:**\n- Focus on potential over experience\n- Ask about coursework, projects, internships\n- Evaluate learning agility and enthusiasm\n- Discuss career development opportunities\n- Provide more information about company and role\n\n**Questions for New Graduates:**\n- \"Describe a challenging academic project. How did you approach it?\"\n- \"Tell me about a time you balanced multiple priorities (school, work, activities).\"\n- \"What have you learned from your internship experiences?\"\n- \"Why are you interested in this field/industry?\"\n\n## 8. SELLING THE OPPORTUNITY\n\n### 8.1 Why Selling Matters\n\nStrong candidates often have multiple offers. Part of your role is to:\n- Generate excitement about the opportunity\n- Showcase company culture and values\n- Explain growth and development possibilities\n- Build relationship with candidate\n\n### 8.2 What to Highlight\n\n**About the Role:**\n- Impactful work and key responsibilities\n- Opportunities for growth and advancement\n- Learning and development support\n- Team dynamics and collaboration\n\n**About the Company:**\n- Mission and values\n- Market position and growth trajectory\n- Innovation and industry leadership\n- Culture and employee engagement\n- Work-life balance and flexibility\n- Awards and recognition\n\n**About the Team:**\n- Team structure and dynamics\n- Collaborative environment\n- Diversity of backgrounds and perspectives\n- Support and mentorship\n\n### 8.3 Answering Candidate Questions Honestly\n\n**Be Truthful About:**\n- Challenges of the role\n- Areas where company is still developing\n- Work pace and demands\n- Why position is open\n\n**Don't:**\n- Overpromise on advancement or compensation\n- Misrepresent culture or expectations\n- Dismiss legitimate concerns\n- Provide inaccurate information\n\nSetting accurate expectations leads to better long-term fit and retention.\n\n## 9. AFTER THE INTERVIEW\n\n### 9.1 Debrief Meeting\n\n**When to Debrief:**\n- Immediately after interview while impressions are fresh\n- Within 24 hours maximum\n\n**What to Discuss:**\n- Overall impressions\n- Specific strengths and concerns\n- Evidence for and against hiring\n- Comparison to job requirements\n- Cultural fit assessment\n- Recommendation (advance, reject, need more info)\n\n**Decision-Making:**\n- Hiring manager makes final decision\n- Considers all feedback from interview team\n- HR provides guidance on process and compliance\n- Hiring manager notifies HR of decision\n\n### 9.2 Documenting Decisions\n\n**In Applicant Tracking System:**\n- Record all feedback and ratings\n- Document reasons for advancing or rejecting\n- Note any concerns that need further exploration\n- Keep decisions job-related and objective\n\n**Audit Trail:**\n- System maintains history of decisions\n- Ensures accountability and consistency\n- Supports defense if hiring decision questioned\n\n### 9.3 Reference Checks\n\nIf moving forward with candidate:\n- Conduct reference checks before offer\n- Ask structured questions about performance\n- Listen for what's not said\n- Verify employment dates and titles\n- Ask about rehire eligibility\n\n## 10. COMMON INTERVIEW MISTAKES\n\n### 10.1 Mistakes to Avoid\n\n**Talking Too Much:**\n- Interview should be 70% candidate talking, 30% interviewer\n- Don't monopolize conversation\n- Give candidate time to fully answer\n\n**Leading Questions:**\n- Don't suggest desired answer\n- Bad: \"We value teamwork here. Are you a team player?\"\n- Good: \"Describe your experience working in teams.\"\n\n**Not Listening:**\n- Don't mentally prepare next question while candidate speaks\n- Focus on what candidate is actually saying\n- Take notes to help remember details\n\n**Making Snap Judgments:**\n- Don't decide in first 5 minutes\n- Give candidate full interview to demonstrate qualifications\n- Evaluate based on entire interview, not first impression\n\n**Forgetting to Sell:**\n- Don't treat interview as interrogation\n- Balance evaluation with selling opportunity\n- Show enthusiasm for role and company\n\n**Not Preparing:**\n- Don't wing it\n- Review materials and prepare questions\n- Understand role requirements\n\n**Asking Hypothetical Questions:**\n- Don't ask \"What would you do if...\"\n- Ask for actual examples: \"Tell me about a time when...\"\n\n**Allowing Interruptions:**\n- Don't check phone or email during interview\n- Give candidate full attention\n- Close door and minimize distractions\n\n## 11. CANDIDATE REJECTION GUIDELINES\n\n### 11.1 When to Reject Candidates\n\n**Post-Application Review:**\n- Does not meet minimum qualifications\n- Resume shows significant unexplained gaps\n- Application contains false information\n- Compensation expectations far exceed budget\n\n**Post-Phone Screen:**\n- Basic qualifications not as strong as indicated on resume\n- Poor communication skills for role requirements\n- Lack of genuine interest in position\n- Availability doesn't match needs\n\n**Post-Interview:**\n- Insufficient experience or skills\n- Poor cultural fit\n- Negative references\n- Better qualified candidates in pipeline\n- Concerns about reliability or professionalism\n\n**Post-Background Check:**\n- Failed background check (see Recruitment & Hiring Policy)\n- Failed drug test (for applicable positions)\n- Unable to verify credentials\n- Discrepancies in employment history\n\n### 11.2 Timing of Rejection Communication\n\n**Prompt Notification:**\n- Post-resume review: Within 2 weeks of application\n- Post-phone screen: Within 1 week\n- Post-first interview: Within 1-2 weeks\n- Post-final interview: Within 1 week\n\n**Why Timely Communication Matters:**\n- Shows respect for candidate's time\n- Maintains positive employer brand\n- Allows candidates to pursue other opportunities\n- Reflects professional organization\n\n### 11.3 Methods of Communication\n\n**Email Rejection (Appropriate for):**\n- Early-stage candidates (application review, phone screen)\n- High-volume recruiting situations\n- When candidate relationship is minimal\n\n**Phone Call Rejection (Recommended for):**\n- Final-round candidates\n- Internal candidates\n- When lengthy interview process\n- When candidate asked for feedback\n- When candidate was a strong contender\n\n**In-Person Rejection (Reserved for):**\n- Internal candidates (when appropriate)\n- When candidate is well-known to organization\n- Executive-level positions\n\n### 11.4 What to Say in Rejection Communications\n\n**Key Messages to Include:**\n- Thank candidate for their time and interest\n- Indicate decision has been made\n- Communicate decision clearly (don't leave false hope)\n- Encourage future applications if appropriate\n- Maintain professional, respectful tone\n\n**Email Rejection Template - Early Stage:**\n\n*Subject: Update on Your Application - [Position Title]*\n\nDear [Candidate Name],\n\nThank you for your interest in the [Position Title] role at Amazon and for taking the time to apply.\n\nAfter careful review of your application, we have decided to move forward with other candidates whose qualifications more closely match our current needs for this position.\n\nWe appreciate your interest in Amazon and encourage you to apply for future opportunities that align with your background and experience. You can view our current openings at [careers website].\n\nWe wish you the best in your job search.\n\nSincerely,\n[Name]\nTalent Acquisition Team\n\n---\n\n**Email Rejection Template - Post-Interview:**\n\n*Subject: [Position Title] Interview Follow-Up*\n\nDear [Candidate Name],\n\nThank you for taking the time to interview for the [Position Title] position and for your interest in joining Amazon. We enjoyed learning about your experience and appreciated the opportunity to meet with you.\n\nAfter careful consideration, we have decided to move forward with another candidate whose background and experience more closely align with the specific requirements of this role.\n\nThis was a competitive process with many qualified candidates, and we recognize the time and effort you invested in interviewing with us. We were impressed by [specific positive element from interview] and encourage you to apply for future opportunities that match your skills and experience.\n\nThank you again for your interest in Amazon. We wish you continued success in your career.\n\nBest regards,\n[Hiring Manager Name]\n\n---\n\n**Phone Call Rejection Script:**\n\n\"Hi [Candidate Name], this is [Your Name] from Amazon. Do you have a few minutes to talk?\n\nI wanted to reach out personally to let you know that we've made a decision on the [Position Title] role. After careful consideration, we've decided to move forward with another candidate.\n\nThis was a very competitive process, and we had several strong candidates to choose from. Your [specific strength] really stood out, and we were impressed by [specific positive element]. Ultimately, we selected a candidate whose experience in [specific area] more closely matched our immediate needs.\n\nI want to thank you for the time you invested in our process and for your interest in Amazon. [If appropriate: I'd encourage you to keep an eye on our careers page for future opportunities that might be a fit.]\n\nDo you have any questions for me?\"\n\n### 11.5 Providing Feedback\n\n**General Guidelines:**\n- Not legally required to provide feedback\n- Use caution when providing detailed feedback\n- Keep feedback high-level and constructive\n- Avoid statements that could be legally problematic\n\n**When to Provide Feedback:**\n- Final-round candidates who request it\n- Internal candidates (with appropriate care)\n- When there's a developmental relationship\n\n**When to Decline Feedback:**\n- Legal concerns about discrimination claims\n- Concerns candidate will argue or become hostile\n- No clear, objective basis for decision\n- Company policy prohibits (consult HR)\n\n**How to Provide Constructive Feedback:**\n\n**Do:**\n- Focus on qualifications and fit, not personality\n- Provide specific, job-related observations\n- Frame as developmental areas\n- Suggest areas for growth\n- Keep it brief (2-3 key points maximum)\n\n**Don't:**\n- Provide exhaustive list of deficiencies\n- Make it personal or attack character\n- Compare to other candidates\n- Discuss protected characteristics\n- Put anything in writing that could be misinterpreted\n\n**Sample Feedback Statements:**\n\n\u2705 GOOD:\n- \"We were looking for someone with more direct experience managing enterprise-level implementations.\"\n- \"The role requires extensive public speaking, and we selected a candidate with a stronger presentation background.\"\n- \"We needed someone who could start immediately, and another candidate had better availability.\"\n\n\u274c AVOID:\n- \"You're not a good cultural fit.\" (Too vague, could imply bias)\n- \"You seemed nervous and not confident enough.\" (Subjective, could relate to disability)\n- \"We went with someone younger and more energetic.\" (Age discrimination)\n- \"We needed someone more technical.\" (If said to a woman in tech, could imply gender bias)\n\n### 11.6 Handling Difficult Rejection Conversations\n\n**If Candidate Becomes Emotional:**\n- Remain calm and empathetic\n- Allow them to express feelings\n- Don't argue or become defensive\n- Reiterate appreciation for their interest\n- End conversation professionally if becomes inappropriate\n\n**If Candidate Argues or Challenges Decision:**\n- Remain professional and firm\n- Restate that decision is final\n- Don't provide additional detail or justification\n- Don't be drawn into debate\n- End call if necessary: \"I understand you're disappointed, but the decision is final. I wish you the best in your search.\"\n\n**If Candidate Threatens Legal Action:**\n- Remain calm and professional\n- Don't admit fault or apologize excessively\n- Document conversation immediately\n- Report to HR and Legal immediately\n- Do not continue to engage with candidate\n\n**If Candidate Asks About Discrimination:**\n- Take concern seriously\n- Document specific allegations\n- Refer to HR immediately\n- Don't dismiss or argue\n- Don't provide detailed defense\n\n### 11.7 Rejection of Internal Candidates\n\n**Special Considerations:**\n- More sensitive due to ongoing employment relationship\n- Risk of disengagement or resignation\n- May impact team morale\n- Requires thoughtful communication\n\n**Best Practices:**\n\n**Timing:**\n- Notify before external candidates\n- Don't let them hear through grapevine\n- Allow time to process before announcement\n\n**Communication:**\n- Phone call or in-person (not email)\n- Private setting\n- Sufficient time for discussion\n- Involve current manager if appropriate\n\n**Message:**\n- Be direct but compassionate\n- Acknowledge their strengths and contributions\n- Explain decision objectively\n- Discuss development opportunities\n- Reaffirm value to organization in current role\n- Discuss path forward\n\n**Follow-Up:**\n- Check in within a week\n- Offer development planning\n- Discuss future opportunities\n- Monitor engagement and morale\n\n**Sample Internal Rejection Script:**\n\n\"[Name], I wanted to talk with you about the [Position Title] role you interviewed for. First, I want to thank you for putting yourself forward and for the time you invested in the process.\n\nAfter careful consideration, we've decided to move forward with another candidate. This was a difficult decision because you have [specific strengths]. Ultimately, we selected someone with [specific differentiator relevant to role].\n\nI want to be clear that this doesn't diminish the value you bring in your current role. Your work on [specific contributions] has been excellent, and you're an important part of the team.\n\nI'd like to discuss how we can support your development and career growth here at Amazon. Are you open to having that conversation?\"\n\n### 11.8 Maintaining Candidate Relationships\n\n**Why It Matters:**\n- Future job openings may be better fit\n- Candidate may refer others\n- Candidate may become customer or partner\n- Protects employer brand and reputation\n\n**Silver Medal Program:**\n- Keep strong candidates warm for future openings\n- Add to talent pipeline or talent community\n- Notify of relevant future opportunities\n- Maintain relationship through periodic touchpoints\n\n**Candidate Reapplication:**\n- Welcome qualified candidates to reapply\n- Review with fresh perspective\n- Don't hold past rejection against them\n- Consider growth since last application\n\n### 11.9 Legal Considerations\n\n**Document Everything:**\n- Reason for rejection must be job-related\n- Document in applicant tracking system\n- Keep notes professional and objective\n- Consistent treatment across candidates\n\n**Avoid Discriminatory Reasons:**\n- Never reject based on protected characteristics\n- Ensure reason is legitimate and non-discriminatory\n- Apply same standards to all candidates\n- Be prepared to defend decision if challenged\n\n**Retain Records:**\n- Keep all application materials per retention policy\n- Maintain interview notes and evaluations\n- Document communication with candidate\n- Store securely and confidentially\n\n**Red Flags Requiring HR/Legal Review:**\n- Candidate threatens legal action\n- Decision could appear discriminatory\n- Internal candidate with performance issues\n- High-profile or executive-level rejection\n- Unusual circumstances or complications\n\n## 12. TRAINING AND RESOURCES\n\n### 12.1 Required Training\n\nAll hiring managers and frequent interviewers must complete:\n- Interview skills training (4 hours)\n- Legal compliance in hiring (2 hours)\n- Unconscious bias awareness (2 hours)\n- Candidate communication and rejection best practices (1 hour)\n- Annual refresher training\n\n### 12.2 Available Resources\n\n**Interview Question Bank:**\n- Organized by competency\n- Behavioral and situational questions\n- Follow-up probes\n- Access via HR portal\n\n**Interview Evaluation Templates:**\n- Standardized rating forms\n- Competency scorecards\n- Reference check forms\n\n**Rejection Communication Templates:**\n- Email templates for various stages\n- Phone script templates\n- Internal candidate rejection guidance\n\n**Support from HR:**\n- Consult with HR Business Partner or Recruiting team\n- Questions about process or compliance\n- Coaching on interview techniques\n- Debriefing on difficult interviews\n- Guidance on candidate rejections and feedback\n\n## 13. QUESTIONS AND SUPPORT\n\nFor questions about interview process or to request training:\n\n**Talent Acquisition Team:**\n- Phone: (555) 123-4590\n- Email: recruiting@weaverenterprises.com\n\n**HR Business Partners:**\n- Provide consulting on interview strategy\n- Available for interview coaching\n- Can participate in interviews for key roles\n\n**Training & Development:**\n- Schedule interview training\n- Access online learning modules\n\n---\n\n**Remember:** The interview is your opportunity to find the best candidate while representing Amazon professionally. Follow these guidelines to conduct effective, legal, and fair interviews that lead to great hires.","interview_process_per_job.md":"# Interview Process by Job Requisition\n\nThis document outlines the specific interview process and steps for each open job requisition. Each role has a tailored interview loop designed to assess the skills and competencies most relevant to that position.\n\n---\n\n## REQ-2026-001: Software Development Engineer\n\n**Requisition ID:** REQ-2026-001\n**Hiring Manager:** Robert Kim (Engineering Manager)\n**Recruiter:** Emily Davis (Senior Recruiter)\n\n### Interview Stages\n\n| Stage | Duration | Interviewer(s) | Focus Areas |\n|-------|----------|----------------|-------------|\n| 1. Recruiter Screen | 30 min | Emily Davis | Resume review, role fit, salary expectations, timeline |\n| 2. Technical Phone Screen | 60 min | James Brown | Coding fundamentals, data structures, problem-solving |\n| 3. Technical Interview 1 | 60 min | Kevin Nguyen | System design, architecture, scalability |\n| 4. Technical Interview 2 | 60 min | Priya Sharma | Coding deep-dive, algorithms, code quality |\n| 5. Behavioral Interview | 45 min | Robert Kim | Leadership principles, teamwork, conflict resolution |\n| 6. Bar Raiser | 45 min | Daniel Harris | Overall assessment, culture fit, hiring bar |\n\n### Debrief & Decision\n- **Debrief Meeting:** Within 24 hours of final interview\n- **Participants:** All interviewers + Hiring Manager\n- **Decision Timeline:** 2-3 business days post-debrief\n\n---\n\n## REQ-2026-002: Product Manager\n\n**Requisition ID:** REQ-2026-002\n**Hiring Manager:** Sarah Johnson (VP of Talent Acquisition)\n**Recruiter:** Emily Davis (Senior Recruiter)\n\n### Interview Stages\n\n| Stage | Duration | Interviewer(s) | Focus Areas |\n|-------|----------|----------------|-------------|\n| 1. Recruiter Screen | 30 min | Emily Davis | Background, PM experience, career goals |\n| 2. Hiring Manager Screen | 45 min | Sarah Johnson | Product sense, strategic thinking, role alignment |\n| 3. Product Case Study | 60 min | Michael Chen | Product strategy, prioritization, metrics |\n| 4. Technical Interview | 45 min | Robert Kim | Technical acumen, working with engineers |\n| 5. Cross-functional Interview | 45 min | Jennifer Martinez | Stakeholder management, communication |\n| 6. Executive Interview | 45 min | Sarah Johnson | Leadership, vision, culture fit |\n\n### Debrief & Decision\n- **Debrief Meeting:** Within 24 hours of final interview\n- **Participants:** All interviewers + Hiring Manager\n- **Decision Timeline:** 2-3 business days post-debrief\n\n---\n\n## REQ-2026-003: Data Scientist\n\n**Requisition ID:** REQ-2026-003\n**Hiring Manager:** Robert Kim (Engineering Manager)\n**Recruiter:** Samantha Lewis (University Recruiter)\n\n### Interview Stages\n\n| Stage | Duration | Interviewer(s) | Focus Areas |\n|-------|----------|----------------|-------------|\n| 1. Recruiter Screen | 30 min | Samantha Lewis | Background, research experience, role fit |\n| 2. Technical Phone Screen | 60 min | Priya Sharma | Statistics, ML fundamentals, coding |\n| 3. ML Deep Dive | 60 min | Daniel Harris | Model development, experimentation, deployment |\n| 4. Case Study Presentation | 60 min | Robert Kim + Priya Sharma | End-to-end ML project, methodology, results |\n| 5. Behavioral Interview | 45 min | Robert Kim | Collaboration, ambiguity, impact |\n| 6. Bar Raiser | 45 min | Victoria Wells | Overall assessment, research aptitude |\n\n### Debrief & Decision\n- **Debrief Meeting:** Within 24 hours of final interview\n- **Participants:** All interviewers + Hiring Manager\n- **Decision Timeline:** 2-3 business days post-debrief\n\n---\n\n## REQ-2026-004: UX Designer\n\n**Requisition ID:** REQ-2026-004\n**Hiring Manager:** Michael Chen (Talent Acquisition Manager)\n**Recruiter:** Maria Garcia (Recruiting Coordinator)\n\n### Interview Stages\n\n| Stage | Duration | Interviewer(s) | Focus Areas |\n|-------|----------|----------------|-------------|\n| 1. Recruiter Screen | 30 min | Maria Garcia | Portfolio overview, experience, role interest |\n| 2. Portfolio Review | 60 min | Michael Chen | Design process, case studies, craft |\n| 3. Design Exercise | 90 min | Michael Chen + Emily Davis | Whiteboard design challenge, problem-solving |\n| 4. Cross-functional Interview | 45 min | Robert Kim | Collaboration with engineering, handoff process |\n| 5. Behavioral Interview | 45 min | Jennifer Martinez | User advocacy, feedback handling, teamwork |\n| 6. Final Interview | 45 min | Sarah Johnson | Culture fit, career growth, design vision |\n\n### Debrief & Decision\n- **Debrief Meeting:** Within 24 hours of final interview\n- **Participants:** All interviewers + Hiring Manager\n- **Decision Timeline:** 2-3 business days post-debrief\n\n---\n\n## REQ-2026-005: Technical Program Manager\n\n**Requisition ID:** REQ-2026-005\n**Hiring Manager:** Nancy Cooper (Operations Director)\n**Recruiter:** Emily Davis (Senior Recruiter)\n\n### Interview Stages\n\n| Stage | Duration | Interviewer(s) | Focus Areas |\n|-------|----------|----------------|-------------|\n| 1. Recruiter Screen | 30 min | Emily Davis | Program management background, certifications |\n| 2. Hiring Manager Screen | 45 min | Nancy Cooper | Experience overview, management style |\n| 3. Technical Assessment | 60 min | Robert Kim | Technical depth, system understanding |\n| 4. Program Management Case | 60 min | Christopher Taylor | Risk management, stakeholder coordination |\n| 5. Cross-functional Interview | 45 min | Victoria Wells | Executive communication, strategic thinking |\n| 6. Behavioral Interview | 45 min | Nancy Cooper | Leadership principles, conflict resolution |\n\n### Debrief & Decision\n- **Debrief Meeting:** Within 24 hours of final interview\n- **Participants:** All interviewers + Hiring Manager\n- **Decision Timeline:** 2-3 business days post-debrief\n\n---\n\n## REQ-2026-006: Senior Data Engineer\n\n**Requisition ID:** REQ-2026-006\n**Hiring Manager:** Robert Kim (Engineering Manager)\n**Recruiter:** Emily Davis (Senior Recruiter)\n\n### Interview Stages\n\n| Stage | Duration | Interviewer(s) | Focus Areas |\n|-------|----------|----------------|-------------|\n| 1. Recruiter Screen | 30 min | Emily Davis | Data engineering experience, tech stack |\n| 2. Technical Phone Screen | 60 min | Priya Sharma | SQL, Python, data modeling |\n| 3. System Design | 75 min | Daniel Harris | Data pipeline architecture, scalability |\n| 4. Coding Deep Dive | 60 min | Marcus Robinson | Spark, Kafka, streaming vs batch |\n| 5. Behavioral Interview | 45 min | Robert Kim | Ownership, mentorship, collaboration |\n| 6. Bar Raiser | 45 min | Victoria Wells | Overall assessment, senior-level expectations |\n\n### Debrief & Decision\n- **Debrief Meeting:** Within 24 hours of final interview\n- **Participants:** All interviewers + Hiring Manager\n- **Decision Timeline:** 2-3 business days post-debrief\n\n---\n\n## REQ-2026-007: Machine Learning Engineer\n\n**Requisition ID:** REQ-2026-007\n**Hiring Manager:** Robert Kim (Engineering Manager)\n**Recruiter:** Emily Davis (Senior Recruiter)\n\n### Interview Stages\n\n| Stage | Duration | Interviewer(s) | Focus Areas |\n|-------|----------|----------------|-------------|\n| 1. Recruiter Screen | 30 min | Emily Davis | ML engineering background, production experience |\n| 2. Technical Phone Screen | 60 min | Priya Sharma | ML fundamentals, coding, model training |\n| 3. ML System Design | 75 min | Daniel Harris | ML infrastructure, model serving, monitoring |\n| 4. Coding Interview | 60 min | Kevin Nguyen | Algorithms, optimization, PyTorch/TensorFlow |\n| 5. Research Discussion | 45 min | Robert Kim | Publications, novel approaches, staying current |\n| 6. Behavioral + Bar Raiser | 60 min | Victoria Wells | Culture fit, leadership principles, hiring bar |\n\n### Debrief & Decision\n- **Debrief Meeting:** Within 24 hours of final interview\n- **Participants:** All interviewers + Hiring Manager\n- **Decision Timeline:** 2-3 business days post-debrief\n\n---\n\n## REQ-2026-008: Engineering Manager\n\n**Requisition ID:** REQ-2026-008\n**Hiring Manager:** Victoria Wells (VP of Engineering)\n**Recruiter:** Emily Davis (Senior Recruiter)\n\n### Interview Stages\n\n| Stage | Duration | Interviewer(s) | Focus Areas |\n|-------|----------|----------------|-------------|\n| 1. Recruiter Screen | 30 min | Emily Davis | Management experience, team size, leadership style |\n| 2. Hiring Manager Screen | 60 min | Victoria Wells | Management philosophy, career trajectory |\n| 3. Technical Assessment | 60 min | Daniel Harris | Technical credibility, architecture decisions |\n| 4. People Management | 60 min | Robert Kim | Hiring, performance management, team building |\n| 5. Cross-functional Interview | 45 min | Sarah Johnson | Stakeholder management, communication |\n| 6. Executive Panel | 60 min | Victoria Wells + Nancy Cooper | Leadership, strategy, culture |\n\n### Debrief & Decision\n- **Debrief Meeting:** Within 48 hours of final interview\n- **Participants:** All interviewers + Hiring Manager + HR Partner\n- **Decision Timeline:** 3-5 business days post-debrief (executive review)\n\n---\n\n## REQ-2026-009: UX Researcher\n\n**Requisition ID:** REQ-2026-009\n**Hiring Manager:** Michael Chen (Talent Acquisition Manager)\n**Recruiter:** Maria Garcia (Recruiting Coordinator)\n\n### Interview Stages\n\n| Stage | Duration | Interviewer(s) | Focus Areas |\n|-------|----------|----------------|-------------|\n| 1. Recruiter Screen | 30 min | Maria Garcia | Research background, methods expertise |\n| 2. Hiring Manager Screen | 45 min | Michael Chen | Research experience, portfolio overview |\n| 3. Research Presentation | 60 min | Michael Chen + Emily Davis | Past research project, methodology, impact |\n| 4. Methods Interview | 60 min | Jennifer Martinez | Qual/quant methods, study design, analysis |\n| 5. Cross-functional Interview | 45 min | Robert Kim | Collaboration with product and engineering |\n| 6. Final Interview | 45 min | Sarah Johnson | Culture fit, research vision, career growth |\n\n### Debrief & Decision\n- **Debrief Meeting:** Within 24 hours of final interview\n- **Participants:** All interviewers + Hiring Manager\n- **Decision Timeline:** 2-3 business days post-debrief\n\n---\n\n## REQ-2026-010: Senior Software Development Engineer\n\n**Requisition ID:** REQ-2026-010\n**Hiring Manager:** Robert Kim (Engineering Manager)\n**Recruiter:** Emily Davis (Senior Recruiter)\n\n### Interview Stages\n\n| Stage | Duration | Interviewer(s) | Focus Areas |\n|-------|----------|----------------|-------------|\n| 1. Recruiter Screen | 30 min | Emily Davis | Senior-level experience, technical leadership |\n| 2. Technical Phone Screen | 60 min | Daniel Harris | Coding, system design preview |\n| 3. System Design Deep Dive | 75 min | Daniel Harris + Robert Kim | Large-scale architecture, trade-offs |\n| 4. Coding Interview | 60 min | James Brown | Algorithms, code quality, optimization |\n| 5. Technical Leadership | 60 min | Victoria Wells | Tech direction, mentorship, influence |\n| 6. Behavioral + Bar Raiser | 60 min | Nancy Cooper | Leadership principles, culture, hiring bar |\n\n### Debrief & Decision\n- **Debrief Meeting:** Within 24 hours of final interview\n- **Participants:** All interviewers + Hiring Manager\n- **Decision Timeline:** 2-3 business days post-debrief\n\n---\n\n## Interview Scheduling Guidelines\n\n### Standard Interview Blocks\n\n| Interview Type | Duration | Room Preference |\n|----------------|----------|-----------------|\n| Recruiter Screen | 30 min | Video Conference Room |\n| Phone Screen | 60 min | Video Conference Room |\n| Technical Interview | 60-75 min | Conference Room A |\n| Behavioral Interview | 45 min | Conference Room B |\n| Panel Interview | 60-90 min | Panel Interview Room |\n| Design Exercise | 90 min | Panel Interview Room |\n\n### Scheduling Contacts\n\n- **Primary Scheduler:** Patricia Lee (patricia.lee@amazon.com)\n- **Backup Scheduler:** Jessica Patel (jessica.patel@amazon.com)\n- **Recruiting Coordinators:** Maria Garcia (maria.garcia@amazon.com)\n\n### Time Between Interviews\n\n- **Minimum gap:** 15 minutes between interviews\n- **Lunch break:** Minimum 45 minutes if loop spans midday\n- **Full loop duration:** Target 4-5 hours maximum per day\n\n---\n\n## Feedback & Evaluation\n\n### Feedback Submission\n\n- All interviewers must submit written feedback within **4 hours** of interview completion\n- Use the standard feedback template in the ATS\n- Include specific examples and evidence for each competency assessed\n\n### Rating Scale\n\n| Rating | Description |\n|--------|-------------|\n| Strong Hire | Exceptional candidate, exceeded expectations in all areas |\n| Hire | Solid candidate, met expectations across assessed competencies |\n| Inclined to Hire | Good candidate with minor concerns, would support with reservations |\n| Inclined Not to Hire | Concerns outweigh positives, would not recommend |\n| No Hire | Did not meet expectations, clear gaps in required competencies |\n\n### Bar Raiser Role\n\nThe Bar Raiser serves as an independent evaluator to ensure we maintain a high hiring bar:\n- Has veto power on hiring decisions\n- Focuses on long-term potential and culture fit\n- Ensures fair and consistent evaluation across candidates\n","offer_template.md":"# Offer Letter Template\n\n---\n\n**CONFIDENTIAL**\n\n[Date]\n\nDear [Candidate Name],\n\nWe are thrilled to extend an offer of employment with Amazon for the position of **[Job Title]** at level **[Level]**, reporting to **[Hiring Manager Name]**, **[Hiring Manager Title]**.\n\n## Compensation\n\n| Component | Details |\n|-----------|---------|\n| **Base Salary** | $[Base Amount] annually, paid bi-weekly |\n| **Sign-on Bonus** | $[Sign-on Amount], paid in your first paycheck (subject to 1-year clawback if you leave voluntarily within 12 months) |\n| **Restricted Stock Units (RSUs)** | [Equity Shares] RSUs, vesting over 4 years: 5% Year 1, 15% Year 2, 40% Year 3, 40% Year 4 |\n| **Target Bonus** | [Bonus %]% of base salary (prorated for start date) |\n\n## Start Date & Location\n\n- **Proposed Start Date:** [Start Date]\n- **Work Location:** [Office Location]\n- **Work Arrangement:** Hybrid (3 days in office, 2 days remote)\n\n## Relocation Assistance\n\n[If applicable: You will receive a $[Relocation Amount] lump sum relocation bonus to assist with your move. Additionally, we will provide [temporary housing details].]\n\n## Benefits Highlights\n\nBenefits eligibility and effective dates vary by program. Highlights may include:\n- Medical coverage (see `health_insurance_plan.md` for plan details)\n- 401(k) plan (see `401K_policy.md` for eligibility and match details)\n- Paid time off and leave programs (as applicable)\n- Learning and development benefits (as applicable)\n\nRefer to the applicable plan documents for authoritative details.\n\n## Contingencies\n\nThis offer is contingent upon:\n1. Successful completion of background check\n2. Verification of work authorization (I-9)\n3. Signing of Employee Agreement and IP Assignment\n\n## Response\n\nPlease indicate your acceptance by signing below and returning this letter by **[Response Deadline]**. If you have questions, please contact [Recruiter Name] at [Recruiter Email] or [Recruiter Phone].\n\nWe believe you'll make an incredible impact at Amazon and look forward to welcoming you to the team!\n\nWarm regards,\n\n[Hiring Manager Signature Block]\n[Hiring Manager Name]\n[Hiring Manager Title]\n\n---\n\n**ACCEPTANCE**\n\nI, [Candidate Name], accept this offer of employment under the terms described above.\n\nSignature: _________________________ Date: _____________\n\nPreferred Start Date: _____________\n","onboarding_policy.md":"# AMAZON INC.\n## EMPLOYEE ONBOARDING POLICY\n\n**Document Number:** HR-POL-011\n**Effective Date:** January 1, 2024\n**Last Revised:** January 1, 2024\n**Policy Owner:** Human Resources Department\n**Approved By:** Chief Human Resources Officer\n\n---\n\n## 1. PURPOSE AND SCOPE\n\nThis policy establishes the framework for onboarding new employees at Amazon. A comprehensive onboarding program helps new hires integrate successfully, become productive quickly, and feel welcomed into our company culture.\n\nThis policy applies to all new employees, including full-time, part-time, temporary, and contract workers. Special provisions for remote employees are detailed in Section 8.\n\n## 2. ONBOARDING PHILOSOPHY\n\nAmazon believes that effective onboarding:\n- Begins before the first day and continues through the first year\n- Is a shared responsibility among HR, managers, and team members\n- Sets clear expectations while providing necessary support\n- Creates connections and builds relationships\n- Accelerates time-to-productivity while reducing early turnover\n\nOur goal is for every new employee to feel welcomed, prepared, and confident in their new role.\n\n## 3. PRE-BOARDING (BEFORE FIRST DAY)\n\n### 3.1 HR Responsibilities\n\n**Upon Acceptance of Offer:**\n- Send official offer letter and employment agreement\n- Initiate background check and verify completion\n- Send new hire paperwork packet (within 3 business days of acceptance)\n- Create employee record in HRIS system\n- Assign employee ID number\n- Notify IT of new hire for equipment provisioning\n- Notify Facilities for workspace setup (if applicable)\n\n**New Hire Paperwork Packet Includes:**\n- Welcome letter from CEO\n- Employee handbook acknowledgment\n- I-9 Employment Eligibility Verification form\n- W-4 Federal Tax Withholding form\n- State tax withholding form (where applicable)\n- Direct deposit authorization form\n- Emergency contact form\n- Benefits enrollment guide\n- Confidentiality and non-disclosure agreement\n- Intellectual property agreement\n- Company policy acknowledgments\n- Parking/badge request forms (if applicable)\n\n**One Week Before Start Date:**\n- Send \"First Day Information\" email including:\n  - Start time and location (or virtual meeting link for remote)\n  - Parking instructions\n  - What to bring (ID for I-9, completed paperwork)\n  - Dress code\n  - First day schedule overview\n  - Manager and HR contact information\n- Confirm all equipment and workspace ready\n- Send calendar invites for Day 1 activities\n\n### 3.2 Manager Responsibilities\n\n**Upon Hire Decision:**\n- Partner with HR on offer details\n- Identify onboarding buddy/mentor for new hire\n- Plan first week schedule and assignments\n- Schedule meet-and-greets with key stakeholders\n\n**One Week Before Start Date:**\n- Send personal welcome message to new hire\n- Prepare workspace (or verify remote setup)\n- Create 30-60-90 day plan outline\n- Brief team on new hire's start date and role\n- Schedule regular one-on-ones for first 90 days\n\n### 3.3 IT Responsibilities\n\n**Equipment Provisioning:**\n- Order laptop/computer based on role requirements\n- Configure email and system access\n- Set up required software and applications\n- Create accounts for all necessary systems\n- Prepare security badge (if applicable)\n- Ship equipment to remote employees (arrive 2-3 days before start)\n\n## 4. WELCOME PACKAGE\n\n### 4.1 Welcome Package Contents\n\nAll new employees receive a welcome package containing:\n\n**Company Materials:**\n- Welcome card signed by team members\n- Company branded merchandise:\n  - T-shirt or polo\n  - Water bottle\n  - Notebook and pen\n  - Laptop bag or backpack\n  - Stickers/decals\n- Employee handbook (printed or digital)\n- Organization chart (see `org_chart.md`)\n- Office map (for on-site employees)\n- Company directory/who's who guide\n\n**IT Equipment:**\n- Laptop computer (configured and ready)\n- Monitor (for applicable roles)\n- Keyboard and mouse\n- Headset (for roles requiring calls)\n- Laptop stand (upon request)\n- Any role-specific equipment\n\n**Access Cards/Credentials:**\n- Building access badge\n- Parking
