<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibes Eval</title>
<style>
:root {
  --orange: #F5A623; --orange-light: #FFF8EE; --orange-dark: #D4880E;
  --green: #34C759; --green-bg: #E8F8EE; --green-dark: #248A3D;
  --red: #FF3B30; --red-bg: #FFF0EF;
  --blue: #007AFF; --blue-bg: #EEF4FF;
  --purple: #AF52DE; --purple-bg: #F5EEFA;
  --g50: #FAFAFA; --g100: #F5F5F5; --g150: #EFEFEF; --g200: #E5E5E5;
  --g300: #D4D4D4; --g400: #A3A3A3; --g500: #737373; --g600: #525252;
  --g700: #404040; --g800: #262626; --g900: #171717;
  --sidebar-w: 220px; --radius: 8px; --radius-lg: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--g50); color: var(--g900); line-height:1.5; display:flex; height:100vh; overflow:hidden; }

/* === LEFT SIDEBAR === */
.sidebar { width: var(--sidebar-w); background: white; border-right:1px solid var(--g200); display:flex; flex-direction:column; flex-shrink:0; }
.sidebar-brand { padding:20px 16px 12px; font-size:18px; font-weight:700; color:var(--orange); letter-spacing:-0.5px; border-bottom:1px solid var(--g200); }
.sidebar-brand span { color:var(--g600); font-weight:400; }
.sidebar-nav { padding:8px; }
.sidebar-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; cursor:pointer; font-size:14px; font-weight:500; color:var(--g600); transition:all .15s; margin-bottom:2px; border:none; background:none; width:100%; text-align:left; }
.sidebar-item:hover { background:var(--g100); }
.sidebar-item.active { background:var(--orange-light); color:var(--orange-dark); font-weight:600; }
.sidebar-item svg { width:18px; height:18px; flex-shrink:0; }
.sidebar-divider { height:1px; background:var(--g200); margin:8px 12px; }
.sidebar-section { padding:8px 16px 4px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.8px; color:var(--g400); }
.env-pills { padding:8px 12px; display:flex; gap:4px; }
.env-pill { flex:1; padding:6px 8px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; border:1.5px solid var(--g200); background:white; color:var(--g500); text-align:center; transition:all .15s; }
.env-pill:hover { border-color:var(--orange); }
.env-pill.active { background:var(--orange); border-color:var(--orange); color:white; }

/* === RIGHT MAIN === */
.main-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.main-header { background:white; border-bottom:1px solid var(--g200); padding:12px 24px; display:flex; align-items:center; gap:16px; flex-shrink:0; min-height:56px; }
.model-tabs { display:flex; gap:6px; }
.model-tab { padding:6px 16px; border-radius:16px; font-size:13px; font-weight:500; cursor:pointer; border:1.5px solid var(--g300); background:white; color:var(--g600); transition:all .15s; }
.model-tab:hover { border-color:var(--orange); color:var(--orange); }
.model-tab.active { background:var(--orange); border-color:var(--orange); color:white; }
.main-content { flex:1; overflow-y:auto; padding:24px; }

/* === CARDS === */
.card { background:white; border-radius:var(--radius-lg); box-shadow:0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04); padding:24px; margin-bottom:20px; }
.card-title { font-size:13px; font-weight:600; color:var(--g500); text-transform:uppercase; letter-spacing:.5px; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.card-title .dot { width:8px; height:8px; border-radius:50%; }

/* === PROMPT === */
.prompt-box { background:var(--orange-light); border-left:3px solid var(--orange); padding:16px 20px; border-radius:0 8px 8px 0; font-size:14px; color:var(--g800); line-height:1.7; white-space:pre-wrap; }

/* === BADGES === */
.badge { display:inline-block; padding:2px 10px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-pass { background:var(--green-bg); color:var(--green-dark); }
.badge-fail { background:var(--red-bg); color:var(--red); }
.badge-info { background:var(--blue-bg); color:var(--blue); }
.badge-warn { background:var(--orange-light); color:var(--orange-dark); }
.badge-purple { background:var(--purple-bg); color:var(--purple); }
.badge-lg { font-size:13px; padding:4px 14px; }

/* === METRICS === */
.metrics-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
.metric-box { background:var(--g50); border:1px solid var(--g200); border-radius:8px; padding:12px 16px; min-width:120px; flex:1; }
.metric-label { font-size:11px; font-weight:500; color:var(--g500); text-transform:uppercase; letter-spacing:.4px; }
.metric-val { font-size:22px; font-weight:700; margin-top:2px; }
.metric-val.ok { color:var(--green); } .metric-val.bad { color:var(--red); } .metric-val.mid { color:var(--orange); }

/* === ANNOTATION === */
.annotation-box { border:1px solid var(--g200); border-radius:var(--radius-lg); overflow:hidden; margin-bottom:20px; }
.annotation-header { display:flex; align-items:center; gap:12px; padding:14px 20px; background:var(--g50); border-bottom:1px solid var(--g200); cursor:pointer; }
.annotation-header h3 { font-size:14px; font-weight:600; flex:1; }
.annotation-body { padding:20px; }
.annotation-section { margin-bottom:16px; }
.annotation-stitle { font-size:12px; font-weight:700; color:var(--g500); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.annotation-text { font-size:14px; color:var(--g700); line-height:1.7; }

/* === RUBRIC SECTION === */
.rsection { border:1px solid var(--g200); border-radius:var(--radius-lg); overflow:hidden; margin-bottom:20px; }
.rsection-header { display:flex; align-items:center; gap:12px; padding:14px 20px; background:var(--g50); border-bottom:1px solid var(--g200); cursor:pointer; }
.rsection-header h3 { font-size:14px; font-weight:600; flex:1; }
.rrow { display:flex; align-items:center; padding:12px 20px; border-bottom:1px solid var(--g150); font-size:13px; transition:background .1s; }
.rrow:last-child { border-bottom:none; } .rrow:hover { background:var(--g50); }
.rrow .ci { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:12px; font-weight:700; margin-right:12px; }
.rrow .ci.p { background:var(--green-bg); color:var(--green); } .rrow .ci.f { background:var(--red-bg); color:var(--red); }
.rrow .ct { flex:1; color:var(--g700); } .rrow .cs { font-weight:700; font-size:14px; margin-left:12px; min-width:40px; text-align:right; }
.rrow .cs.pos { color:var(--green); } .rrow .cs.neg { color:var(--red); }

/* === DIMS === */
.dim-item { padding:16px 20px; border-bottom:1px solid var(--g150); }
.dim-item:last-child { border-bottom:none; }
.dim-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.dim-name { font-size:14px; font-weight:600; color:var(--g800); }
.dim-badge { padding:2px 10px; border-radius:12px; font-size:13px; font-weight:700; }
.dim-badge.high { background:var(--green-bg); color:var(--green); }
.dim-badge.mid { background:var(--orange-light); color:var(--orange-dark); }
.dim-badge.low { background:var(--red-bg); color:var(--red); }
.dim-bar { width:100%; height:6px; background:var(--g200); border-radius:3px; overflow:hidden; margin-bottom:8px; }
.dim-fill { height:100%; border-radius:3px; transition:width .6s ease; }
.dim-reason { font-size:13px; color:var(--g600); line-height:1.7; }

/* === TRAJECTORY === */
.traj-step { display:flex; gap:0; border-bottom:1px solid var(--g150); }
.traj-step:last-child { border-bottom:none; }
.traj-gutter { width:48px; display:flex; flex-direction:column; align-items:center; padding-top:16px; flex-shrink:0; }
.traj-dot { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
.traj-dot.tool { background:var(--orange-light); color:var(--orange-dark); border:2px solid var(--orange); }
.traj-dot.pass { background:var(--green-bg); color:var(--green); border:2px solid var(--green); }
.traj-line { width:2px; flex:1; background:var(--g200); margin:4px 0; }
.traj-body { flex:1; padding:12px 16px 16px 0; min-width:0; }
.traj-header { display:flex; align-items:center; gap:8px; cursor:pointer; }
.traj-tool { font-size:13px; font-weight:600; font-family:'SF Mono',Menlo,monospace; background:var(--blue-bg); padding:2px 8px; border-radius:4px; color:var(--blue); }
.traj-server { font-size:11px; color:var(--g400); }
.traj-chevron { margin-left:auto; color:var(--g400); transition:transform .2s; font-size:16px; }
.traj-chevron.open { transform:rotate(90deg); }
.traj-detail { display:none; margin-top:10px; }
.traj-detail.open { display:block; }
.traj-iolabel { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--g400); margin-bottom:4px; margin-top:8px; }
.traj-iolabel:first-child { margin-top:0; }
.traj-io { background:var(--g50); border:1px solid var(--g200); border-radius:6px; padding:10px 12px; font-family:'SF Mono',Menlo,monospace; font-size:11px; color:var(--g700); overflow-x:auto; max-height:200px; overflow-y:auto; white-space:pre-wrap; word-break:break-word; }

/* === STATE DIFFS === */
.diff-item { padding:12px 16px; border-bottom:1px solid var(--g150); display:flex; gap:12px; align-items:flex-start; }
.diff-item:last-child { border-bottom:none; }
.diff-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:16px; }
.diff-icon.email { background:#FDE8E8; color:#E53E3E; }
.diff-icon.calendar { background:#E8F5E9; color:#388E3C; }
.diff-icon.chat { background:#E3F2FD; color:#1976D2; }
.diff-icon.hris { background:var(--purple-bg); color:var(--purple); }
.diff-icon.snapshot { background:var(--g100); color:var(--g500); }
.diff-body { flex:1; min-width:0; }
.diff-label { font-size:13px; font-weight:600; color:var(--g800); }
.diff-sub { font-size:12px; color:var(--g500); margin-top:2px; }
.diff-summary { font-size:12px; color:var(--g600); margin-top:6px; white-space:pre-wrap; background:var(--g50); padding:8px 10px; border-radius:6px; border:1px solid var(--g200); max-height:150px; overflow-y:auto; }

/* === EXCEL === */
.excel-tabs { display:flex; gap:1px; background:var(--g200); padding:0; overflow-x:auto; border-radius:8px 8px 0 0; }
.excel-tab { padding:8px 16px; font-size:12px; font-weight:500; cursor:pointer; border:none; background:var(--g100); color:var(--g500); white-space:nowrap; transition:all .15s; }
.excel-tab:first-child { border-radius:8px 0 0 0; } .excel-tab:last-child { border-radius:0 8px 0 0; }
.excel-tab:hover { background:white; color:var(--g700); }
.excel-tab.active { background:white; color:var(--green-dark); font-weight:600; box-shadow:inset 0 -2px 0 var(--green); }
.excel-pane { border:1px solid var(--g200); border-top:none; border-radius:0 0 8px 8px; overflow:auto; max-height:500px; }
.xl { border-collapse:collapse; font-size:12px; min-width:100%; font-family:'SF Mono',Menlo,monospace; }
.xl th { background:var(--g100); position:sticky; top:0; z-index:1; font-weight:600; font-size:11px; color:var(--g500); padding:6px 10px; text-align:center; border:1px solid var(--g200); }
.xl .rn { background:var(--g100); color:var(--g400); text-align:center; font-size:10px; padding:4px 8px; position:sticky; left:0; z-index:2; border:1px solid var(--g200); }
.xl td { padding:4px 10px; border:1px solid var(--g200); white-space:nowrap; max-width:320px; overflow:hidden; text-overflow:ellipsis; }
.xl td.num { text-align:right; color:var(--blue); }
.xl tr:hover td:not(.rn) { background:#FFFDE7; }

/* === ENVIRONMENT TABS === */
.env-tabs-bar { display:flex; gap:0; border-bottom:1px solid var(--g200); background:white; padding:0 20px; flex-shrink:0; }
.env-tab-btn { padding:12px 20px; font-size:14px; font-weight:500; cursor:pointer; border:none; background:none; color:var(--g500); border-bottom:2px solid transparent; transition:all .15s; }
.env-tab-btn:hover { color:var(--g700); }
.env-tab-btn.active { color:var(--orange-dark); border-bottom-color:var(--orange); font-weight:600; }
.env-content { flex:1; overflow-y:auto; padding:24px; }

/* === PROFILES === */
.profile-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; }
.profile-card { background:white; border:1px solid var(--g200); border-radius:var(--radius-lg); padding:16px; transition:box-shadow .15s; }
.profile-card:hover { box-shadow:0 4px 12px rgba(0,0,0,.08); }
.profile-avatar { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; color:white; flex-shrink:0; }
.profile-top { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.profile-name { font-size:15px; font-weight:600; }
.profile-title { font-size:12px; color:var(--g500); }
.profile-email { font-size:12px; color:var(--blue); margin-top:4px; }
.profile-info { font-size:12px; color:var(--g600); margin-top:8px; line-height:1.6; max-height:80px; overflow:hidden; }

/* === MD CONTENT === */
.md-content { font-size:14px; color:var(--g700); line-height:1.7; max-height:600px; overflow-y:auto; padding:20px; background:var(--g50); border-radius:8px; border:1px solid var(--g200); }
.md-content h1 { font-size:20px; font-weight:700; color:var(--g900); margin:24px 0 12px; padding-bottom:8px; border-bottom:2px solid var(--g200); }
.md-content h2 { font-size:17px; font-weight:700; color:var(--g800); margin:20px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--g200); }
.md-content h3 { font-size:15px; font-weight:600; color:var(--g800); margin:16px 0 8px; }
.md-content h4 { font-size:14px; font-weight:600; color:var(--g700); margin:12px 0 6px; }
.md-content p { margin:0 0 12px; }
.md-content ul,.md-content ol { margin:0 0 12px; padding-left:24px; }
.md-content li { margin-bottom:4px; }
.md-content table { border-collapse:collapse; width:100%; margin:12px 0; font-size:13px; }
.md-content table th { background:var(--g100); font-weight:600; color:var(--g800); text-align:left; padding:8px 12px; border:1px solid var(--g200); }
.md-content table td { padding:6px 12px; border:1px solid var(--g200); color:var(--g700); }
.md-content table tr:hover td { background:#FFFDE7; }
.md-content pre { background:var(--g800); color:#E0E0E0; padding:14px 16px; border-radius:8px; overflow-x:auto; font-family:'SF Mono',Menlo,monospace; font-size:12px; line-height:1.5; margin:12px 0; }
.md-content code { background:var(--g150); padding:2px 5px; border-radius:3px; font-family:'SF Mono',Menlo,monospace; font-size:12px; }
.md-content pre code { background:none; padding:0; }
.md-content blockquote { border-left:3px solid var(--orange); padding:8px 16px; margin:12px 0; background:var(--orange-light); border-radius:0 6px 6px 0; }
.md-content hr { border:none; border-top:1px solid var(--g200); margin:16px 0; }
.md-content strong { color:var(--g900); }
.md-content .ascii-tree { background:var(--g800); color:#A5D6A7; padding:16px; border-radius:8px; overflow-x:auto; font-family:'SF Mono',Menlo,monospace; font-size:11px; line-height:1.4; white-space:pre; margin:12px 0; }

/* === ORG CHART === */
.org-dept { margin-bottom:24px; }
.org-dept-title { font-size:15px; font-weight:700; color:var(--g800); margin-bottom:12px; padding-bottom:6px; border-bottom:2px solid var(--g200); }
.org-tree { display:flex; flex-direction:column; align-items:center; }
.org-node { background:white; border:1.5px solid var(--g200); border-radius:10px; padding:10px 16px; text-align:center; min-width:150px; max-width:190px; transition:box-shadow .15s; }
.org-node:hover { box-shadow:0 4px 12px rgba(0,0,0,.1); }
.org-node.head { border-color:var(--orange); background:var(--orange-light); }
.org-node .on-name { font-size:13px; font-weight:700; color:var(--g900); }
.org-node .on-title { font-size:11px; color:var(--g500); margin-top:2px; }
.org-node .on-id { font-size:10px; color:var(--g400); font-family:monospace; margin-top:2px; }
/* Vertical stem down from parent */
.org-stem { width:2px; height:20px; background:var(--g300); margin:0 auto; }
/* Horizontal bar connecting children */
.org-hbar { display:flex; align-items:flex-start; justify-content:center; position:relative; }
.org-hbar::before { content:''; position:absolute; top:0; height:2px; background:var(--g300); left:var(--hbar-left,50%); right:var(--hbar-right,50%); }
/* Each child column: vertical drop line + subtree */
.org-child-col { display:flex; flex-direction:column; align-items:center; flex-shrink:0; }
.org-child-col::before { content:''; width:2px; height:20px; background:var(--g300); }
/* Spacing between sibling columns */
.org-hbar > .org-child-col { margin:0 6px; }

/* === JSON OBJECT === */
.json-obj { width:100%; }
.json-section { margin-bottom:16px; }
.json-section-title { font-size:13px; font-weight:700; color:var(--orange-dark); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
.json-table { border-collapse:collapse; width:100%; font-size:13px; }
.json-table th { text-align:left; padding:6px 12px; background:var(--g100); border:1px solid var(--g200); font-weight:600; color:var(--g700); }
.json-table td { padding:6px 12px; border:1px solid var(--g200); color:var(--g700); }
.json-table td.num { color:var(--blue); font-weight:600; font-family:monospace; }

/* === COLLAPSIBLE === */
.collapsible { overflow:hidden; transition:max-height .3s ease; }
.chevron-toggle { transition:transform .2s; display:inline-block; color:var(--g400); }
.chevron-toggle.open { transform:rotate(180deg); }

/* === PANELS === */
.panel { display:none; flex-direction:column; flex:1; overflow:hidden; }
.panel.active { display:flex; }

::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--g300); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--g400); }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">Vibes <span>Eval</span></div>
  <div class="sidebar-section">Environment</div>
  <div class="env-pills">
    <button class="env-pill active" onclick="switchEnv('hr')">HR</button>
    <button class="env-pill" onclick="switchEnv('finance')">Finance</button>
  </div>
  <div class="sidebar-divider"></div>
  <nav class="sidebar-nav">
    <button class="sidebar-item active" data-view="rollouts" onclick="switchView(this,'rollouts')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Rollouts
    </button>
    <button class="sidebar-item" data-view="environment" onclick="switchView(this,'environment')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
      Environment
    </button>
  </nav>
</aside>

<div class="main-area">
  <div class="panel active" id="panel-rollouts">
    <div class="main-header"><div class="model-tabs" id="mtabs"></div></div>
    <div class="main-content" id="rollouts-content"></div>
  </div>
  <div class="panel" id="panel-environment">
    <div class="env-tabs-bar" id="env-tabs-bar"></div>
    <div class="env-content" id="env-content"></div>
  </div>
</div>

<script>
let DATA=null, currentEnv='hr', currentModel='gpt_5_2', currentView='rollouts';
const MN={gpt_5_2:'GPT 5.2',gemini_3_pro:'Gemini 3 Pro'};
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDur(s){if(s<60)return s.toFixed(0)+'s';return Math.floor(s/60)+'m '+Math.round(s%60)+'s';}

function md(raw){
  let s=esc(raw);
  // Code blocks (``` ... ```)
  s=s.replace(/```(\w*)\n([\s\S]*?)```/g, function(_,lang,code){
    // Check if code block contains box-drawing chars (ASCII art tree)
    if(/[┌┐└┘├┤┬┴┼─│▼▲►◄═║╔╗╚╝╠╣╦╩╬]/.test(code)){
      return '<div class="ascii-tree">'+code+'</div>';
    }
    return '<pre><code>'+code+'</code></pre>';
  });
  // Inline code
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  // Tables
  s=s.replace(/((?:^\|.+\|$\n?)+)/gm, function(block){
    const rows=block.trim().split('\n').filter(r=>r.trim());
    if(rows.length<2) return block;
    // Check if row 2 is separator
    const isSep=r=>/^\|[\s\-:|]+\|$/.test(r);
    let html='<table>';
    let headerDone=false;
    rows.forEach((row,i)=>{
      if(isSep(row)){headerDone=true;return;}
      const cells=row.split('|').slice(1,-1).map(c=>c.trim());
      if(!headerDone&&i===0){
        html+='<thead><tr>'+cells.map(c=>'<th>'+c+'</th>').join('')+'</tr></thead><tbody>';
      }else{
        html+='<tr>'+cells.map(c=>'<td>'+c+'</td>').join('')+'</tr>';
      }
    });
    html+='</tbody></table>';
    return html;
  });
  // Headers
  s=s.replace(/^#### (.+)$/gm,'<h4>$1</h4>');
  s=s.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  s=s.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  s=s.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  // Bold + italic
  s=s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
  // Horizontal rule
  s=s.replace(/^---+$/gm,'<hr>');
  // Blockquote
  s=s.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  // Unordered lists
  s=s.replace(/((?:^[\s]*[-*] .+$\n?)+)/gm, function(block){
    const items=block.trim().split('\n').map(l=>l.replace(/^\s*[-*] /,''));
    return '<ul>'+items.map(i=>'<li>'+i+'</li>').join('')+'</ul>';
  });
  // Ordered lists
  s=s.replace(/((?:^\d+\. .+$\n?)+)/gm, function(block){
    const items=block.trim().split('\n').map(l=>l.replace(/^\d+\. /,''));
    return '<ol>'+items.map(i=>'<li>'+i+'</li>').join('')+'</ol>';
  });
  // Paragraphs: convert double newlines
  s=s.replace(/\n\n+/g,'</p><p>');
  // Single newlines within paragraphs
  s=s.replace(/\n/g,'<br>');
  // Wrap in p if not starting with block element
  if(!/^<[huptdob]/.test(s)) s='<p>'+s+'</p>';
  // Clean up empty <p></p>
  s=s.replace(/<p>\s*<\/p>/g,'');
  // Fix block elements inside <p>
  s=s.replace(/<p>(<(?:h[1-4]|table|ul|ol|pre|div|hr|blockquote))/g,'$1');
  s=s.replace(/(<\/(?:h[1-4]|table|ul|ol|pre|div|hr|blockquote)>)<\/p>/g,'$1');
  return s;
}

function parseHrV(t){const p=[],f=[];const pm=t.match(/passed=\[([^\]]*)\]/);if(pm)pm[1].split(',').forEach(s=>{const n=s.trim().replace(/'/g,'');if(n)p.push(n);});const fm=t.match(/missing=\[([^\]]*)\]/);if(fm)fm[1].split(',').forEach(s=>{const n=s.trim().replace(/'/g,'');if(n)f.push(n);});return{passed:p,failed:f};}
function parseFinV(t){const ls=t.split('\n');let ss='';const sl=ls.find(l=>l.includes('SCORE:'));if(sl)ss=sl.replace('SCORE:','').trim();const cats={};ls.forEach(l=>{const m=l.match(/^(\w[\w_]*?):\s*(\d+)\/(\d+)/);if(m)cats[m[1]]={s:+m[2],t:+m[3]};});const fails=[];let inF=false;ls.forEach(l=>{if(l.includes('FAILED CHECKS')){inF=true;return;}if(inF){const m=l.match(/\[(\w+)\]\s*(.*)/);if(m)fails.push({cat:m[1],detail:m[2]});}});return{scoreStr:ss,cats,fails};}
function parseRubric(t){
  // Normalize smart quotes to regular quotes
  let j=t.replace(/[\u201C\u201D\u201E\u201F\u2033\u2036]/g,'"').replace(/[\u2018\u2019\u201A\u201B\u2032\u2035]/g,"'");
  try{
    const cm=j.match(/```json?\s*([\s\S]*?)```/);if(cm)j=cm[1];
    const om=j.match(/\{[\s\S]*"dimensions"[\s\S]*\}/);if(om)return JSON.parse(om[0]);
    const rm=j.match(/\{[\s\S]*"raw_response"[\s\S]*\}/);if(rm)return JSON.parse(rm[0]);
    const dm=j.match(/\{[\s\S]*"dimension_scores"[\s\S]*\}/);if(dm)return JSON.parse(dm[0]);
    return JSON.parse(j);
  }catch(e){
    // Fallback: extract fields via regex for malformed JSON (e.g. HR smart-quote issues)
    const dims=[];
    // Try "dimension" key (HR format)
    const dr=/"dimension"\s*:\s*"([^"]*)"[\s\S]*?"score"\s*:\s*([\d.]+)[\s\S]*?"reason"\s*:\s*"((?:[^"\\]|\\.)*)"/g;
    let m;while((m=dr.exec(t))!==null){dims.push({dimension:m[1],score:parseFloat(m[2]),reason:m[3]});}
    if(dims.length===0){
      const dr2=/"dimension"\s*:\s*"([^"]*)"[\s\S]*?"score"\s*:\s*([\d.]+)/g;
      while((m=dr2.exec(t))!==null){dims.push({dimension:m[1],score:parseFloat(m[2]),reason:''});}
    }
    const sm=t.match(/"score"\s*:\s*([\d.]+)/);
    const vm=t.match(/"verdict"\s*:\s*"([^"]*)"/);
    const evidence=[];
    const em=t.match(/"evidence"\s*:\s*\[([\s\S]*?)\]/);
    if(em){em[1].replace(/"((?:[^"\\]|\\.)*)"/g,(_,v)=>{evidence.push(v);});}
    const failedC=[];
    const fcm=t.match(/"failed_criteria"\s*:\s*\[([\s\S]*?)\]/);
    if(fcm){fcm[1].replace(/"((?:[^"\\]|\\.)*)"/g,(_,v)=>{failedC.push(v);});}
    const notes=[];
    const nm=t.match(/"notes"\s*:\s*\[([\s\S]*?)\]/);
    if(nm){nm[1].replace(/"((?:[^"\\]|\\.)*)"/g,(_,v)=>{notes.push(v);});}
    const summary=vm?vm[1]:'';
    if(dims.length>0||sm){
      return {
        score:sm?parseFloat(sm[1]):0,
        summary:summary,
        evidence:evidence,
        failed_criteria:failedC,
        notes:notes,
        raw_response:{dimension_scores:dims,verdict:summary}
      };
    }
    return null;
  }
}

function colLabel(c){let s='';while(c>=0){s=String.fromCharCode(65+(c%26))+s;c=Math.floor(c/26)-1;}return s;}

function renderExcel(sheets,pfx){
  const names=Object.keys(sheets).filter(n=>sheets[n]&&sheets[n].length>0);
  if(!names.length)return'<div style="padding:40px;text-align:center;color:var(--g400)">No spreadsheet data.</div>';
  let h='<div class="excel-tabs">';
  names.forEach((n,i)=>{h+=`<button class="excel-tab${i===0?' active':''}" onclick="switchXl(this,'${pfx}',this.dataset.sn)" data-sn="${esc(n)}">${esc(n)}</button>`;});
  h+='</div>';
  names.forEach((n,i)=>{
    const rows=sheets[n],maxC=Math.max(...rows.map(r=>r.length),0);
    let t='<table class="xl"><thead><tr><th></th>';
    for(let c=0;c<maxC;c++)t+=`<th>${colLabel(c)}</th>`;
    t+='</tr></thead><tbody>';
    rows.forEach((row,ri)=>{
      t+=`<tr><td class="rn">${ri+1}</td>`;
      for(let c=0;c<maxC;c++){const v=c<row.length?row[c]:null;if(v===null)t+='<td></td>';else if(typeof v==='number')t+=`<td class="num">${v}</td>`;else t+=`<td title="${esc(String(v))}">${esc(String(v).substring(0,80))}</td>`;}
      t+='</tr>';
    });
    t+='</tbody></table>';
    h+=`<div class="excel-pane" data-pfx="${pfx}" data-sn="${esc(n)}" style="${i>0?'display:none':''}">${t}</div>`;
  });
  return h;
}

// ============ ORG CHART RENDERER ============
function renderOrgChart(mdText){
  // Parse ALL Employee Directory tables to get every person with their Reports To
  const allPeople=[];
  const dirMatch=mdText.match(/## Employee Directory[\s\S]*/);
  if(!dirMatch)return`<div class="md-content" style="max-height:none">${md(mdText)}</div>`;
  const dirText=dirMatch[0];
  // Find all tables in the directory
  const tableBlocks=dirText.match(/((?:^\|.+\|$\n?)+)/gm)||[];
  tableBlocks.forEach(tbl=>{
    const rows=tbl.trim().split('\n').filter(r=>r.includes('|')&&!/^[\s|:-]+$/.test(r));
    if(rows.length<2)return;
    const hdr=rows[0].split('|').map(c=>c.trim()).filter(Boolean);
    const nameIdx=hdr.findIndex(h=>/^Name$/i.test(h));
    const titleIdx=hdr.findIndex(h=>/^Title$/i.test(h));
    const reportsIdx=hdr.findIndex(h=>/Reports/i.test(h));
    const empIdx=hdr.findIndex(h=>/EMP|ID/i.test(h));
    const emailIdx=hdr.findIndex(h=>/Email/i.test(h));
    const deptIdx=hdr.findIndex(h=>/Department/i.test(h));
    rows.slice(1).forEach(row=>{
      const cells=row.split('|').map(c=>c.trim()).filter(Boolean);
      if(cells.length<3)return;
      const person={
        name:nameIdx>=0?cells[nameIdx]:'',
        role:titleIdx>=0?cells[titleIdx]:'',
        reportsTo:reportsIdx>=0?cells[reportsIdx]:'',
        empId:empIdx>=0?cells[empIdx]:'',
        email:emailIdx>=0?cells[emailIdx]:'',
        dept:deptIdx>=0?cells[deptIdx]:''
      };
      if(person.name)allPeople.push(person);
    });
  });

  if(allPeople.length===0)return`<div class="md-content" style="max-height:none">${md(mdText)}</div>`;

  // Deduplicate by name
  const byName={};
  allPeople.forEach(p=>{byName[p.name]=p;});
  const people=Object.values(byName);

  // Build tree: find roots (reports to "Board of Directors" or reports to nobody in list)
  const childrenOf=name=>people.filter(p=>p.reportsTo===name);
  const roots=people.filter(p=>p.reportsTo==='Board of Directors'||(!byName[p.reportsTo]&&p.reportsTo));

  const colors=['#F5A623','#007AFF','#34C759','#AF52DE','#FF3B30','#5856D6','#FF9500','#00C7BE'];
  let ci=0;

  function renderNode(person,depth){
    const bg=colors[(ci++)%colors.length];
    const ini=person.name.split(' ').map(w=>w[0]).join('').substring(0,2);
    const kids=childrenOf(person.name);
    let h='<div class="org-tree">';
    h+=`<div class="org-node${depth===0?' head':''}"><div style="display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:4px"><div class="profile-avatar" style="background:${bg};width:28px;height:28px;font-size:11px">${ini}</div></div><div class="on-name">${esc(person.name)}</div><div class="on-title">${esc(person.role)}</div>${person.empId?`<div class="on-id">${esc(person.empId)}</div>`:''}</div>`;
    if(kids.length>0){
      h+='<div class="org-stem"></div>';
      h+=`<div class="org-hbar" style="--hbar-left:calc(${100/(2*kids.length)}% + 3px);--hbar-right:calc(${100/(2*kids.length)}% + 3px)">`;
      kids.forEach(k=>{h+=`<div class="org-child-col">${renderNode(k,depth+1)}</div>`;});
      h+='</div>';
    }
    h+='</div>';
    return h;
  }

  let h='<div style="overflow-x:auto;padding:16px 0">';
  if(roots.length>0){
    h+='<div class="org-tree">';
    h+='<div class="org-node head" style="border-color:var(--g800);background:var(--g100)"><div class="on-name">Board of Directors</div></div>';
    h+='<div class="org-stem"></div>';
    h+=`<div class="org-hbar" style="--hbar-left:calc(${100/(2*roots.length)}% + 3px);--hbar-right:calc(${100/(2*roots.length)}% + 3px)">`;
    roots.forEach(r=>{h+=`<div class="org-child-col">${renderNode(r,0)}</div>`;});
    h+='</div></div>';
  }
  h+='</div>';
  return h;
}

// ============ JSON OBJECT RENDERER ============
function renderJsonObj(text){
  try{
    const obj=JSON.parse(text);
    return buildJsonHtml(obj,'');
  }catch(e){
    return md(text);
  }
}
function buildJsonHtml(obj,prefix){
  if(obj===null||obj===undefined)return'<span style="color:var(--g400)">null</span>';
  if(typeof obj==='string')return esc(obj);
  if(typeof obj==='number')return`<span class="num" style="color:var(--blue);font-weight:600">${obj.toLocaleString()}</span>`;
  if(typeof obj==='boolean')return`<span style="color:${obj?'var(--green)':'var(--red)'}; font-weight:600">${obj}</span>`;
  if(Array.isArray(obj)){
    if(obj.length===0)return'<em style="color:var(--g400)">empty</em>';
    if(typeof obj[0]==='object'){
      // Array of objects → table
      const keys=[...new Set(obj.flatMap(o=>Object.keys(o)))];
      let h='<table class="json-table"><thead><tr>'+keys.map(k=>'<th>'+esc(k)+'</th>').join('')+'</tr></thead><tbody>';
      obj.forEach(item=>{
        h+='<tr>'+keys.map(k=>{
          const v=item[k];
          if(typeof v==='number')return`<td class="num">${v.toLocaleString()}</td>`;
          if(typeof v==='object'&&v!==null)return`<td>${esc(JSON.stringify(v))}</td>`;
          return`<td>${esc(String(v??''))}</td>`;
        }).join('')+'</tr>';
      });
      return h+'</tbody></table>';
    }
    return '<ul>'+obj.map(v=>'<li>'+buildJsonHtml(v,'')+'</li>').join('')+'</ul>';
  }
  // Object
  const keys=Object.keys(obj);
  let h='';
  keys.forEach(key=>{
    const val=obj[key];
    if(typeof val==='object'&&val!==null&&!Array.isArray(val)){
      // Nested object — check depth
      const subKeys=Object.keys(val);
      const allPrimitive=subKeys.every(k=>typeof val[k]!=='object'||val[k]===null);
      if(allPrimitive){
        // Render as compact table
        h+=`<div class="json-section"><div class="json-section-title">${esc(key.replace(/_/g,' '))}</div><table class="json-table">`;
        subKeys.forEach(sk=>{
          const sv=val[sk];
          h+=`<tr><td style="font-weight:600;width:180px">${esc(sk.replace(/_/g,' '))}</td>`;
          if(typeof sv==='number')h+=`<td class="num">$${sv.toLocaleString()}</td>`;
          else h+=`<td>${esc(String(sv??''))}</td>`;
          h+='</tr>';
        });
        h+='</table></div>';
      }else{
        // Deeper nesting — recurse with section header
        h+=`<div class="json-section"><div class="json-section-title">${esc(key.replace(/_/g,' '))}</div>${buildJsonHtml(val,'')}</div>`;
      }
    }else if(Array.isArray(val)){
      h+=`<div class="json-section"><div class="json-section-title">${esc(key.replace(/_/g,' '))}</div>${buildJsonHtml(val,'')}</div>`;
    }else{
      h+=`<div style="margin-bottom:4px"><strong style="color:var(--g700)">${esc(key.replace(/_/g,' '))}:</strong> ${buildJsonHtml(val,'')}</div>`;
    }
  });
  return h;
}

// ============ ROLLOUTS ============
function renderRollouts(){
  const env=DATA[currentEnv],model=env.models[currentModel],meta=model.meta,rubric=parseRubric(model.rubric_output);
  let h='';

  // METRICS
  const pScore=currentEnv==='hr'?(()=>{const c=parseHrV(model.verifier_output);return`${c.passed.length}/${c.passed.length+c.failed.length}`;})():parseFinV(model.verifier_output).scoreStr;
  const rScore=rubric?(rubric.weighted_total!=null?rubric.weighted_total+'/100':rubric.score+'/1.0'):'N/A';
  const rGrade=rubric?(rubric.grade||rubric.raw_response?.verdict||''):'';
  const pPct=currentEnv==='hr'?(()=>{const c=parseHrV(model.verifier_output);return c.passed.length/(c.passed.length+c.failed.length);})():(()=>{const m=pScore.match(/(\d+)\/(\d+)/);return m?+m[1]/+m[2]:0;})();
  const rPct=rubric?(rubric.weighted_total!=null?rubric.weighted_total/100:rubric.score):0;

  h+=`<div class="metrics-row">
    <div class="metric-box"><div class="metric-label">Model</div><div class="metric-val" style="font-size:16px;color:var(--g800)">${MN[currentModel]||currentModel}</div></div>
    <div class="metric-box"><div class="metric-label">Steps</div><div class="metric-val">${meta.steps_taken}<span style="font-size:14px;color:var(--g400)">/${meta.max_steps}</span></div></div>
    <div class="metric-box"><div class="metric-label">Duration</div><div class="metric-val">${fmtDur(meta.duration_seconds)}</div></div>
    <div class="metric-box"><div class="metric-label">Cost</div><div class="metric-val">$${meta.cost_usd}</div></div>
    <div class="metric-box"><div class="metric-label">Programmatic</div><div class="metric-val ${pPct>=.7?'ok':pPct>=.4?'mid':'bad'}">${pScore}</div></div>
    <div class="metric-box"><div class="metric-label">Rubric</div><div class="metric-val ${rPct>=.7?'ok':rPct>=.4?'mid':'bad'}">${rScore}</div><div style="font-size:11px;color:var(--g500)">${rGrade}</div></div>
  </div>`;

  // PROMPT (after overview stats) — decode literal escape sequences
  const promptText=env.task.replace(/^\s+/,'').replace(/\\n/g,'\n').replace(/\\u201[0-9a-fA-F]/g,m=>String.fromCharCode(parseInt(m.slice(2),16))).replace(/\\t/g,'\t');
  h+=`<div class="card"><div class="card-title"><div class="dot" style="background:var(--orange)"></div>PROMPT</div><div class="prompt-box">${esc(promptText)}</div></div>`;

  // LLM ANNOTATION
  if(rubric){
    const isPassing=rPct>=0.6;
    h+=`<div class="annotation-box"><div class="annotation-header" onclick="toggle('annot')"><h3>LLM ANNOTATION &mdash; ${esc(MN[currentModel]||currentModel)}</h3><span class="badge badge-lg ${isPassing?'badge-pass':'badge-fail'}">${isPassing?'Passed':'Failed'}</span><span class="chevron-toggle" id="annot-ch">&#9660;</span></div><div class="collapsible" id="annot" style="max-height:5000px"><div class="annotation-body">`;
    if(rubric.summary)h+=`<div class="annotation-section"><div class="annotation-stitle"><span style="color:var(--blue)">&#9733;</span> SUMMARY</div><div class="annotation-text">${esc(rubric.summary)}</div></div>`;
    let ev=rubric.evidence||rubric.raw_response?.evidence||[];
    let fc=rubric.failed_criteria||rubric.raw_response?.failed_criteria||[];
    // If no explicit evidence/failed_criteria, derive from dimension justifications
    if(ev.length===0&&fc.length===0){
      const dims=rubric.dimensions||rubric.raw_response?.dimension_scores||[];
      const maxS=rubric.weighted_total!=null?5:1;
      dims.forEach(dim=>{
        const name=dim.name||dim.dimension||'';
        const just=dim.justification||dim.reason||'';
        if(!just)return;
        const pct=(dim.score/maxS)*100;
        if(pct>=60)ev.push(name+': '+just);
        else fc.push(name+': '+just);
      });
    }
    if(ev.length){h+=`<div class="annotation-section"><div class="annotation-stitle"><span style="color:var(--green)">&#10003;</span> DID WELL</div>`;ev.forEach(e=>{h+=`<div class="annotation-text" style="margin-bottom:6px">&bull; ${esc(e)}</div>`;});h+='</div>';}
    if(fc.length){h+=`<div class="annotation-section"><div class="annotation-stitle"><span style="color:var(--red)">&#10007;</span> DID POORLY</div>`;fc.forEach(e=>{h+=`<div class="annotation-text" style="margin-bottom:6px">&bull; ${esc(e)}</div>`;});h+='</div>';}
    const notes=rubric.notes||rubric.raw_response?.notes||[];
    if(notes.length){h+=`<div class="annotation-section"><div class="annotation-stitle">&#128221; NOTES</div>`;notes.forEach(e=>{h+=`<div class="annotation-text" style="margin-bottom:6px">${esc(e)}</div>`;});h+='</div>';}
    h+='</div></div></div>';
  }

  // RUBRIC CRITERIA DEFINITION (before scores)
  if(env.rubric_definition){
    h+=`<div class="rsection"><div class="rsection-header" onclick="toggle('rcrit')"><h3>RUBRIC CRITERIA</h3><span class="badge badge-warn badge-lg">What was evaluated</span><span class="chevron-toggle" id="rcrit-ch">&#9660;</span></div><div class="collapsible" id="rcrit" style="max-height:0"><div class="md-content" style="border-radius:0;border:none;border-top:1px solid var(--g200);max-height:none">${md(env.rubric_definition)}</div></div></div>`;
  }

  // RUBRIC DIMENSIONS
  h+=`<div class="rsection"><div class="rsection-header" onclick="toggle('rdims')"><h3>RUBRIC SCORES</h3><span class="badge badge-info badge-lg">${rScore}</span><span class="chevron-toggle" id="rdims-ch">&#9660;</span></div><div class="collapsible" id="rdims" style="max-height:5000px">`;
  if(rubric){
    const dims=rubric.dimensions||rubric.raw_response?.dimension_scores||[];
    const maxS=rubric.weighted_total!=null?5:1;
    dims.forEach(dim=>{
      const pct=(dim.score/maxS)*100,cls=pct>=70?'high':pct>=40?'mid':'low',bc=pct>=70?'var(--green)':pct>=40?'var(--orange)':'var(--red)';
      h+=`<div class="dim-item"><div class="dim-top"><span class="dim-name">${esc(dim.name||dim.dimension)}</span><span class="dim-badge ${cls}">${dim.score}/${maxS}</span></div><div class="dim-bar"><div class="dim-fill" style="width:${pct}%;background:${bc}"></div></div><div class="dim-reason">${esc(dim.justification||dim.reason||'')}</div></div>`;
    });
  }
  h+='</div></div>';

  // PROGRAMMATIC VERIFIER
  h+=`<div class="rsection"><div class="rsection-header" onclick="toggle('pchk')"><h3>PROGRAMMATIC VERIFIER</h3><span class="badge badge-info badge-lg">${pScore}</span><span class="chevron-toggle" id="pchk-ch">&#9660;</span></div><div class="collapsible" id="pchk" style="max-height:0">`;
  if(currentEnv==='hr'){
    const ch=parseHrV(model.verifier_output);
    ch.passed.forEach(c=>{h+=`<div class="rrow"><div class="ci p">&#10003;</div><div class="ct">${esc(c.replace(/_/g,' '))}</div><div class="cs pos">+1</div></div>`;});
    ch.failed.forEach(c=>{h+=`<div class="rrow"><div class="ci f">&#10007;</div><div class="ct">${esc(c.replace(/_/g,' '))}</div><div class="cs neg">0</div></div>`;});
  }else{
    const ch=parseFinV(model.verifier_output);
    Object.entries(ch.cats).forEach(([cat,d])=>{const p=d.t>0?d.s/d.t:0;h+=`<div class="rrow"><div class="ci ${p>=.8?'p':'f'}">${p>=.8?'&#10003;':'&#10007;'}</div><div class="ct"><strong>${cat}</strong></div><div class="cs ${p>=.8?'pos':'neg'}">${d.s}/${d.t}</div></div>`;});
    if(ch.fails.length){
      h+=`<div style="padding:12px 20px;font-size:12px;font-weight:600;color:var(--g500);border-top:1px solid var(--g200)">FAILED CHECKS (${ch.fails.length})</div>`;
      ch.fails.slice(0,40).forEach(f=>{h+=`<div class="rrow"><div class="ci f">&#10007;</div><div class="ct">${esc(f.detail.substring(0,120))}<span style="color:var(--g400);margin-left:8px">[${f.cat}]</span></div></div>`;});
      if(ch.fails.length>40)h+=`<div style="padding:8px 20px;font-size:12px;color:var(--g400)">...and ${ch.fails.length-40} more</div>`;
    }
  }
  h+='</div></div>';

  // STATE CHANGES
  if(model.diffs&&model.diffs.length){
    h+=`<div class="rsection"><div class="rsection-header" onclick="toggle('sdiffs')"><h3>STATE CHANGES</h3><span class="badge badge-purple badge-lg">${model.diffs.length} changes</span><span class="chevron-toggle" id="sdiffs-ch">&#9660;</span></div><div class="collapsible" id="sdiffs" style="max-height:0">`;
    model.diffs.forEach((d,i)=>{
      const sum=d.summary||'';
      let ic='snapshot',ch='&#128247;';
      if(sum.includes('email')){ic='email';ch='&#9993;';}
      else if(sum.includes('calendar')||sum.includes('event')){ic='calendar';ch='&#128197;';}
      else if(sum.includes('message')||sum.includes('chat')||sum.includes('Message')){ic='chat';ch='&#128172;';}
      else if(sum.toLowerCase().includes('hris')){ic='hris';ch='&#128100;';}
      const stepLabel=d.step!=null?'Step '+d.step:(d.scope==='full'?'Full Snapshot':'Change '+(i+1));
      h+=`<div class="diff-item"><div class="diff-icon ${ic}">${ch}</div><div class="diff-body"><div class="diff-label">${esc(stepLabel)} &mdash; ${esc(d.label||d.scope)}</div>${d.tool_name?`<div class="diff-sub">${esc(d.tool_name)}</div>`:''}<div class="diff-summary">${esc(sum)}</div></div></div>`;
    });
    h+='</div></div>';
  }

  // TRAJECTORY
  const ts=model.steps.filter(s=>s.type==='tool_call');
  if(ts.length){
    h+=`<div class="rsection"><div class="rsection-header" onclick="toggle('traj')"><h3>TRAJECTORY</h3><span class="badge badge-warn badge-lg">${ts.length} steps</span><span class="chevron-toggle" id="traj-ch">&#9660;</span></div><div class="collapsible" id="traj" style="max-height:0">`;
    model.steps.forEach((step,idx)=>{
      if(step.type==='reasoning'&&step.text){
        h+=`<div style="padding:12px 20px;border-bottom:1px solid var(--g150)"><div style="font-size:12px;font-weight:600;color:var(--purple);margin-bottom:4px">REASONING</div><div style="font-size:13px;color:var(--g700);line-height:1.7">${esc(step.text)}</div></div>`;
      }
      if(step.type!=='tool_call')return;
      const id='ts'+idx,st=step.tool.split('__').pop()||step.tool,sv=step.tool.includes('__')?step.tool.split('__')[0]:'';
      h+=`<div class="traj-step"><div class="traj-gutter"><div class="traj-dot tool">${step.s}</div><div class="traj-line"></div></div><div class="traj-body"><div class="traj-header" onclick="toggleT('${id}')"><span class="traj-tool">${esc(st)}</span>${sv?`<span class="traj-server">${esc(sv)}</span>`:''}<span class="traj-chevron" id="${id}-ch">&#9654;</span></div><div class="traj-detail" id="${id}"><div class="traj-iolabel">Input</div><div class="traj-io">${esc(step.input||'{}')}</div>${step.output?`<div class="traj-iolabel">Output</div><div class="traj-io">${esc(step.output)}</div>`:''}</div></div></div>`;
    });
    if(model.final_observation){
      h+=`<div style="padding:16px 20px;border-top:1px solid var(--g200)"><div style="font-size:12px;font-weight:600;color:var(--orange-dark);margin-bottom:8px">FINAL OUTPUT</div><div style="font-size:13px;color:var(--g700);line-height:1.7;white-space:pre-wrap">${esc(model.final_observation)}</div></div>`;
    }
    h+='</div></div>';
  }

  document.getElementById('rollouts-content').innerHTML=h;
}

function renderEnvironment(){
  const env=DATA[currentEnv],bar=document.getElementById('env-tabs-bar');
  if(currentEnv==='hr'){
    bar.innerHTML=['Employee Profiles','Org Chart','Policies & Docs'].map((l,i)=>
      `<button class="env-tab-btn${i===0?' active':''}" onclick="switchET(this,'${['profiles','orgchart','policies'][i]}')">${l}</button>`
    ).join('');
    renderET('profiles');
  }else{
    bar.innerHTML=['Golden Reference','Template'].map((l,i)=>
      `<button class="env-tab-btn${i===0?' active':''}" onclick="switchET(this,'${['golden','template'][i]}')">${l}</button>`
    ).join('');
    renderET('golden');
  }
}
function switchET(el,id){el.parentElement.querySelectorAll('.env-tab-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderET(id);}

function renderET(tabId){
  const env=DATA[currentEnv],c=document.getElementById('env-content');let h='';
  if(currentEnv==='hr'){
    if(tabId==='profiles'){
      h+='<h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Employee Directory</h2><div class="profile-grid">';
      const colors=['#F5A623','#007AFF','#34C759','#AF52DE','#FF3B30','#5856D6','#FF9500','#00C7BE'];
      (env.npc_profiles||[]).forEach((p,i)=>{
        const ini=(p.first_name||'')[0]+(p.last_name||'')[0],bg=colors[i%colors.length];
        h+=`<div class="profile-card"><div class="profile-top"><div class="profile-avatar" style="background:${bg}">${ini}</div><div><div class="profile-name">${esc(p.first_name)} ${esc(p.last_name)}</div><div class="profile-title">${esc(p.occupation||'')}</div></div></div><div class="profile-email">${esc(p.email||'')}</div><div class="profile-info">${esc((p.public_info||'').substring(0,250))}</div></div>`;
      });
      h+='</div>';
    }else if(tabId==='orgchart'){
      h+='<h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Organization Chart</h2>';
      h+=renderOrgChart(env.seed_data?.['org_chart.md']||'');
      // Also render the full details below the tree
      h+='<div style="margin-top:32px"><h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Full Directory & Details</h2>';
      h+=`<div class="md-content" style="max-height:none">${md(env.seed_data?.['org_chart.md']||'No data.')}</div></div>`;
    }else if(tabId==='policies'){
      h+='<h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Policies & Seed Data</h2>';
      const order=['skills.md','compensation_bands.json','recruitment_hiring_policy.md','interview_process.md','interview_process_per_job.md','offer_template.md','onboarding_policy.md','candidate_faq.md','recruiting_policy.md','401K_policy.md','health_insurance_plan.md','README.md'];
      const seed=env.seed_data||{};
      const sorted=Object.keys(seed).sort((a,b)=>{const ia=order.indexOf(a),ib=order.indexOf(b);return(ia===-1?999:ia)-(ib===-1?999:ib);});
      sorted.forEach(fn=>{
        const id='sd-'+fn.replace(/[^a-zA-Z0-9]/g,''),content=seed[fn],preview=content.substring(0,100).replace(/\n/g,' ');
        const rendered=fn.endsWith('.json')?renderJsonObj(content):md(content);
        h+=`<div style="border:1px solid var(--g200);border-radius:var(--radius-lg);margin-bottom:8px;overflow:hidden"><div class="rsection-header" onclick="toggle('${id}')" style="padding:12px 16px"><h3 style="font-size:13px;min-width:200px">${esc(fn)}</h3><span style="font-size:12px;color:var(--g400);flex:1;margin-left:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(preview)}</span><span class="chevron-toggle" id="${id}-ch">&#9660;</span></div><div class="collapsible" id="${id}" style="max-height:0"><div class="md-content" style="margin:0;border-radius:0;border-top:1px solid var(--g200)">${rendered}</div></div></div>`;
      });
    }
  }else{
    if(tabId==='spreadsheet'){
      const sheets=env.models[currentModel]?.excel_sheets||{};
      h+=`<h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Agent Output &mdash; ${MN[currentModel]||currentModel}</h2>`;
      h+=renderExcel(sheets,'axl');
    }else if(tabId==='golden'){
      h+='<h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Golden Reference Sheet</h2>';
      h+=renderExcel(env.golden_sheet||{},'gxl');
    }else if(tabId==='template'){
      h+='<h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Reference Template</h2>';
      h+=`<div class="md-content" style="max-height:none">${md(env.template||'No template data.')}</div>`;
    }
  }
  c.innerHTML=h;
}

function init(){renderModelTabs();renderRollouts();}

<script id="edata" type="application/json">{"hr":{"task":"\nYou are a helpful assistant that uses tools to complete tasks.\n\nInstructions:\n- Use the tools to gather information and complete the user's task\\n- You can call tools multiple times to accomplish complex tasks\\n- When you have completed the task, respond with your final answer WITHOUT calling any more tools\\n- Your final response will end the conversation\\n\\n# HR Recruiting \\u2014 Implicit Task Conventions\\n\\nThese are standard conventions that apply to every recruiting task.\\n\\n## HRIS Updates\\n- Every action that changes candidate status, interview details, or offer terms must be logged in HRIS\\n- If there is a relevant field or record in HRIS for what you did, update it\\n\\n## Calendar Events\\n- Check all participants' calendars for conflicts before scheduling\\n- Include timezone in all calendar events\\n- Include all relevant participants on the invite\\n\\n## Stakeholder Communication\\n- When a change affects someone, notify them (e.g., swapping an interviewer \\u2192 notify the old and new interviewer)\\n- When you complete an action someone requested, confirm it with them\\n- Internal jargon, acronyms, and process terminology should not appear in candidate emails\\n\\n## Privacy\\n- Do not include compensation details in calendar invites or group communications\\n- Medical, accommodation details, and other personal info should only be shared with need-to-know parties\"\n\n\n\nChat Robert Kim to confirm what he wants covered in the 20-minute \\u201cPM req reset\\u201d sync and his preferred meeting title/description, then schedule it this week based on his availability and confirm the time in Chat. Chat Jennifer Martinez for the approved \\u201coffer declined\\u201d req-status wording and next-step bullets, then email Emily Davis and Jennifer with the updated req status and next steps using that language.\\n\\nServices available to you as websites:\\n* Frappe HRMS: http://frappe-hrms:8000 (login: Administrator / admin)\\n* Rocket.Chat: http://rocketchat:3000 (login: agent / agent123)\\n* MailHog: http://mailhog:8025\\n* Baikal Calendar: http://baikal:80\\n* Calendar MCP: http://chronos-mcp:8040\\n* Calendar Tool Server: http://chronos-server:8050\"\n   ","rubric_definition":"# Task Rubric: Recruiting Operations - Mark Requisition Impact After Offer Decline and Align Next Steps with Hiring Manager\n\n## Task Overview\nAfter Nathan Brooks declined a Product Manager offer, the agent must: (1) message Robert Kim to confirm meeting details before scheduling, (2) schedule a \"PM req reset\" sync based on Robert Kim's calendar availability and confirm via chat, (3) message Jennifer Martinez for approved req-status wording, (4) email Emily Davis and Jennifer Martinez with the updated requisition status and next steps using Jennifer's approved language, and (5) update HRIS to reflect the offer decline.\n\n## Success Criteria\n\n### Explicit Requirements\n- **Chat to Robert Kim is clear and actionable**: The message to Robert Kim asking about meeting content/title/description preferences is well-structured, easy to respond to, and frames the ask in appropriate business context (not a vague or confusing request)\n- **Chat to Jennifer Martinez is precise and professional**: The request to Jennifer Martinez for approved wording clearly specifies what is needed (status language and next-step bullets), explains the purpose, and makes it easy for her to respond efficiently\n- **Confirmation chat to Robert Kim is helpful**: The follow-up chat confirming the scheduled meeting provides all relevant details (time, title, duration) in a scannable format so Robert can quickly verify correctness\n\n### Implicit Professional Standards (Certainly Expected)\n- **Cross-channel consistency**: Names, dates, times, meeting titles, and requisition details are consistent across chat messages, calendar events, email, and HRIS \u2014 no contradictory information appears across channels\n- **No sensitive/internal-only information leaked**: The email does not contain inappropriate internal jargon, candidate compensation details, or other confidential information beyond what Jennifer approved\n- **Professional tone throughout**: All communications reflect appropriate HR recruiting professionalism \u2014 empathetic where relevant, business-appropriate, and free of casual or careless language\n- **HRIS notation is policy-safe and audit-ready**: The language used in the HRIS update is specific enough for internal audit context without unnecessary sensitive detail or ambiguity\n\n## Scoring Guidelines\n\n```\nDimension: Chat Communication Quality (Robert Kim + Jennifer Martinez)\n- 1.0: All chat messages are clear, well-structured, and actionable; the ask to Robert is specific about what input is needed without being overly prescriptive; the ask to Jennifer clearly frames the need for approved language; the confirmation to Robert is scannable and includes all key details; tone is appropriately professional throughout\n- 0.7: Chat messages accomplish their purpose but have minor quality issues (e.g., slightly verbose, unclear framing, confirmation missing a useful detail like duration or title)\n- 0.3: Chat messages are confusing, poorly structured, or lack professional tone; recipients would need to ask follow-up questions to understand what is being requested\n- 0.0: Chat messages are unintelligible, rude, or fundamentally miscommunicate the purpose\n\nDimension: Calendar Event Quality\n- 1.0: Meeting event has a professional, descriptive title and description that provide sufficient context for attendees; the description accurately reflects the meeting purpose and is consistent with what was discussed in chat with Robert; the event feels well-organized and ready for stakeholder consumption\n- 0.7: Meeting event is functional but title/description could be clearer or more informative; minor inconsistency with chat discussions\n- 0.3: Meeting event has a vague or unprofessional title/description that would leave attendees unclear about the meeting's purpose\n- 0.0: Meeting event has no meaningful title or description, or content is wildly inconsistent with the task context\n\nDimension: Email to Emily Davis & Jennifer Martinez \u2014 Content Quality\n- 1.0: Email is professionally written, logically structured, and easy to scan; Jennifer's approved language is integrated naturally and coherently into the email's overall narrative; no confidential information leaked; tone is appropriate for an internal stakeholder update; next steps are clearly delineated with ownership implied; information is consistent with what was shared in other channels\n- 0.7: Email is mostly well-written but has minor quality issues (e.g., slightly awkward integration of Jennifer's language, less-than-ideal structure, or minor tone inconsistency)\n- 0.3: Email is poorly structured, difficult to scan, or includes inappropriate information; significant inconsistency with other channels or Jennifer's approved language is used in a confusing way\n- 0.0: Email is unprofessional, incoherent, or leaks sensitive information (compensation details, candidate personal information, etc.)\n\nDimension: Cross-Channel Consistency & HRIS Notation Quality\n- 1.0: All information is consistent across chat, calendar, email, and HRIS with no contradictions; HRIS notation language is professional, audit-ready, and specific enough for internal context without unnecessary sensitive detail or ambiguity\n- 0.5: Minor inconsistencies across channels (e.g., slight phrasing differences that don't cause confusion) or HRIS notation is functional but could be more precise or policy-safe\n- 0.0: Significant contradictions across channels or HRIS notation is vague, unprofessional, or contains inappropriate sensitive detail\n\nDimension: Task Scope Discipline\n- 1.0: Agent performed only the necessary state-changing actions (chats to Robert Kim and Jennifer Martinez, one calendar event, one email to Emily Davis and Jennifer Martinez, one HRIS update) with no unnecessary outbound communications or state modifications. Additional read-only actions (searches, lookups, calendar checks, retries) are acceptable and not penalized.\n- 0.7: One unnecessary state-changing action (e.g., an extra outbound message, an extra calendar event, or an unneeded HRIS modification beyond what the task requires)\n- 0.3: Two unnecessary state-changing actions\n- 0.0: Three or more unnecessary state-changing actions, or severe out-of-scope side effects (e.g., contacting the candidate directly, modifying unrelated records, sending emails to unintended recipients)\n","seed_data":{"401K_policy.md":"# WEAVER ENTERPRISES INC.\n## 401(k) RETIREMENT PLAN POLICY\n\n**Document Number:** HR-POL-005  \n**Effective Date:** January 1, 2024  \n**Last Revised:** January 1, 2024  \n**Policy Owner:** Human Resources Department  \n**Plan Administrator:** Fidelity Investments  \n**Approved By:** Chief Human Resources Officer\n\n---\n\n## 1. PLAN OVERVIEW\n\nThe Amazon Inc. 401(k) Retirement Savings Plan (\"the Plan\") is designed to help employees save for retirement through tax-advantaged contributions and Company matching contributions. The Plan is a defined contribution plan qualified under Section 401(k) of the Internal Revenue Code.\n\n### 1.1 Plan Benefits\n\n- Pre-tax and Roth after-tax contribution options\n- Employer matching contributions\n- Immediate vesting of Company match\n- Wide variety of investment options\n- Tax-deferred growth (or tax-free for Roth)\n- Portable - take your account with you if you leave\n- Loan and hardship withdrawal provisions\n- Professional investment advice available\n\n### 1.2 Plan Administrator\n\n**Fidelity Investments** serves as the Plan's recordkeeper and trustee.\n\n**Contact Information:**\n- Website: www.401k.com\n- Phone: 1-800-555-0401\n- Mobile App: Fidelity NetBenefits\n\n## 2. ELIGIBILITY AND ENROLLMENT\n\n### 2.1 Eligibility Requirements\n\n**Eligible Employees:**\n- All employees age 21 and older\n- Must complete 90 days of service\n- Eligibility begins on the first day of the month following completion of 90-day waiting period\n\n**Excluded Employees:**\n- Independent contractors\n- Leased employees\n- Non-resident aliens with no U.S.-source income\n- Union employees (unless union agreement provides for participation)\n\n### 2.2 Automatic Enrollment\n\n**Automatic Enrollment Feature:**\n- All eligible employees are automatically enrolled at 3% of eligible compensation\n- Enrollment occurs on eligibility date unless employee actively opts out\n- Contributions directed to Plan's default investment option (target-date fund based on age)\n- Employees may change contribution rate or opt out at any time\n\n**Automatic Increase Program (Optional):**\n- Employees may elect to automatically increase contribution by 1% each year\n- Increases occur each January 1st\n- Continues until reaching 10% or employee-specified maximum\n- Employees may opt in or out at any time\n\n### 2.3 How to Enroll or Make Changes\n\n**Online Enrollment:**\n1. Visit www.401k.com\n2. Log in using Social Security Number and PIN (provided after eligibility)\n3. Select contribution rate (1%-100% of eligible pay)\n4. Choose contribution type (pre-tax, Roth, or both)\n5. Select investments or use professionally managed option\n6. Designate beneficiaries\n\n**Phone Enrollment:**\n- Call Fidelity at 1-800-555-0401\n- Representatives available Monday-Friday, 8am-10pm ET\n\n**Changes Effective:**\n- Enrollment or changes submitted by 4pm ET take effect within 1-2 pay periods\n\n## 3. CONTRIBUTIONS\n\n### 3.1 Employee Contributions\n\n**Contribution Types:**\n\n**Pre-Tax Contributions:**\n- Deducted from pay before income taxes\n- Reduces current taxable income\n- Taxes paid upon withdrawal in retirement\n- Growth is tax-deferred\n\n**Roth After-Tax Contributions:**\n- Deducted from pay after income taxes\n- Does not reduce current taxable income\n- Qualified withdrawals are tax-free in retirement (including earnings)\n- Must meet 5-year rule and be age 59\u00bd for tax-free withdrawal\n\nEmployees may contribute pre-tax, Roth, or a combination of both.\n\n### 3.2 Contribution Limits\n\n**2024 IRS Limits:**\n- Elective deferral limit: $23,000 per year\n- Catch-up contributions (age 50+): Additional $7,500 per year\n- Total catch-up limit for age 50+: $30,500 per year\n\n**Total Contribution Limit (employee + employer):**\n- $69,000 per year (or $76,500 with catch-up for age 50+)\n\n**Highly Compensated Employee Limits:**\n- Employees earning $155,000+ may be subject to additional IRS-imposed limits\n- Notifications sent if limits affect your contributions\n\n### 3.3 Eligible Compensation\n\nContributions are calculated as a percentage of eligible compensation:\n\n**Includes:**\n- Base salary or hourly wages\n- Overtime pay\n- Bonuses and commissions\n- Shift differentials\n\n**Excludes:**\n- Reimbursements and expense allowances\n- Employer contributions to benefit plans\n- Severance pay\n- Equity compensation (stock options, RSUs)\n\n**Annual Compensation Limit:**\n- IRS limits eligible compensation to $345,000 for 2024\n\n### 3.4 Changing Your Contributions\n\n- Change contribution percentage anytime online or by phone\n- Increase, decrease, or stop contributions at any time\n- Start contributions again at any time if previously opted out\n- Changes take effect within 1-2 pay periods\n\n## 4. EMPLOYER MATCHING CONTRIBUTIONS\n\n### 4.1 Company Match Formula\n\nAmazon provides a generous matching contribution:\n\n**Match Structure:**\n- 100% match on the first 3% of eligible compensation contributed\n- 50% match on the next 2% of eligible compensation contributed\n\n**Examples:**\n\n| Employee Contributes | Company Match | Total Contribution |\n|---------------------|---------------|-------------------|\n| 1% | 1% | 2% |\n| 3% | 3% | 6% |\n| 5% | 4% (3% + 0.5\u00d72%) | 9% |\n| 6%+ | 4% (maximum match) | 10%+ |\n\nTo receive the maximum Company match of 4%, employees must contribute at least 5% of eligible compensation.\n\n### 4.2 Match Timing\n\n- Company match contributions deposited each pay period\n- Match based on per-pay-period contributions (not annual total)\n- To maximize match, contribute consistently throughout the year\n\n### 4.3 Match Eligibility\n\n- All participating employees receive match (no waiting period)\n- Must be employed on the date contributions are made to receive match for that pay period\n- No match on contributions made after separation from Company\n\n### 4.4 True-Up Contribution\n\nThe Plan does not include an annual true-up contribution. To maximize the Company match, avoid front-loading contributions early in the year if you will reach the annual limit before year-end.\n\n## 5. VESTING\n\n### 5.1 Vesting Schedule\n\n**Employee Contributions:**\n- 100% vested immediately (pre-tax and Roth contributions)\n- Always fully own your own contributions and earnings\n\n**Employer Matching Contributions:**\n- 100% vested immediately\n- Full ownership from date of match deposit\n- No forfeiture upon termination\n\n**Immediate Vesting Benefit:**\n- All contributions (employee and employer) are fully vested at all times\n- No waiting period or service requirement\n- Take full account balance with you if you leave the Company\n\n## 6. INVESTMENT OPTIONS\n\n### 6.1 Available Investments\n\nThe Plan offers a diverse menu of investment options:\n\n**Target-Date Funds (Default Option):**\n- All-in-one diversified portfolios\n- Automatically adjust asset allocation as you near retirement\n- Available in 5-year increments (e.g., 2030, 2035, 2040)\n- Managed by Fidelity\n\n**Equity Funds:**\n- U.S. Large-Cap (growth and value)\n- U.S. Mid-Cap\n- U.S. Small-Cap\n- International Developed Markets\n- Emerging Markets\n\n**Fixed-Income Funds:**\n- Core Bond Fund\n- Short-Term Bond Fund\n- Inflation-Protected Securities\n- High-Yield Bond Fund\n\n**Specialty Funds:**\n- Real Estate (REIT)\n- Commodities\n- Stable Value Fund (capital preservation)\n\n**Self-Directed Brokerage Option:**\n- Access to thousands of additional investment options\n- Additional fees may apply\n- Requires separate election\n\n**Total Investment Options:** 20+ funds covering all major asset classes\n\n### 6.2 Fund Information\n\nDetailed information about each investment option, including:\n- Expense ratios\n- Historical performance\n- Risk ratings\n- Portfolio holdings\n- Fund fact sheets\n\nAvailable at www.401k.com or by calling 1-800-555-0401.\n\n### 6.3 Changing Investments\n\n**Future Contributions:**\n- Change investment elections for future contributions anytime\n- Changes effective next business day\n\n**Existing Balance (Fund Transfers):**\n- Transfer existing account balance between investments anytime\n- Unlimited transfers (no fees)\n- Transfers processed same business day (if submitted by 4pm ET)\n\n**Rebalancing:**\n- Automatic rebalancing available (quarterly, semi-annual, or annual)\n- Maintains target asset allocation automatically\n\n## 7. PROFESSIONAL INVESTMENT HELP\n\n### 7.1 Managed Accounts\n\n**Fidelity Personalized Planning & Advice:**\n- Professional portfolio management based on your goals, risk tolerance, and timeline\n- Ongoing monitoring and rebalancing\n- Annual fee: 0.40% of managed assets (charged quarterly)\n- Enroll online or call Fidelity\n\n### 7.2 Investment Guidance\n\n**Free Resources:**\n- Online retirement planning tools\n- Investment education library\n- Retirement income calculator\n- Asset allocation questionnaires\n\n**Fidelity Representatives:**\n- Phone guidance: 1-800-555-0401\n- One-on-one consultations (schedule through website)\n- Educational webinars throughout the year\n\n### 7.3 Financial Planning Tools\n\nAccess free tools at www.401k.com:\n- Retirement savings calculator\n- Social Security estimator\n- Budget and expense tracker\n- College savings calculator\n- Retirement income planner\n\n## 8. ACCESSING YOUR MONEY\n\n### 8.1 While Employed\n\n**In-Service Withdrawals:**\n\nGenerally, you cannot withdraw funds while actively employed, except:\n\n**Age 59\u00bd Withdrawals:**\n- Available once you reach age 59\u00bd\n- No penalty or special requirements\n- Taxes apply (unless Roth qualified withdrawals)\n\n**Hardship Withdrawals:**\n- Available for immediate and heavy financial need\n- Limited to employee contributions only (not earnings or match)\n- Must demonstrate financial hardship\n- Subject to taxes and 10% early withdrawal penalty (if under age 59\u00bd)\n- See Section 8.3 for qualifying hardships\n\n**Loans:**\n- Borrow from your own account\n- Must be repaid with interest\n- See Section 8.4 for loan provisions\n\n### 8.2 After Separation from Service\n\n**Distribution Options After Leaving Company:**\n\n**Option 1: Leave Money in Plan**\n- Keep account in Plan if balance exceeds $7,000\n- Continue to manage investments\n- No additional contributions allowed\n- Take distributions later when needed\n\n**Option 2: Rollover to IRA or New Employer's Plan**\n- Roll over to traditional IRA (pre-tax funds)\n- Roll over to Roth IRA (Roth funds, or convert pre-tax funds with taxes)\n- Roll over to new employer's 401(k) plan (if accepted)\n- Maintains tax-deferred/tax-free status\n- No taxes or penalties\n\n**Option 3: Cash Distribution**\n- Receive lump-sum payment\n- Subject to income taxes\n- 10% early withdrawal penalty if under age 59\u00bd (with exceptions)\n- 20% mandatory federal withholding\n\n**Automatic Cashout:**\n- If balance is $1,000-$7,000 and you don't make an election, automatically rolled to IRA\n- If balance is under $1,000, automatically cashed out and check mailed\n\n### 8.3 Hardship Withdrawals\n\n**Qualifying Hardship Reasons:**\n- Medical expenses for employee, spouse, or dependents\n- Costs related to purchase of primary residence (excluding mortgage payments)\n- Tuition and educational fees for next 12 months\n- Payments to prevent eviction or foreclosure on primary residence\n- Burial or funeral expenses for family members\n- Expenses to repair damage to primary residence (casualty loss)\n- Expenses and losses due to federally declared disaster\n\n**Requirements:**\n- Must demonstrate immediate and heavy financial need\n- Must have exhausted other resources (loans, insurance, other assets)\n- Amount limited to need (plus taxes and penalties)\n- Cannot contribute to Plan for 6 months after hardship withdrawal\n\n**Application Process:**\n- Complete hardship withdrawal request form\n- Provide supporting documentation\n- HR and plan administrator review and approve\n- Processing time: 7-10 business days\n\n### 8.4 Loans\n\n**Loan Provisions:**\n- Borrow minimum of $1,000\n- Borrow maximum of lesser of:\n  - $50,000 (reduced by highest outstanding loan balance in past 12 months), OR\n  - 50% of vested account balance\n- Maximum of 2 loans outstanding at any time\n\n**Loan Terms:**\n- General purpose loan: Up to 5-year repayment\n- Primary residence loan: Up to 15-year repayment\n- Interest rate: Prime rate + 1% (fixed at loan origination)\n- Interest paid back to your own account\n\n**Repayment:**\n- Automatic payroll deduction\n- Payments made at least quarterly\n- Level amortization (equal payments)\n\n**Fees:**\n- Loan origination fee: $75 (one-time)\n- Annual maintenance fee: $50 per loan\n- Fees deducted from loan proceeds or account balance\n\n**Defaulted Loans:**\n- Loan becomes taxable distribution if not repaid\n- 10% early withdrawal penalty applies if under age 59\u00bd\n- Loan defaults if:\n  - Payments not made for 90+ days\n  - Employment terminates (loan due within 60 days)\n\n**Application:**\n- Apply online at www.401k.com or call 1-800-555-0401\n- Funds typically available within 5 business days\n- Spouse consent required for loans over $5,000\n\n### 8.5 Required Minimum Distributions (RMDs)\n\n**When RMDs Begin:**\n- Age 73 (or 75 if born in 1960 or later)\n- Must begin by April 1 following year you turn required age\n- Exception: Can delay if still employed (and not 5% owner)\n\n**How RMDs Are Calculated:**\n- Based on IRS life expectancy tables\n- Calculated each year based on prior year-end balance\n- Fidelity calculates and notifies you of RMD amount\n\n**Tax Treatment:**\n- Pre-tax account RMDs are taxable income\n- Roth account RMDs are tax-free (if qualified)\n- Failure to take RMD results in 25% penalty on amount not taken\n\n## 9. BENEFICIARY DESIGNATIONS\n\n### 9.1 Importance of Beneficiary Designation\n\n- Designate who receives your account balance if you die\n- Beneficiaries avoid probate process\n- Can designate primary and contingent beneficiaries\n- Can split percentage among multiple beneficiaries\n\n### 9.2 Spousal Rights\n\n**If You Are Married:**\n- Spouse is automatic beneficiary unless spouse signs written consent to name someone else\n- Spousal consent must be notarized\n- Applies even if you designated someone else before marriage\n\n**If You Are Not Married:**\n- Can name anyone as beneficiary (person, trust, charity, estate)\n- No consent required\n\n### 9.3 Updating Beneficiaries\n\n- Review and update beneficiary designations regularly\n- Update after major life events: marriage, divorce, births, deaths\n- Update online at www.401k.com or by submitting paper form\n- Previous designation revoked by new designation\n\n### 9.4 If No Beneficiary Designated\n\nIf no beneficiary is designated or all beneficiaries predecease you:\n1. Spouse (if married)\n2. Children (equally)\n3. Parents (equally)\n4. Estate\n\n## 10. PLAN ADMINISTRATION\n\n### 10.1 Plan Year\n\nThe Plan operates on a calendar year (January 1 - December 31).\n\n### 10.2 Plan Administrator Responsibilities\n\n**Amazon Inc. serves as Plan Administrator:**\n- Interpret and administer Plan provisions\n- Make eligibility determinations\n- Process distributions and loans\n- Ensure compliance with federal regulations\n- Coordinate with Fidelity on recordkeeping\n\n### 10.3 Fiduciary Responsibilities\n\n**Plan Fiduciaries:**\n- Plan Administrator (Amazon)\n- Investment Committee (selects and monitors investment options)\n- Trustee (Fidelity Investments)\n\nFiduciaries act in best interest of Plan participants and beneficiaries.\n\n### 10.4 Plan Costs and Fees\n\n**Plan-Level Administrative Fees:**\n- Recordkeeping and administrative costs paid by Company\n- No direct charge to participant accounts for plan administration\n\n**Investment Fees:**\n- Each fund has an expense ratio (annual management fee)\n- Expense ratios range from 0.05% to 1.20% depending on fund\n- Deducted from fund returns (not separately billed)\n\n**Individual Transaction Fees:**\n- Loan origination: $75\n- Loan maintenance: $50 per year per loan\n- QDRO processing: $500\n- Overnight check delivery: $25\n- Paper statement fee: $2 per quarter (waived if opt for electronic)\n\n### 10.5 Plan Amendments and Termination\n\nAmazon reserves the right to:\n- Amend the Plan at any time\n- Terminate the Plan at any time\n- If Plan terminates, all accounts become 100% vested\n- Participants will be notified of significant changes\n\n## 11. SPECIAL SITUATIONS\n\n### 11.1 Military Leave\n\n**During Military Service:**\n- Can continue contributions if receiving pay\n- Employer match continues on contributions made\n- Can contribute missed deferrals when returning (within specified timeframe)\n\n**Returning from Military Service:**\n- Treated as continuously employed for vesting purposes\n- Eligible for makeup contributions based on military pay\n\n### 11.2 Leave of Absence\n\n**During Approved Unpaid Leave:**\n- Cannot make contributions (no compensation)\n- No employer match while not receiving pay\n- Account remains invested\n- Can make investment changes\n- Vesting service may continue depending on leave type (FMLA, military)\n\n### 11.3 Qualified Domestic Relations Orders (QDRO)\n\nIf you divorce, a court may order that part of your account be paid to your former spouse:\n- Order must be a Qualified Domestic Relations Order (QDRO)\n- Company reviews order to ensure it meets Plan and legal requirements\n- Once approved, account divided according to order\n- Former spouse (alternate payee) can roll over or take distribution\n\n**QDRO Review Fee:** $500 (charged to participant account)\n\n### 11.4 Disability\n\nIf you become disabled and receive long-term disability benefits:\n- Can continue contributions if receiving disability pay from Company\n- If disability pay ceases, contributions stop\n- Account remains invested\n- May access funds if disabled (before age 59\u00bd) without 10% penalty\n\n### 11.5 Death\n\n**Upon Participant Death:**\n- Beneficiaries notified and sent claim forms\n- Account balance paid to designated beneficiaries\n- Spousal beneficiaries have multiple options (keep in plan, rollover, distribute)\n- Non-spousal beneficiaries must take distributions (but can stretch over lifetime)\n\n## 12. IMPORTANT LEGAL INFORMATION\n\n### 12.1 Plan Documents\n\nThis policy summary provides an overview of the Plan. The official Plan Document and Summary Plan Description (SPD) govern in case of any discrepancy.\n\nDocuments available:\n- Summary Plan Description (SPD)\n- Plan Document\n- Trust Agreement\n- Annual notices\n\nAccess documents at: www.401k.com or request printed copy from HR.\n\n### 12.2 ERISA Rights\n\nAs a participant in the Plan, you are entitled to certain rights and protections under the Employee Retirement Income Security Act of 1974 (ERISA):\n\n**Receive Information About Your Plan:**\n- Examine Plan documents at HR office\n- Obtain copies of Plan documents (reasonable fee may apply)\n- Receive Summary Annual Report (SAR) each year\n\n**Prudent Actions by Plan Fiduciaries:**\n- Plan fiduciaries must act prudently and in interest of participants\n- If fiduciaries misuse Plan assets, they can be held responsible\n\n**Enforce Your Rights:**\n- If claim is denied, right to appeal\n- Right to sue for benefits\n- Right to protection from retaliation for exercising ERISA rights\n\n### 12.3 Claims and Appeals\n\n**If Distribution Claim Is Denied:**\n- Receive written explanation within 90 days\n- Appeal denial within 60 days\n- Decision on appeal within 60 days\n- If appeal denied, may file suit in federal court\n\n## 13. TAX INFORMATION\n\n### 13.1 Tax Treatment of Contributions\n\n**Pre-Tax Contributions:**\n- Reduce taxable income in year contributed\n- Reported in Box 12 of W-2 with code D\n- Reduce federal income tax (and usually state)\n- Do not reduce Social Security or Medicare tax\n\n**Roth Contributions:**\n- Made with after-tax dollars\n- Do not reduce taxable income\n- Reported in Box 12 of W-2 with code AA\n\n### 13.2 Tax Treatment of Distributions\n\n**Pre-Tax Account Distributions:**\n- Fully taxable as ordinary income\n- Added to taxable income in year received\n- 10% early withdrawal penalty if under age 59\u00bd (with exceptions)\n\n**Roth Account Distributions:**\n- Contributions always tax-free\n- Earnings tax-free if qualified distribution (age 59\u00bd + 5-year rule)\n- Earnings taxable if non-qualified distribution\n- 10% penalty applies to taxable portion if under age 59\u00bd\n\n**Withholding:**\n- 20% mandatory federal withholding on eligible rollover distributions paid to you\n- Can avoid withholding by choosing direct rollover\n- State withholding may also apply\n\n### 13.3 Form 1099-R\n\n- Fidelity issues Form 1099-R by January 31 for prior year distributions\n- Reports taxable distributions to IRS\n- Use to prepare tax return\n- Keep for your records\n\n### 13.4 Consult a Tax Advisor\n\nThis summary provides general tax information. Individual tax situations vary. Consult a qualified tax advisor for advice specific to your situation.\n\n## 14. CONTACT INFORMATION\n\n### 14.1 Fidelity Investments (Plan Administrator)\n\n**Website:** www.401k.com\n**Phone:** 1-800-555-0401\n**Hours:** Monday-Friday, 8am
