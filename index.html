pass (if applicable)\n- Temporary password cards for initial login\n\n### 4.2 Welcome Package Delivery\n\n**On-Site Employees:**\n- Package placed on desk before arrival\n- IT equipment set up and ready to use\n- Badge and parking pass available at reception\n\n**Remote Employees:**\n- Package shipped to home address\n- Target delivery: 2-3 business days before start date\n- Tracking information provided\n- IT equipment pre-configured with remote access\n- Setup instructions included\n\n### 4.3 Welcome Email\n\nNew hires receive a welcome email from HR on their first day containing:\n- Link to employee self-service portal\n- Instructions for initial system login\n- Benefits enrollment instructions and deadlines\n- List of required training courses\n- Key contacts (HR, IT Help Desk, Manager)\n- First week schedule\n- Link to company intranet and resources\n\n## 5. FIRST DAY ONBOARDING\n\n### 5.1 First Day Schedule (On-Site)\n\n| Time | Activity | Location |\n|------|----------|----------|\n| 8:30 AM | Arrival and reception | Main lobby |\n| 8:45 AM | Badge pickup and building tour | Security/Facilities |\n| 9:30 AM | HR orientation (paperwork, policies) | HR Conference Room |\n| 11:00 AM | IT setup and system access | IT Help Desk |\n| 12:00 PM | Lunch with manager and team | Team's choice |\n| 1:00 PM | Workspace setup | Assigned desk |\n| 2:00 PM | Manager one-on-one (expectations, 30-60-90) | Manager's office |\n| 3:30 PM | Meet the team | Team area |\n| 4:30 PM | End of day check-in with HR | HR office |\n\n### 5.2 First Day Schedule (Remote)\n\n| Time | Activity | Platform |\n|------|----------|----------|\n| 9:00 AM | Virtual welcome call with HR | Zoom |\n| 9:30 AM | HR orientation (paperwork review) | Zoom |\n| 10:30 AM | IT setup assistance | IT Help Desk call |\n| 11:30 AM | System access verification | Self-guided |\n| 12:00 PM | Break | |\n| 1:00 PM | Manager one-on-one (video call) | Zoom |\n| 2:00 PM | Virtual team introduction | Zoom (team meeting) |\n| 3:00 PM | Onboarding buddy introduction | Zoom |\n| 3:30 PM | Self-guided system exploration | Self-paced |\n| 4:30 PM | End of day check-in with manager | Slack/Zoom |\n\n### 5.3 Required First Day Activities\n\n**HR Orientation:**\n- Complete I-9 verification (must be done within 3 days)\n- Review and sign any outstanding paperwork\n- Benefits enrollment overview and deadlines\n- Payroll and direct deposit confirmation\n- Review employee handbook highlights\n- Q&A session\n\n**IT Setup:**\n- Verify laptop/computer functioning\n- Set permanent passwords\n- Test email access\n- Access key systems (HRIS, communication tools)\n- Install required software\n- Set up multi-factor authentication\n- Test VPN access (for remote/hybrid employees)\n\n**Manager Meeting:**\n- Welcome and introductions\n- Review role expectations\n- Discuss 30-60-90 day plan\n- Set initial priorities and projects\n- Schedule regular one-on-ones\n- Introduce onboarding buddy\n\n## 6. FIRST WEEK ONBOARDING\n\n### 6.1 First Week Goals\n\nBy end of Week 1, new employees should:\n- Complete all required paperwork\n- Have full system access\n- Understand their role and initial priorities\n- Meet key team members and stakeholders\n- Complete Day 1 required training\n- Know where to find resources and help\n- Feel welcomed and connected\n\n### 6.2 First Week Activities\n\n**Day 2:**\n- Complete mandatory compliance training\n- Deeper dive into role with manager\n- Begin reviewing documentation and materials\n- Continue meeting team members\n\n**Day 3:**\n- Start initial assignments or shadowing\n- Lunch with onboarding buddy\n- Continue required training modules\n- Department/team overview meeting\n\n**Day 4:**\n- Continue hands-on work or training\n- Meet with key stakeholders\n- Review team processes and tools\n- Check-in with manager\n\n**Day 5:**\n- Week 1 reflection meeting with manager\n- Complete first week survey\n- Finalize benefits enrollment (if not done)\n- Set priorities for Week 2\n\n### 6.3 Required Training (Week 1)\n\nAll new employees must complete within first week:\n\n| Training | Duration | Delivery |\n|----------|----------|----------|\n| Company Overview and Culture | 1 hour | Video/eLearning |\n| Code of Conduct | 30 min | eLearning |\n| Anti-Harassment and Discrimination | 1 hour | eLearning |\n| Information Security Awareness | 45 min | eLearning |\n| Data Privacy (GDPR/CCPA) | 30 min | eLearning |\n| Workplace Safety | 30 min | eLearning |\n| Benefits Enrollment Overview | 30 min | Video |\n\nAdditional role-specific training assigned by manager.\n\n## 7. 30-60-90 DAY ONBOARDING PLAN\n\n### 7.1 First 30 Days: Learn\n\n**Focus Areas:**\n- Understanding the role and responsibilities\n- Learning company culture and values\n- Building relationships with team and stakeholders\n- Completing all required training\n- Getting up to speed on tools and processes\n\n**Manager Responsibilities:**\n- Weekly one-on-ones (minimum)\n- Clear direction on initial projects\n- Regular feedback and guidance\n- 30-day check-in meeting\n- Address questions and concerns promptly\n\n**New Hire Expectations:**\n- Complete all required training\n- Meet with key stakeholders\n- Begin contributing to team projects\n- Ask questions and seek help when needed\n- Document learnings and questions\n\n**30-Day Checkpoint:**\n- Formal meeting with manager\n- Review progress against expectations\n- Discuss any challenges or concerns\n- Adjust plan if needed\n- Complete 30-day feedback survey\n\n### 7.2 Days 31-60: Contribute\n\n**Focus Areas:**\n- Taking ownership of assigned projects\n- Applying learning to real work\n- Deepening relationships and collaboration\n- Identifying areas for growth\n- Providing value to the team\n\n**Manager Responsibilities:**\n- Continue regular one-on-ones\n- Provide stretch assignments\n- Give ongoing feedback\n- Connect new hire to broader organization\n- 60-day check-in meeting\n\n**New Hire Expectations:**\n- Own and complete assigned projects\n- Proactively identify improvements\n- Collaborate effectively with team\n- Seek feedback and act on it\n- Continue building network\n\n**60-Day Checkpoint:**\n- Review accomplishments and progress\n- Discuss growth and development\n- Identify any performance concerns early\n- Set goals for final 30 days\n- Complete 60-day feedback survey\n\n### 7.3 Days 61-90: Own\n\n**Focus Areas:**\n- Fully performing in role\n- Operating independently\n- Contributing meaningfully to team goals\n- Building expertise and credibility\n- Identifying long-term development goals\n\n**Manager Responsibilities:**\n- Transition to standard one-on-one cadence\n- Provide constructive performance feedback\n- Discuss career development\n- 90-day performance review\n- Confirm successful completion of probation\n\n**New Hire Expectations:**\n- Perform role independently\n- Meet performance expectations\n- Demonstrate company values\n- Develop expertise in area\n- Contribute ideas and improvements\n\n**90-Day Review:**\n- Formal performance assessment\n- Document strengths and development areas\n- Confirm successful completion of probationary period\n- Set goals for remainder of year\n- Complete 90-day onboarding survey\n- Transition to regular performance management\n\n### 7.4 Probationary Period\n\n**Duration:** 90 days from start date\n\n**Purpose:**\n- Assess fit and performance\n- Provide intensive support and feedback\n- Allow employee to evaluate fit\n\n**Expectations:**\n- Employee demonstrates ability to perform role\n- Employee exhibits company values\n- No significant performance or conduct concerns\n- Mutual agreement to continue employment\n\n**Outcomes:**\n- **Successful:** Employment continues; transition to regular status\n- **Extended:** Additional 30-60 days if more time needed\n- **Unsuccessful:** Employment may be terminated\n\n## 8. REMOTE EMPLOYEE ONBOARDING\n\n### 8.1 Remote Onboarding Principles\n\nRemote onboarding requires extra intentionality to:\n- Create connection despite physical distance\n- Ensure access to all necessary tools and information\n- Provide adequate support and communication\n- Build relationships with team members\n\n### 8.2 Equipment and Setup\n\n**Pre-Start Equipment Shipment:**\n- All equipment shipped to arrive 2-3 days before start\n- Shipping tracked and confirmed\n- Include setup instructions and IT support contact\n- Test equipment works before first day\n\n**Home Office Requirements:**\n- Reliable internet connection (minimum 25 Mbps)\n- Quiet, dedicated workspace\n- Appropriate desk and chair\n- Good lighting for video calls\n\n**Home Office Stipend:**\n- One-time $500 stipend for home office setup (new remote hires)\n- Monthly $75 internet/phone stipend\n- Submit receipts through expense system\n- See Remote Work Policy for details\n\n### 8.3 Virtual Orientation\n\n**Day 1 Virtual Welcome:**\n- Video call with HR for orientation\n- Virtual building/team tour video\n- Video introductions with team members\n- Virtual coffee chat with onboarding buddy\n\n**Virtual Onboarding Best Practices:**\n- Camera on for all meetings (when possible)\n- Use collaboration tools (Slack, Teams) actively\n- Schedule informal virtual coffee chats\n- Over-communicate in first weeks\n- Record important meetings for review\n\n### 8.4 Remote-Specific First Week\n\n**Additional Activities:**\n- IT walk-through of remote access tools\n- VPN and security setup verification\n- Communication tools training (Slack, Zoom)\n- Virtual meet-and-greets scheduled throughout week\n- Daily end-of-day check-in with manager\n\n**Manager Best Practices for Remote Onboarding:**\n- Schedule more frequent check-ins (daily first week)\n- Be available and responsive\n- Use video calls when possible\n- Create opportunities for informal connection\n- Pair with experienced remote team member as buddy\n\n### 8.5 Building Remote Connections\n\n**Onboarding Buddy Program:**\n- Assigned peer mentor for first 90 days\n- Weekly informal check-ins\n- Resource for questions and guidance\n- Helps new hire navigate culture and systems\n\n**Virtual Team Building:**\n- Invite to all team social events (virtual happy hours, games)\n- Schedule virtual lunch with team members\n- Add to relevant Slack channels\n- Include in team traditions and rituals\n\n## 9. ROLES AND RESPONSIBILITIES\n\n### 9.1 HR Responsibilities\n\n- Design and maintain onboarding program\n- Coordinate pre-boarding activities\n- Conduct HR orientation\n- Process all new hire paperwork\n- Track completion of required activities\n- Survey new hires and gather feedback\n- Continuously improve onboarding program\n\n### 9.2 Manager Responsibilities\n\n- Prepare for new hire's arrival\n- Create 30-60-90 day plan\n- Conduct regular check-ins\n- Provide clear expectations and feedback\n- Connect new hire with team and stakeholders\n- Conduct 30, 60, and 90-day reviews\n- Support new hire's success\n\n### 9.3 IT Responsibilities\n\n- Provision equipment and access\n- Configure systems and software\n- Provide IT orientation and support\n- Troubleshoot technical issues\n- Ensure security protocols followed\n\n### 9.4 Onboarding Buddy Responsibilities\n\n- Serve as peer resource and guide\n- Answer questions about culture and norms\n- Help new hire navigate the organization\n- Provide informal support and connection\n- Meet regularly (at least weekly) for first 90 days\n\n### 9.5 New Hire Responsibilities\n\n- Complete all required paperwork timely\n- Actively engage in onboarding activities\n- Ask questions and seek help when needed\n- Complete required training\n- Build relationships proactively\n- Provide honest feedback on onboarding experience\n\n## 10. ONBOARDING RESOURCES\n\n### 10.1 New Hire Portal\n\n**Access:** newhire.weaverenterprises.com\n\n**Contents:**\n- First day checklist\n- Required forms and documents\n- Training course catalog\n- Company information and history\n- Team directories\n- FAQ and common questions\n- IT setup guides\n- Benefits information\n\n### 10.2 Key Contacts\n\n**HR Onboarding Team:**\n- Email: onboarding@weaverenterprises.com\n- Phone: (555) 123-4565\n\n**IT Help Desk:**\n- Email: helpdesk@weaverenterprises.com\n- Phone: (555) 123-4590\n- Hours: Monday-Friday, 7 AM - 7 PM EST\n\n**Benefits Team:**\n- Email: benefits@weaverenterprises.com\n- Phone: (555) 123-4570\n\n**Facilities:**\n- Email: facilities@weaverenterprises.com\n- Phone: (555) 123-4585\n\n### 10.3 Onboarding Checklists\n\n**New Hire Checklist:**\n- [ ] Complete all pre-boarding paperwork\n- [ ] Verify equipment received and working\n- [ ] Complete I-9 verification (Day 1-3)\n- [ ] Set up direct deposit\n- [ ] Enroll in benefits (within 30 days)\n- [ ] Complete required training (Week 1)\n- [ ] Meet with manager to review 30-60-90 plan\n- [ ] Meet team members and key stakeholders\n- [ ] Schedule regular one-on-ones with manager\n- [ ] Complete 30-day, 60-day, and 90-day surveys\n\n**Manager Checklist:**\n- [ ] Submit new hire request to HR\n- [ ] Request equipment from IT\n- [ ] Prepare workspace/arrange remote setup\n- [ ] Identify onboarding buddy\n- [ ] Create 30-60-90 day plan\n- [ ] Send welcome message before start date\n- [ ] Schedule first week meetings\n- [ ] Conduct Day 1 orientation meeting\n- [ ] Schedule regular one-on-ones\n- [ ] Conduct 30, 60, 90-day reviews\n- [ ] Complete probation documentation\n\n## 11. ONBOARDING FEEDBACK AND IMPROVEMENT\n\n### 11.1 New Hire Surveys\n\n**Survey Schedule:**\n- Day 5: First week experience\n- Day 30: 30-day check-in\n- Day 60: 60-day check-in\n- Day 90: Onboarding completion\n\n**Survey Topics:**\n- Pre-boarding communication and preparation\n- First day/week experience\n- Manager support and guidance\n- Training effectiveness\n- Team integration\n- Resources and tools\n- Overall satisfaction\n- Suggestions for improvement\n\n### 11.2 Continuous Improvement\n\nHR reviews onboarding feedback quarterly to:\n- Identify trends and patterns\n- Address common pain points\n- Update processes and materials\n- Recognize successful practices\n- Benchmark against industry standards\n\n---\n\n*This policy is subject to change. Amazon reserves the right to modify onboarding processes as needed to meet business objectives and employee needs.*\n","org_chart.md":"# Organizational Chart - Amazon Recruiting\n\nThis document contains the organizational structure for Amazon, including Talent Acquisition, Engineering, Data Science, Design, Finance, and Operations departments.\n\n## Executive Leadership\n\n```\n                              \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n                              \u2502   Board of Directors \u2502\n                              \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                                         \u2502\n         \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n         \u2502           \u2502           \u2502       \u2502       \u2502           \u2502           \u2502\n    \u250c\u2500\u2500\u2500\u2500\u25bc\u2500\u2500\u2500\u2500\u2510 \u250c\u2500\u2500\u2500\u2500\u25bc\u2500\u2500\u2500\u2500\u2510 \u250c\u2500\u2500\u2500\u25bc\u2500\u2500\u2500\u2510 \u250c\u2500\u25bc\u2500\u2500\u2500\u2500\u2500\u2510 \u250c\u2500\u25bc\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510 \u250c\u2500\u25bc\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n    \u2502VP Talent\u2502 \u2502VP of    \u2502 \u2502VP of  \u2502 \u2502Design \u2502 \u2502Chief    \u2502 \u2502 alyst | Thomas Reed | amanda.wright@amazon.com |\n| EMP-025 | Jason Mitchell | Senior Accountant | Thomas Reed | jason.mitchell@amazon.com |\n\n### Operations Department\n\n| EMP ID | Name | Title | Reports To | Email |\n|--------|------|-------|------------|-------|\n| EMP-020 | Nancy Cooper | Operations Director | Board of Directors | nancy.cooper@amazon.com |\n| EMP-015 | Christopher Taylor | Operations Lead | Nancy Cooper | christopher.taylor@amazon.com |\n| EMP-023 | Ryan O'Connor | Operations Analyst | Christopher Taylor | ryan.oconnor@amazon.com |\n\n---\n\n## Interview Rooms\n\n- **Conference Room A** - Main interview room, capacity 6\n- **Conference Room B** - Secondary interview room, capacity 4\n- **Video Conference Room** - Equipped for remote interviews\n- **Panel Interview Room** - Large room for panel interviews, capacity 10\n\n## Interview Schedule Templates\n\n- **Phone Screen**: 30 minutes\n- **Technical Interview**: 60 minutes\n- **Behavioral Interview**: 45 minutes\n- **Panel Interview**: 90 minutes\n- **Final Round**: 120 minutes (includes multiple sessions)\n","recruiting_policy.md":"# Amazon Recruiting Policy\n\nThis document outlines the recruiting and hiring policies for Amazon.\n\n## Interview Process\n\n### Interview Stages\n\n1. **Application Review** - Initial screening of applications\n2. **Phone Screen** - 30-minute phone interview with recruiter\n3. **Technical Interview** - 60-minute technical assessment\n4. **Behavioral Interview** - 45-minute behavioral assessment\n5. **Panel Interview** - 90-minute interview with multiple interviewers\n6. **Final Round** - 120-minute final assessment (may include multiple sessions)\n\n### Interview Scheduling\n\n- Interviews should be scheduled within 2 business days of previous stage completion\n- Interview rooms must be reserved at least 24 hours in advance\n- Video interviews are available for remote candidates\n- Panel interviews require Conference Room A or Panel Interview Room\n\n### Interview Rooms\n\n- **Conference Room A** - Main interview room, capacity 6\n- **Conference Room B** - Secondary interview room, capacity 4\n- **Video Conference Room** - Equipped for remote interviews\n- **Panel Interview Room** - Large room for panel interviews, capacity 10\n\n## Candidate Pipeline Management\n\n### Pipeline Stages\n\n- Application Review\n- Phone Screen Scheduled\n- Phone Screen Completed\n- Technical Interview Scheduled\n- Technical Interview Completed\n- Panel Interview Scheduled\n- Panel Interview Completed\n- Offer Extended\n- Offer Accepted\n- Offer Declined\n- Rejected\n\n### Candidate Communication\n\n- All candidate communications should be sent via email\n- Response time should be within 24 hours for candidate inquiries\n- Interview confirmations should be sent at least 48 hours in advance\n- Rejection notifications should be sent promptly after decision\n\n## Job Requisition Process\n\n1. Hiring manager creates job requisition\n2. Requisition reviewed and approved by VP of Talent Acquisition\n3. Job posting published\n4. Candidates apply\n5. Recruiting team screens and schedules interviews\n6. Hiring decision made\n7. Offer extended\n8. Onboarding process begins\n\n## Email Accounts\n\n### HR Team Email Addresses\n\n- **VP of Talent Acquisition**: sarah.johnson@amazon.com\n- **Talent Acquisition Manager**: michael.chen@amazon.com\n- **Senior Recruiter**: emily.davis@amazon.com\n- **Recruiter**: james.brown@amazon.com\n- **Recruiter**: alexandra.rodriguez@amazon.com\n- **Recruiting Operations Manager**: jennifer.martinez@amazon.com\n- **Recruiting Coordinator**: robert.wilson@amazon.com\n- **Scheduling Specialist**: patricia.lee@amazon.com\n- **Onboarding Manager**: david.thompson@amazon.com\n- **Onboarding Specialist**: lisa.anderson@amazon.com\n- **HRIS Coordinator**: kevin.park@amazon.com\n\n### General Email Addresses\n\n- **Recruiting Department**: recruiting@amazon.com\n- **HR Department**: hr@amazon.com\n","recruitment_hiring_policy.md":"# AMAZON INC.\n## RECRUITMENT & HIRING POLICY\n\n**Document Number:** HR-POL-006  \n**Effective Date:** January 1, 2024  \n**Last Revised:** January 1, 2024  \n**Policy Owner:** Human Resources Department  \n**Approved By:** Chief Human Resources Officer\n\n---\n\n## 1. PURPOSE AND SCOPE\n\nThis policy establishes guidelines and procedures for recruiting, selecting, and hiring qualified employees at Amazon Inc. The purpose is to:\n\n- Attract and hire highly qualified candidates\n- Ensure fair, consistent, and legally compliant hiring practices\n- Promote diversity and equal employment opportunity\n- Create positive candidate experiences\n- Support business objectives through strategic talent acquisition\n\nThis policy applies to all hiring activities for regular full-time, part-time, temporary, and intern positions across all departments and locations.\n\n## 2. EQUAL EMPLOYMENT OPPORTUNITY\n\n### 2.1 Non-Discrimination Commitment\n\nAmazon is an Equal Opportunity Employer. All employment decisions are made without regard to:\n- Race, color, ethnicity, national origin\n- Sex, gender, gender identity, gender expression\n- Sexual orientation\n- Religion, creed\n- Age\n- Disability (physical or mental)\n- Genetic information\n- Pregnancy or related conditions\n- Military or veteran status\n- Marital status\n- Any other characteristic protected by federal, state, or local law\n\n### 2.2 Affirmative Action\n\nThe Company is committed to affirmative action and takes proactive steps to ensure equal opportunity in recruitment, hiring, and advancement. Specific affirmative action plans are maintained as required by federal contractors regulations.\n\n### 2.3 Reasonable Accommodation\n\nThe Company provides reasonable accommodations for qualified individuals with disabilities during the application and interview process. Candidates requiring accommodations should contact the HR Recruiting team.\n\n## 3. HIRING AUTHORITY AND APPROVAL\n\n### 3.1 Position Authorization\n\nBefore recruiting for any position:\n- Department head must obtain budget approval\n- Submit headcount request to HR with business justification\n- HR reviews and obtains necessary approvals (Finance, Executive Leadership)\n- Position approved for posting once all approvals obtained\n\n### 3.2 Job Requisition Process\n\n**Hiring Manager Responsibilities:**\n1. Complete job requisition form in applicant tracking system\n2. Provide or update job description\n3. Specify required qualifications and preferences\n4. Indicate salary range and position level\n5. Submit to HR for review\n\n**HR Review:**\n- Verify budget availability\n- Review job description for compliance and clarity\n- Confirm compensation is market-competitive\n- Approve requisition or return for revisions\n- Post approved positions internally and externally\n\n## 4. JOB DESCRIPTIONS\n\n### 4.1 Purpose of Job Descriptions\n\nJob descriptions serve as foundation for:\n- Recruiting and screening candidates\n- Setting performance expectations\n- Determining compensation levels\n- Conducting performance evaluations\n- Compliance with employment laws (ADA, FLSA)\n\n### 4.2 Required Components\n\nAll job descriptions must include:\n- Job title and department\n- FLSA classification (exempt or non-exempt)\n- Reporting relationship\n- Position summary\n- Essential job functions and duties\n- Required qualifications (education, experience, skills)\n- Preferred qualifications\n- Physical requirements and working conditions\n- Travel requirements (if applicable)\n\n### 4.3 Creating and Updating Job Descriptions\n\n- HR maintains template and assists with development\n- Hiring managers draft or update descriptions\n- HR reviews for compliance and consistency\n- Approved job descriptions stored in HR system\n- Review and update annually or when position changes significantly\n\n## 5. SOURCING AND RECRUITING\n\n### 5.1 Internal Posting\n\n**Internal Candidates First:**\n- All positions posted internally for minimum 5 business days before external posting\n- Posted on internal careers portal and distributed via employee email\n- Current employees encouraged to apply for advancement opportunities\n\n**Internal Applicant Process:**\n- Employees apply through internal portal\n- Notify current manager before applying (encouraged but not required)\n- If selected, coordinate transition timeline with both managers\n- HR facilitates internal transfers\n\n**Internal Transfer Guidelines:**\n- Employees must be in current role for 12 months before applying for new position\n- Exception: restructuring, elimination, or manager approval\n- Performance must be satisfactory (not on performance improvement plan)\n\n### 5.2 External Recruiting Sources\n\n**Company Career Website:**\n- Primary external recruiting source\n- Integrated with applicant tracking system\n- Mobile-optimized application process\n\n**Job Boards:**\n- General: Indeed, LinkedIn, Glassdoor\n- Industry-specific: As appropriate for role\n- Diversity-focused: Ability Jobs, Veterans Job Board, diversity professional associations\n\n**Employee Referrals:**\n- Employees encouraged to refer qualified candidates\n- Referral bonus program (see Section 5.3)\n- Referrals receive priority review\n\n**Recruiting Agencies:**\n- Used for specialized or hard-to-fill roles\n- Must be pre-approved vendor\n- Contingency or retained search depending on level\n- Typical fees: 20-25% of first-year compensation\n\n**Campus Recruiting:**\n- Target universities for entry-level and intern hiring\n- Career fairs, on-campus interviews, info sessions\n- Internship-to-full-time pipeline\n\n**Social Media:**\n- LinkedIn recruiting and company page\n- Twitter, Facebook for employer branding\n- Showcase company culture and opportunities\n\n**Professional Associations:**\n- Partner with industry organizations\n- Sponsor events and job boards\n- Attend conferences for networking\n\n### 5.3 Employee Referral Program\n\n**Referral Bonus Structure:**\n- Entry-level positions: $500\n- Mid-level positions: $1,000\n- Senior/specialized positions: $2,000\n- Executive positions: $3,000\n\n**Eligibility Requirements:**\n- Referring employee must be in good standing\n- Referred candidate hired as regular employee\n- Referred candidate completes 90-day probationary period\n- Bonus paid after successful completion of probation\n\n**Process:**\n- Submit referral through employee portal\n- Include candidate name, contact info, and position of interest\n- HR screens referred candidate\n- Referrer notified of hiring decision\n\n## 6. APPLICATION PROCESS\n\n### 6.1 Online Application System\n\nAll external candidates must apply through the company's applicant tracking system:\n- Submit resume/CV\n- Complete application form\n- Answer pre-screening questions\n- Provide voluntary EEO demographic information (kept confidential, not used in hiring decisions)\n- Submit cover letter (optional but encouraged)\n\n### 6.2 Application Materials\n\n**Required:**\n- Resume or CV\n- Completed application form\n\n**Optional:**\n- Cover letter\n- Portfolio or work samples (for applicable positions)\n- References (typically requested later in process)\n\n### 6.3 Application Deadline\n\n- Applications accepted until position filled\n- Posting may close early if sufficient qualified candidates\n- Candidates notified if position filled\n\n### 6.4 Application Confirmation\n\n- Automated confirmation email sent upon submission\n- Includes timeline expectations\n- Provides contact information for questions\n\n## 7. CANDIDATE SCREENING AND SELECTION\n\n### 7.1 Resume Review\n\n**HR Initial Screening:**\n- Review all applications for minimum qualifications\n- Disqualify clearly unqualified candidates\n- Forward qualified candidates to hiring manager\n- Timeline: Within 3-5 business days of application\n\n**Hiring Manager Review:**\n- Evaluate candidates against position requirements\n- Select candidates for phone screening\n- Provide feedback to HR on selected candidates\n\n### 7.2 Phone Screening\n\n**Purpose:**\n- Assess basic qualifications and fit\n- Clarify experience and career goals\n- Explain position and company\n- Gauge candidate interest and availability\n- Determine if in-person interview warranted\n\n**Conducted By:** HR Recruiter or Hiring Manager\n\n**Duration:** 20-30 minutes\n\n**Key Topics:**\n- Work history and relevant experience\n- Interest in position and company\n- Salary expectations\n- Availability and timeline\n- Work authorization status\n\n### 7.3 Interview Process\n\n**Interview Stages:**\n\n**First-Round Interview:**\n- Hiring manager and 1-2 team members\n- In-person, video, or phone (typically video for remote roles)\n- Duration: 45-60 minutes\n- Focus: Skills, experience, cultural fit\n\n**Second-Round Interview:**\n- Additional team members and stakeholders\n- May include senior leadership\n- Duration: 2-4 hours (multiple interviews)\n- May include skills assessment, presentation, or case study\n\n**Final Interview:**\n- Department head or executive leadership\n- Reserved for finalist candidates\n- Focus: Leadership potential, strategic thinking, culture alignment\n- Duration: 30-60 minutes\n\n**Panel Interviews:**\n- Used when appropriate\n- 2-4 interviewers\n- Coordinated questions to avoid redundancy\n- Consolidated feedback\n\n### 7.4 Interview Guidelines\n\n**Professional Conduct:**\n- Treat all candidates with respect and professionalism\n- Start and end on time\n- Provide clear information about next steps\n\n**Structured Interviews:**\n- Use standardized questions for all candidates\n- Focus on job-related competencies\n- Behavioral questions preferred (\"Tell me about a time when...\")\n- Avoid hypothetical questions when possible\n\n**Legal Compliance:**\n- Ask only job-related questions\n- Avoid questions about protected characteristics\n- Do not ask about arrest records (conviction records permissible)\n- Do not require disclosure of disabilities (may discuss accommodations needed to perform essential functions)\n\n**Interview Panel Diversity:**\n- Strive for diverse interview panels\n- Multiple perspectives improve hiring decisions\n- Reduces potential for bias\n\n## 8. CANDIDATE ASSESSMENTS\n\n### 8.1 Skills Testing\n\nPre-employment testing may be used when job-related:\n- Technical skills assessments (coding, software proficiency)\n- Writing samples\n- Presentations or case studies\n- Personality and work style assessments (advisory only, not determinative)\n\n**Testing Requirements:**\n- Must be validated and job-related\n- Applied consistently to all candidates for position\n- Accommodations provided for disabilities\n- Results kept confidential\n\n### 8.2 Work Samples and Assignments\n\n- May request work samples or complete assignments\n- Must be reasonable in scope (typically 1-3 hours maximum)\n- Provide clear instructions and expectations\n- Compensate if assignment is substantial or results used by Company\n\n### 8.3 Cognitive and Personality Assessments\n\n- Used as one data point in hiring decision\n- Cannot be sole basis for decision\n- Must be validated for position\n- Results shared with candidate upon request\n\n## 9. BACKGROUND CHECKS AND SCREENING\n\n### 9.1 Types of Background Checks\n\n**Standard Background Check (All Positions):**\n- Criminal history (7 years)\n- Employment verification\n- Education verification\n- Professional license verification (if applicable)\n\n**Extended Background Check (Leadership and Sensitive Positions):**\n- Credit history (for financial roles only)\n- Driving record (for driving positions)\n- Global sanctions and watch lists\n\n### 9.2 Background Check Process\n\n**Timing:**\n- Conducted after conditional offer extended\n- Must be completed before start date\n- Offer contingent on satisfactory results\n\n**Procedure:**\n1. Candidate receives conditional offer\n2. HR sends background check authorization and disclosure\n3. Candidate completes authorization form\n4. Third-party vendor conducts check\n5. Results reviewed by HR\n6. Adverse action process followed if necessary (see 9.3)\n\n**Candidate Rights:**\n- Receive pre-adverse action notice if concerns arise\n- Opportunity to dispute or explain findings\n- Receive copy of background report\n- Fair Credit Reporting Act (FCRA) rights provided\n\n### 9.3 Adverse Action Process\n\nIf background check reveals disqualifying information:\n\n1. **Pre-Adverse Action:**\n   - Provide candidate with copy of report\n   - Give notice of intent to take adverse action\n   - Allow 5 business days to respond\n   - Review any explanation or disputes\n\n2. **Final Adverse Action:**\n   - If decision to rescind offer, send adverse action notice\n   - Include copy of report and FCRA rights\n   - Document decision rationale\n\n### 9.4 Criminal History Considerations\n\n**Ban the Box Compliance:**\n- Do not ask about criminal history on application\n- Discuss only after conditional offer\n- Consider nature, recency, and relevance of conviction\n- Provide opportunity for individualized assessment\n\n**Disqualifying Convictions:**\n- Convictions directly related to job responsibilities\n- Recent violent crimes (within 7 years)\n- Determined on case-by-case basis\n- Legal consultation for complex situations\n\n### 9.5 Drug Testing\n\nDrug testing conducted post-offer for:\n- Safety-sensitive positions (as defined by DOT or company policy)\n- Positions requiring operation of machinery or vehicles\n- Positions with security clearance requirements\n\n**Testing Protocol:**\n- Urine drug screen (5- or 10-panel)\n- Conducted at certified lab\n- Medical Review Officer (MRO) reviews results\n- Positive results may disqualify candidate\n\n## 10. REFERENCE CHECKS\n\n### 10.1 When to Conduct Reference Checks\n\n- After final interview for top candidates\n- Before extending offer\n- Minimum 2-3 professional references\n\n### 10.2 Reference Check Process\n\n**Conducted By:** HR or Hiring Manager\n\n**Information to Gather:**\n- Relationship to candidate and dates\n- Job responsibilities and performance\n- Strengths and areas for development\n- Attendance and reliability\n- Eligibility for rehire\n- Any concerns or additional comments\n\n**Documentation:**\n- Complete reference check form for each reference\n- Document all responses\n- Maintain in recruitment file\n\n### 10.3 Providing References for Former Employees\n\nWhen contacted for reference on former Amazon employees:\n- Confirm dates of employment and title only\n- Direct all reference requests to HR\n- Do not provide performance information without signed authorization\n- HR may provide additional information with proper authorization\n\n## 11. OFFER PROCESS\n\n### 11.1 Salary Determination\n\n**Factors Considered:**\n- Market data and salary ranges for position\n- Candidate qualifications and experience\n- Internal equity (compared to current employees)\n- Budget constraints\n- Candidate's salary expectations\n\n**Approval Requirements:**\n- Offers within approved range: Hiring manager approval\n- Offers above range: HR and Finance approval required\n- Executive positions: CEO approval required\n\n### 11.2 Offer Letter Components\n\nWritten offer letters include:\n- Job title and department\n- Start date\n- Compensation (salary or hourly rate)\n- Bonus or commission structure (if applicable)\n- Benefits summary\n- Work location and schedule\n- Reporting relationship\n- Employment-at-will statement\n- Contingencies (background check, drug test, I-9 verification)\n- Offer expiration date (typically 3-5 business days)\n\n### 11.3 Extending the Offer\n\n**Process:**\n1. HR prepares offer letter\n2. Obtain necessary approvals\n3. Hiring manager makes verbal offer by phone\n4. HR sends written offer via email\n5. Candidate reviews and accepts or declines\n6. Candidate returns signed offer letter\n\n**Verbal Offer:**\n- Discuss all terms clearly\n- Answer questions\n- Confirm candidate acceptance before sending written offer\n- Reiterate offer is contingent on background check\n\n**Negotiation:**\n- Some negotiation expected for senior roles\n- Stay within approved salary range when possible\n- Consult HR before revising offer\n- Document final agreed-upon terms\n\n### 11.4 Offer Acceptance\n\n- Candidate signs and returns offer letter\n- HR processes new hire paperwork\n- Hiring manager notified of acceptance\n- Begin onboarding process\n\n### 11.5 Offer Decline\n\nIf candidate declines:\n- Request feedback on reason\n- Document in ATS\n- Return to candidate pool or restart search\n- Notify interview team\n\n## 12. PRE-EMPLOYMENT REQUIREMENTS\n\n### 12.1 Form I-9 Employment Eligibility Verification\n\n**Timing:** Within 3 business days of start date\n\n**Process:**\n- Employee completes Section 1 on or before first day\n- Employee presents acceptable documents (List A, or List B + List C)\n- HR completes Section 2 within 3 business days\n- Documents examined in person (or via authorized remote verification)\n\n**Acceptable Documents:**\n- List A: Passport, Permanent Resident Card, Employment Authorization Document\n- List B: Driver's license, State ID, School ID with photo\n- List C: Social Security card, Birth certificate\n\n**E-Verify:**\n- Company participates in E-Verify program\n- Cases created within 3 business days of hire\n- Resolves tentative non-confirmations with employee assistance\n\n### 12.2 Tax Forms\n\n**Required Forms:**\n- Form W-4 (Federal withholding)\n- State withholding forms (as applicable)\n- Direct deposit authorization\n\n**Timing:** Completed on or before first day of employment\n\n### 12.3 Pre-Employment Paperwork\n\n**New Hire Packet Includes:**\n- Emergency contact information\n- Benefits enrollment forms\n- Employee handbook acknowledgment\n- Code of conduct acknowledgment\n- Confidentiality/IP agreements (for applicable positions)\n- Arbitration agreement (where permitted by law)\n- Company policies acknowledgments\n\n## 13. CANDIDATE COMMUNICATION\n\n### 13.1 Timely Communication\n\n- Acknowledge applications within 24 hours (automated)\n- Update candidates within 2 weeks of each interview stage\n- Provide clear timeline expectations\n- Be responsive to candidate questions\n\n### 13.2 Rejection Communication\n\n**When to Notify:**\n- After resume screening\n- After phone screen\n- After in-person interview\n\n**How to Notify:**\n- Email for early-stage rejections\n- Phone call for final-round candidates (encouraged)\n- Use professional, respectful language\n- Offer general feedback when appropriate (avoid detailed critique)\n\n**Feedback Guidelines:**\n- Keep feedback high-level and constructive\n- Focus on qualifications and fit, not personal characteristics\n- Avoid detailed explanations that could be legally problematic\n- Encourage candidate to apply for future opportunities\n\n### 13.3 Candidate Experience\n\n**Best Practices:**\n- Respond promptly to inquiries\n- Provide clear job descriptions and expectations\n- Maintain professional, respectful communication\n- Coordinate interview schedules efficiently\n- Reimburse travel expenses for final-round candidates (when applicable)\n- Send thank-you notes after interviews\n- Provide feedback when requested (within appropriate limits)\n\n## 14. RECORDKEEPING AND COMPLIANCE\n\n### 14.1 Applicant Tracking\n\n- All recruitment activity documented in the applicant tracking system (ATS)\n- Includes: applications, resumes, interview notes, assessments, correspondence\n- Ensures compliance with recordkeeping requirements\n- Supports data-driven recruiting decisions\n\n### 14.2 Required Records\n\n**Maintain for All Applicants:**\n- Application materials\n- Resumes/CVs\n- Interview evaluations\n- Assessment results\n- Reference check notes\n- Hiring decision rationale\n\n**Retention Period:**\n- Hired employees: Duration of employment + 7 years\n- Not hired: 3 years from application date (or 2 years for federal contractors)\n- Adverse impact analyses: 2 years\n\n### 14.3 EEO and Affirmative Action Reporting\n\n**EEO-1 Report:**\n- Annual report to EEOC\n- Employee demographics by job category\n- Due: September 30 each year\n\n**AAP Analysis:**\n- Annual utilization analysis\n- Applicant flow data\n- Adverse impact analysis\n- Goal setting and action plans\n\n**OFCCP Compliance:**\n- Internet applicant records\n- Hiring statistics by protected class\n- Self-identification data (voluntary)\n\n### 14.4 Audits and Investigations\n\n**Internal Audits:**\n- HR conducts periodic recruiting compliance audits\n- Review job descriptions, postings, interview questions\n- Analyze hiring data for potential adverse impact\n- Corrective action taken as needed\n\n**External Audits:**\n- Cooperate with OFCCP, EEOC, or other agency reviews\n- Provide requested documentation\n- Legal counsel involved in responses\n\n## 15. SPECIAL HIRING SITUATIONS\n\n### 15.1 Rehiring Former Employees\n\n**Eligibility:**\n- Former employees eligible for rehire if left in good standing\n- Not eligible if terminated for cause\n- HR reviews personnel file before rehiring\n\n**Process:**\n- Follow standard application and interview process\n- May expedite screening if recently separated (within 6 months)\n- New I-9 required if more than 3 years since termination\n- No break in service credit for benefits (treated as new hire)\n\n### 15.2 Nepotism and Personal Relationships\n\n**Policy:**\n- Company permits hiring of relatives but with restrictions\n- Relatives cannot be in direct reporting relationship\n- Cannot work in same department if one supervises the other\n\n**Disclosure Required:**\n- Candidates must disclose existing relationships with employees\n- HR evaluates potential conflicts\n\n**Definitions:**\n- Relatives: spouse, domestic partner, parent, child, sibling, in-laws, step-relatives\n\n### 15.3 Contingent Workers\n\n**Temporary Employees:**\n- Hired through approved staffing agencies\n- Contract duration specified upfront\n- May be converted to regular employee after 6 months\n\n**Independent Contractors:**\n- Must meet IRS independent contractor criteria\n- Separate contracting process (not covered by this policy)\n- Legal review required\n\n### 15.4 Interns\n\n**Internship Program:**\n- Paid internships (comply with FLSA)\n- College students or recent graduates\n- 10-12 week summer program or part-time during school year\n- Conversion to full-time considered based on performance\n\n**Process:**\n- Campus recruiting and online applications\n- Structured interview process\n- Educational experience with meaningful projects\n- Mentor assigned\n\n## 16. HIRING MANAGER RESPONSIBILITIES\n\nHiring managers are responsible for:\n- Initiating requisitions and obtaining approvals\n- Reviewing resumes and selecting candidates\n- Conducting interviews in professional, compliant manner\n- Providing timely feedback to HR\n- Participating in hiring decisions\n- Coordinating with HR on offers and negotiations\n- Preparing for new hire onboarding\n- Conducting new hire orientation for team\n\n## 17. QUESTIONS AND RESOURCES\n\nFor questions about recruiting and hiring, contact:\n\n**Talent Acquisition Team:**\n- Phone: (555) 123-4590\n- Email: recruiting@weaverenterprises.com\n\n**HR Business Partners:**\n- Support hiring managers with recruitment strategy\n- Provide guidance on interviews and selection\n\n**Recruiting Resources:**\n- Applicant tracking system\n- Interview question bank\n- Job description templates\n- Recruiting metrics dashboard\n\n---\n\n*This policy is subject to change. Amazon reserves the right to modify procedures as needed to comply with changing laws and business needs.*","skills.md":"It is currently 2026-02-01T17:00:00Z (UTC). \n\n# HR Recruiting \u2014 Implicit Task Conventions\n\nThese are standard conventions that apply to every recruiting task.\n\n## HRIS Updates\n- Every action that changes candidate status, interview details, or offer terms must be logged in HRIS\n- Update the relevant HRIS fields needed for an accurate record\n\n## Calendar Events\n- Include timezone in all calendar events\n- Include all relevant participants on the invite\n\n## Stakeholder Communication\n- When a change affects someone, notify them (e.g., swapping an interviewer \u2192 notify the old and new interviewer)\n- When you complete an action someone requested, confirm it with them\n- Internal jargon, acronyms, and process terminology should not appear in candidate emails\n- Always check your email inbox at the start of a task \u2014 there may be context (candidate details, prior approvals, policy clarifications, or instructions from stakeholders) that affects how the task should be completed.\n\n## Privacy\n- Do not include compensation details in calendar invites or group communications\n- Medical, accommodation details, and other personal info should only be shared with need-to-know parties\n\n## Communication Channels & Authority\n\n### Group Chat\n- When a message needs to be sent to multiple people simultaneously, use a group chat channel rather than individual direct messages. Individual DMs are appropriate only when the message is person-specific or confidential.\n\n### Authority Deferral\n- When opinions or decisions conflict across people in a recruiting decision (e.g., hiring manager vs. recruiter vs. HR), defer to the higher authority for the given task according to the org chart. Do not average opinions or side with whoever responded first.\n\n### Information Gathering via Chat\n- When a task requires getting further information from someone before proceeding, prefer chat for fast clarification unless the task or policy explicitly requires email/documented approval in email.\n"},"npc_profiles":[{"profile_id":"sarah_johnson","first_name":"Sarah","last_name":"Johnson","email":"sarah.johnson@amazon.com","occupation":"VP of Talent Acquisition","gender":"Female","gender_pronoun":"she/her","public_info":"VP of Talent Acquisition with 15 years of recruiting experience. Reports to the Board of Director ct from accounting noise \u2014 want to catch when the market overreacts to an EPS miss that's mostly translation.\n\nUse Q1 FY2022 through Q4 FY2024. Map currency exposure on revenue and COGS, then separate natural hedges (local production, cost matching) from financial hedges (derivatives) \u2014 I want to see how structurally exposed they actually are vs. what's just layered on. Track hedging gains/losses (P&L vs. OCI) and pull translation impacts on the balance sheet. Build something that lets me see at a glance whether an FX-driven miss is economic or just accounting. Backtest to show if these setups actually reverse.\n\nOne workbook, cite all sources. Provide formatting which matches the template doc file in the reference folder and name the final file in the workspace folder as a google sheet with name 'output_file.xlsx'.","rubric_definition":"# AAPL FX Impact Model \u2014 LLM Judge Rubric\n\nYou are evaluating an Excel workbook that was built to separate real FX impact from accounting noise for Apple Inc. (AAPL), covering Q1 FY2022 through Q4 FY2024. A programmatic verifier has already checked data accuracy, sheet presence, and formatting basics. Your job is to evaluate what code cannot: analytical quality, clarity, usability, and professional presentation.\n\nYou will be given the full cell-level content of the submitted workbook. Score each dimension from 1-5, provide a brief justification, then compute a weighted total out of 100.\n\n---\n\n## Dimension 1: Analytical Narrative & Coherence (Weight: 25%)\n\nDoes the workbook tell a clear, logical story from exposure \u2192 hedging \u2192 impact \u2192 classification \u2192 action?\n\n| Score | Description |\n|---|---|\n| 5 | Sheets flow in a logical sequence. Each sheet builds on the prior one. Executive dashboard synthesizes everything downstream. A reader could go top-to-bottom and fully understand Apple's FX situation without external context. Transitions between sections feel intentional. |\n| 4 | Logical flow with minor gaps. Most sheets connect well. One or two sections feel disconnected or redundant. Dashboard mostly synthesizes downstream content. |\n| 3 | Sections are present but feel like independent analyses rather than a unified model. Dashboard is a summary but doesn't clearly pull from downstream sheets. Reader has to mentally connect the dots. |\n| 2 | Sheets appear in arbitrary order. Little sense of progression. Dashboard is generic or doesn't reflect the actual analysis in other sheets. |\n| 1 | No coherent narrative. Sheets are disjointed data dumps with no analytical thread connecting them. |\n\n**Evaluate:**\n- Does the sheet ordering make analytical sense?\n- Does the executive dashboard actually reflect and synthesize the detailed sheets?\n- Can you trace how geographic exposure \u2192 natural hedges \u2192 derivative hedges \u2192 P&L/OCI \u2192 EPS bridge \u2192 classification \u2192 backtest?\n- Are \"key insight\" or \"key finding\" callouts accurate summaries of the data shown?\n\n---\n\n## Dimension 2: Decision-Usefulness & \"At a Glance\" Design (Weight: 20%)\n\nCould a portfolio manager quickly determine whether an FX-driven EPS miss is economic or accounting?\n\n| Score | Description |\n|---|---|\n| 5 | The classification framework is immediately actionable. Signal matrix maps scenario \u2192 action \u2192 expected outcome with historical hit rates. EPS bridge makes FX vs operational decomposition obvious. A PM could make a trade decision within 2 minutes of opening the file. |\n| 4 | Classification is clear and actionable. Minor friction \u2014 PM might need to cross-reference one or two sheets to get the full picture. Signals are present but slightly buried. |\n| 3 | The analytical building blocks are there but not packaged for decision-making. Reader has to do their own synthesis. Classification exists but isn't tied to clear actions or historical success rates. |\n| 2 | Data is present but not organized for decisions. No clear \"what do I do when X happens\" framework. Reader would need to rebuild the analysis mentally. |\n| 1 | Pure data dump. No classification, no signals, no decision framework. Analyst would need to start from scratch. |\n\n**Evaluate:**\n- Is there a clear \"if this, then that\" decision tree or signal matrix?\n- Can you quickly tell the difference between a translation miss and an operational miss?\n- Are historical success rates or confidence levels attached to signals?\n- Is the EPS bridge decomposition clear enough to isolate FX from operations at a glance?\n\n---\n\n## Dimension 3: Intellectual Rigor & Depth of Analysis (Weight: 20%)\n\nDoes the model demonstrate genuine understanding of FX accounting, not just surface-level data presentation?\n\n| Score | Description |\n|---|---|\n| 5 | Correctly distinguishes ASC 830 translation from transaction from remeasurement. Understands that CTA is purely accounting and doesn't hit P&L. Separates cash flow hedge (OCI \u2192 reclassify to P&L) from fair value hedge (immediate P&L) correctly. Explains why natural hedges from Asian manufacturing offset revenue exposure. Backtest is honest about limited sample size. Hedge effectiveness is calculated, not just stated. |\n| 4 | Core FX accounting concepts are correct. One or two nuances are simplified or glossed over (e.g., doesn't distinguish net investment hedges from cash flow hedges, or treats all OCI as the same). Backtest present with some rigor. |\n| 3 | Basic distinction between translation and transaction is present. Some accounting concepts are imprecise or confused (e.g., CTA described as hitting earnings, or hedge gains/losses misclassified). Analysis is directionally correct but wouldn't survive scrutiny from an FX specialist. |\n| 2 | Surface-level \u2014 mentions \"FX impact\" generically without properly separating the channels. Hedging analysis is vague. Accounting treatments are incorrect or missing. |\n| 1 | Fundamental misunderstanding of FX accounting. Translation and transaction conflated. Hedging concepts are wrong. CTA described incorrectly. |\n\n**Evaluate:**\n- Is CTA correctly described as OCI-only with no EPS impact?\n- Are cash flow hedges (OCI until settled) correctly separated from fair value hedges (immediate P&L)?\n- Does the natural hedge analysis show actual cost-revenue matching by currency/region, not just assert it?\n- Is the backtest methodology transparent and honest about limitations?\n- Does the EPS bridge reconcile (components sum to reported EPS)?\n- Is the Q4 FY24 State Aid tax charge correctly handled as a non-FX event?\n\n---\n\n## Dimension 4: Visual Hierarchy & Readability (Weight: 15%)\n\nIs the workbook visually organized so that the most important information stands out?\n\n| Score | Description |\n|---|---|\n| 5 | Clear visual hierarchy: titles are prominent, section dividers separate content cleanly, tables have distinct headers, key insights/callouts stand out from data. White space is used effectively. Tables aren't crammed. Column widths are appropriate. The eye naturally flows to the most important information first. |\n| 4 | Good visual organization. Headers and sections are clear. Minor issues \u2014 some tables feel dense, or a section divider is missing. Overall very readable. |\n| 3 | Adequate but plain. Headers exist but don't stand out. Tables run together. Dividers are inconsistent. Readable with effort but doesn't guide the eye. |\n| 2 | Cluttered or monotonous. Everything looks the same \u2014 headers, data, notes all blend together. Hard to scan quickly. |\n| 1 | Wall of text/numbers. No visual structure. Unreadable without significant effort. |\n\n**Evaluate:**\n- Are section headers visually distinct from data rows?\n- Are dividers or separators used consistently between major sections?\n- Do key insight/finding boxes stand out from surrounding data?\n- Are tables well-spaced with readable column widths?\n- Is there a consistent layout pattern across sheets (title \u2192 subtitle \u2192 divider \u2192 content)?\n- Are numbers formatted consistently (commas, percentages, decimals)?\n\n---\n\n## Dimension 5: Labeling, Units & Self-Documentation (Weight: 10%)\n\nCould someone unfamiliar with the model understand every number without asking?\n\n| Score | Description |\n|---|---|\n| 5 | Every table header specifies units ($M, $B, %). Every column is labeled. Abbreviations are defined on first use. Assumptions are called out. Source citations appear on every data sheet. Notes explain non-obvious items (e.g., Q4 FY24 GAAP vs non-GAAP, what \"constant FX\" means). Methodology is documented. |\n| 4 | Units and labels are mostly clear. One or two tables are missing unit labels or a source line. Key assumptions documented. |\n| 3 | Some unit labels present, some missing. Reader has to infer whether a number is $M or $B in places. Sources present but incomplete. Limited methodology documentation. |\n| 2 | Sporadic labeling. Many tables lack units. No source citations on data sheets. Reader frequently has to guess. |\n| 1 | No units, no labels, no sources. Numbers without context. |\n\n**Evaluate:**\n- Do table headers say \"($M)\" or \"($B)\" where applicable?\n- Is every column in every table labeled?\n- Are source citations present at the bottom of data sheets?\n- Is there a methodology section explaining how FX impacts were calculated?\n- Is Q4 FY24 annotated to explain the GAAP vs non-GAAP distinction?\n- Are key assumptions (e.g., COGS currency mix is estimated) disclosed?\n\n---\n\n## Dimension 6: Completeness of the Hedge Separation Framework (Weight: 10%)\n\nThe core ask is separating natural hedges from financial hedges. How well is this done?\n\n| Score | Description |\n|---|---|\n| 5 | Natural hedges are quantified by region with cost-revenue matching ratios. Financial hedges broken down by type (cash flow, fair value, net investment, economic) with notional amounts and fair values. A summary table shows gross exposure \u2192 natural hedge offset \u2192 derivative hedge offset \u2192 net unhedged for both operating flows and balance sheet. The reader can see exactly how structurally exposed Apple is vs what's layered on. |\n| 4 | Both hedge types are present and separated. Quantification is mostly complete. Summary exists but might be missing one dimension (e.g., balance sheet hedging or one hedge type). |\n| 3 | Natural and financial hedges are mentioned and somewhat separated, but not fully quantified. Missing the \"waterfall\" from gross \u2192 natural \u2192 derivative \u2192 net. One type is significantly more developed than the other. |\n| 2 | Hedge separation is mentioned but superficial. No quantification of natural hedges. Derivative program described but not connected to the exposure it covers. |\n| 1 | No meaningful separation. Hedging is treated as a single concept without distinguishing structural from financial. |\n\n**Evaluate:**\n- Is there a COGS currency breakdown showing where costs are incurred?\n- Are natural hedge ratios calculated (local costs \u00f7 local revenue)?\n- Is there a clear \"waterfall\": gross exposure \u2192 less natural hedge \u2192 less derivative hedge \u2192 net exposure?\n- Are derivative types (cash flow, fair value, net investment) broken out with notional amounts?\n- Does the model show that Apple is ~80% hedged on operations but ~30% on the balance sheet?\n\n---\n\n## Scoring\n\n| Dimension | Weight | Score (1-5) | Weighted |\n|---|---|---|---|\n| 1. Analytical Narrative & Coherence | 25% | __ | __ |\n| 2. Decision-Usefulness & \"At a Glance\" | 20% | __ | __ |\n| 3. Intellectual Rigor & Depth | 20% | __ | __ |\n| 4. Visual Hierarchy & Readability | 15% | __ | __ |\n| 5. Labeling, Units & Self-Documentation | 10% | __ | __ |\n| 6. Hedge Separation Framework | 10% | __ | __ |\n| **TOTAL** | **100%** | | **__/100** |\n\nWeighted total = \u03a3 (score \u00d7 weight \u00d7 20)\n\n**Grade thresholds:**\n- **90-100:** Exceptional \u2014 institutional quali  was 133% attributable to FX \u2014 a classic overreaction opportunity.\n\n**Source line:** \"Source: Apple earnings releases, SEC filings, consensus estimates from FactSet/Bloomberg\"\n\n---\n\n### **Sheet 8: FX Miss Classification**\n\n**Purpose:** Decision tree for classifying whether an EPS miss is economic (real) or accounting (transitory).\n\n**Required sections:**\n\n1. **Classification Decision Tree** (text/explanation)\n\n   * Step 1: Calculate FX contribution to EPS miss  \n     * FX Impact \\= (Revenue FX \\+ COGS FX \\- Hedge Gains) / Diluted Shares  \n     * If FX Impact \\> 100% of miss \u2192 PURE FX MISS  \n     * If FX Impact 50-100% of miss \u2192 MIXED MISS  \n     * If FX Impact \\< 50% of miss \u2192 OPERATIONAL MISS  \n   * Step 2: Check local currency volume trends  \n     * If local currency revenue grew \u2192 FX is masking strength  \n     * If local currency revenue flat \u2192 FX is the issue  \n     * If local currency revenue declined \u2192 Real demand problem  \n   * Step 3: Assess hedge position  \n     * Large OCI gains waiting \u2192 Future P\\&L tailwind  \n     * Large OCI losses \u2192 Future P\\&L headwind  \n2. **Historical Miss Classification \u2014 Q1 FY2022 to Q4 FY2024** (12 rows) Columns: Quarter, Beat/Miss, EPS Surprise, FX Contribution, FX % of Surprise, Classification, Stock Reaction, Correct Signal?\n\n    Key rows:\n\n| Quarter | Beat/Miss | EPS Surprise | FX Contribution | FX % of Surprise | Classification | Stock Reaction | Correct Signal? |\n| ----- | ----- | ----- | ----- | ----- | ----- | ----- | ----- |\n| Q3 FY22 | BEAT | $0.04 | $0.07 drag | N/A | FX-MASKED BEAT | \\+3.2% | YES |\n| Q4 FY22 | BEAT | $0.02 | $0.12 drag | N/A | FX-MASKED BEAT | \\+0.8% | YES |\n| **Q1 FY23** | **MISS** | **($0.06)** | **$0.08 drag** | **133%** | **PURE FX MISS** | **\\-3.7%** | **OVERREACTION** |\n| Q4 FY24 | BEAT (non-GAAP) | $0.04 | $0.05 drag | N/A | NON-GAAP BEAT (State Aid one-time) | \\-1.8% | TAX EVENT \\- NOT FX |\n\n3.   \n   **Actionable Signals Summary**\n\n| Classification | Criteria | Action | Timing | Expected Outcome |\n| ----- | ----- | ----- | ----- | ----- |\n| PURE FX MISS | FX \\> 100% of miss, local currency growth positive | BUY on weakness | Within 5 trading days | Reversal in 2-3 quarters |\n| MIXED MISS | FX 50-100% of miss, local currency flat | HOLD, monitor guidance | Wait for clarity | Uncertain, depends on FX |\n| OPERATIONAL MISS | FX \\< 50% of miss, local currency declining | REDUCE or AVOID | Immediate | Further downside likely |\n| FX-MASKED BEAT | Beat despite significant FX drag | HOLD or ADD | On any weakness | Strong underlying momentum |\n| HEDGE-BOOSTED BEAT | Beat driven by hedge gains, weak operations | SELL into strength | Within 10 days | Gains are one-time |\n\n**Source line:** \"Source: Apple earnings releases, price data, analyst estimates\"\n\n---\n\n### **Sheet 9: Backtest Results**\n\n**Purpose:** Test whether FX-driven misses actually reverse and create alpha opportunities.\n\n**Required sections:**\n\n1. **Strategy Definition**\n\n   1. Entry Signal: EPS miss where FX accounts for \\>75% of the shortfall  \n   2. Entry Timing: Close of earnings day or next trading day  \n   3. Exit: Hold for 2 quarters (approximately 6 months)  \n   4. Benchmark: SPY total return over same period  \n2. **FX Miss Trade Instances \u2014 Detailed Results**\n\n| Trade | Entry Date | Entry Price | FX % of Miss | Exit Date | Exit Price | AAPL Return | SPY Return | Alpha | Outcome |\n| ----- | ----- | ----- | ----- | ----- | ----- | ----- | ----- | ----- | ----- |\n| Q1 FY23 Miss | 2023-02-03 | $150.82 | 133% | 2023-08-04 | $181.99 | \\+20.7% | \\+12.8% | \\+7.9% | WIN |\n\n3.   \n   Note: Q1 FY23 was the only clear FX-driven miss (\\>75% FX contribution) in the study period. Q4 FY24 miss was operational (State Aid tax charge), not FX-driven.\n\n4. **FX-Masked Beat Analysis** (supplementary)\n\n| Quarter | EPS Beat | FX Drag | Adj. Beat | Stock Reaction | Next Qtr Return | Interpretation |\n| ----- | ----- | ----- | ----- | ----- | ----- | ----- |\n| Q3 FY22 | $0.04 | $0.07 | $0.11 | \\+3.2% | \\-8.5% | FX masked weakness |\n| Q4 FY22 | $0.02 | $0.12 | $0.14 | \\+0.8% | \\+18.5% | Strong underlying \\+ FX easing |\n| Q2 FY24 | $0.03 | $0.06 | $0.09 | \\+1.2% | \\+12.3% | Modest strength |\n\n5.   \n   **Strategy Performance Summary**\n\n| Metric | Value | Interpretation |\n| ----- | ----- | ----- |\n| Total FX Miss Trades | 1 | Limited sample in study period |\n| Win Rate | 100% | 1 of 1 trades profitable |\n| Average Return | \\+20.7% | Strong absolute return |\n| Average Alpha vs SPY | \\+7.9% | Significant outperformance |\n| Average Holding Period | 6 months | 2 quarters as designed |\n\n6.   \n   **Key Findings & Investment Implications**\n\n   1. Pure FX misses are RARE \u2014 only 1 instance in 12 quarters (8%)  \n   2. When they occur, the market OVERREACTS \u2014 creating buying opportunities  \n   3. FX impacts typically REVERSE within 2-3 quarters as currency mean-reverts  \n   4. Apple's hedging program effectively DAMPENS but doesn't eliminate FX volatility  \n   5. Natural hedges from Asian manufacturing OFFSET \\~40% of revenue exposure  \n7. RECOMMENDATION: Monitor for pure FX misses (\\>75% FX contribution) as potential entry points. These are rare but historically have provided significant alpha when identified correctly.\n\n**Source line:** \"Source: Apple earnings releases, Yahoo Finance price data, SPY benchmark returns\"\n\n---\n\n### **Sheet 10: Sources & Methodology**\n\n**Purpose:** Full documentation of data sources, assumptions, and methodology.\n\n**Required sections:**\n\n1. **Primary Data Sources**\n\n| Source | Document Type | Data Used | Filing Dates |\n| ----- | ----- | ----- | ----- |\n| SEC EDGAR | Form 10-K Annual Reports | Financial statements, segment data, risk disclosures | FY2022-FY2024 |\n| SEC EDGAR | Form 10-Q Quarterly Reports | Quarterly financials, derivative disclosures | Q1 FY22 \\- Q4 FY24 |\n| SEC EDGAR | Item 7 MD\\&A | Management discussion of FX impacts | FY2022-FY2024 |\n| SEC EDGAR | Item 7A Market Risk | VAR disclosures, FX sensitivity analysis | FY2022-FY2024 |\n| SEC EDGAR | Note on Derivatives | Hedge notional amounts, fair values, OCI | FY2022-FY2024 |\n\n2.   \n   **Key Assumptions & Estimates**\n\n| Item | Assumption/Estimate | Basis |\n| ----- | ----- | ----- |\n| Currency Mix by Region | Based on disclosed segment revenue and typical currency mix | 10-K geographic disclosures |\n| COGS Currency Breakdown | Estimated from supply chain analysis and supplier locations | Industry research, Apple supplier list |\n| Natural Hedge Ratios | Calculated as local costs / local revenue by region | Supply chain cost structure analysis |\n| Hedge Effectiveness | Derived from OCI reclassifications vs. gross exposure | Note on Derivatives, OCI rollforward |\n| FX Impact on Revenue | Estimated using DXY correlation and disclosed FX sensitivity | Item 7A VAR analysis, management commentary |\n| Translation vs Transaction | Allocated based on accounting treatment disclosures | ASC 830 guidance, company footnotes |\n\n3.   \n   **Methodology Notes**\n\n   1. FX Impact Calculation: Revenue FX Impact \\= (Reported Intl Revenue) \\- (Intl Revenue at constant FX). Constant FX uses prior year average exchange rates.  \n   2. EPS Bridge Decomposition: Operational EPS \\= Reported EPS \\+ FX Translation Impact \\- Hedge Gains \\+ Transaction Losses. This isolates underlying business performance from currency effects.  \n   3. Classification Criteria: Pure FX Miss (FX \\>100% of shortfall), Mixed Miss (50-100%), Operational Miss (\\<50%).  \n4. **Limitations & Caveats**\n\n   1. Apple does not disclose exact currency-by-currency revenue breakdown  \n   2. COGS currency mix is estimated based on supply chain analysis  \n   3. Hedge notional amounts include interest rate hedges (separated where possible)  \n   4. Backtest sample size is limited (1
